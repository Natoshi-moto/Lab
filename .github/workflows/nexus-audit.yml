name: Nexus Audit

on:
  push:
    branches: [main]
    tags: ["baseline-*", "handoff-*"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: nexus-audit-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify repository and audit apparatus
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out exact revision
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: "3.12"

      - name: Set up exact Node runtime with native ML-DSA
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020
        with:
          node-version: "24.14.0"
          package-manager-cache: false

      - name: Install pinned verifier dependencies
        shell: bash
        run: |
          node --version
          npm --version
          npm ci --ignore-scripts --no-audit --no-fund

      - name: Verify exact R015 durability evidence
        run: python3 experiments/R015_PCX_INDEPENDENT_DURABILITY_VERIFIER_MODEL/verify_evidence.py

      - name: Verify exact R016 integrated custody evidence
        run: python3 experiments/R016_PCX_INTEGRATED_CUSTODY_GATE/verify_evidence.py

      - name: Verify exact R018 hybrid post-quantum admission evidence
        run: python3 experiments/R018_PQ_HYBRID_ADMISSION/verify_evidence.py

      - name: Run Nexus doctor
        run: ./nexus doctor

      - name: Run unit and attack tests
        run: python3 -m unittest discover -s tests -v

      - name: Verify snapshots, manifests and audit ledgers
        run: ./nexus verify

      - name: Verify R001 audit target when present
        shell: bash
        run: |
          if [[ -f operations/audits/AUD-R001-CLAUDE-BLIND/TARGET.json ]]; then
            ./nexus audit-check --audit-id AUD-R001-CLAUDE-BLIND
          else
            echo "R001 audit overlay is not present on this historical revision."
          fi

      - name: Verify R002 audit target when present
        shell: bash
        run: |
          if [[ -f operations/audits/AUD-R002-CLAUDE-BLIND/TARGET.json ]]; then
            ./nexus audit-check --audit-id AUD-R002-CLAUDE-BLIND
          else
            echo "R002 audit overlay is not present on this historical revision."
          fi

      - name: Ensure verification did not rewrite tracked evidence
        run: git diff --exit-code -- .

      - name: Record evidence limits
        if: always()
        shell: bash
        run: |
          {
            echo "## Nexus Audit"
            echo
            echo "The workflow executes structural, deterministic, manifest, unit, exact R015/R016 evidence, and bounded R018 hybrid-admission checks."
            echo "A green run does not prove semantic correctness, complete security, privacy, or external audit."
          } >> "$GITHUB_STEP_SUMMARY"
