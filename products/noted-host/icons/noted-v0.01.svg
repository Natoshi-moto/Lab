<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <filter id="halo" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- background -->
  <rect width="512" height="512" rx="108" fill="#1c1b2b"/>
  <rect x="2" y="2" width="508" height="508" rx="107" fill="none" stroke="#2a2745" stroke-width="2.5"/>

  <!-- outer ring on hub (very faint) -->
  <circle cx="256" cy="232" r="74" fill="none" stroke="#5a4fa0" stroke-width="4" opacity="0.45"/>

  <!-- mesh triangle between outer nodes (faint) -->
  <polygon points="256,82 118,320 394,320"
    fill="none" stroke="#4e44a0" stroke-width="4" opacity="0.26" stroke-linejoin="round"/>

  <!-- spokes -->
  <line x1="256" y1="232" x2="256" y2="82"  stroke="#7264bb" stroke-width="7" stroke-linecap="round" opacity="0.68"/>
  <line x1="256" y1="232" x2="118" y2="320" stroke="#7264bb" stroke-width="7" stroke-linecap="round" opacity="0.68"/>
  <line x1="256" y1="232" x2="394" y2="320" stroke="#7264bb" stroke-width="7" stroke-linecap="round" opacity="0.68"/>

  <!-- node halos -->
  <circle cx="256" cy="82"  r="52" fill="#9d8ce5" opacity="0.11" filter="url(#halo)"/>
  <circle cx="118" cy="320" r="52" fill="#9d8ce5" opacity="0.11" filter="url(#halo)"/>
  <circle cx="394" cy="320" r="52" fill="#9d8ce5" opacity="0.11" filter="url(#halo)"/>
  <circle cx="256" cy="232" r="80" fill="#9d8ce5" opacity="0.06" filter="url(#halo)"/>

  <!-- center hub: outer ring + inner ring + core -->
  <circle cx="256" cy="232" r="50" fill="#211f3c" stroke="#b09ee8" stroke-width="7"/>
  <circle cx="256" cy="232" r="22" fill="#b09ee8"/>

  <!-- outer nodes: ring + core -->
  <circle cx="256" cy="82"  r="35" fill="#201e38" stroke="#b09ee8" stroke-width="7"/>
  <circle cx="256" cy="82"  r="13" fill="#b09ee8"/>
  <circle cx="118" cy="320" r="35" fill="#201e38" stroke="#b09ee8" stroke-width="7"/>
  <circle cx="118" cy="320" r="13" fill="#b09ee8"/>
  <circle cx="394" cy="320" r="35" fill="#201e38" stroke="#b09ee8" stroke-width="7"/>
  <circle cx="394" cy="320" r="13" fill="#b09ee8"/>

  <!-- version pill -->
  <rect x="178" y="400" width="156" height="48" rx="18" fill="#36306a"/>
  <text x="256" y="432" font-family="monospace" font-size="28" fill="#7a6cbf" text-anchor="middle">v0.01</text>
</svg>
