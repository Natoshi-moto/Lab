    <script>
      // First-paint theme bootstrap. src/theme.ts is canonical; this tiny parser mirrors
      // legacy compatibility before React loads and stays file:// safe.
      (function(){
        var allowedPresets = { matrix: true, paper: true, midnight: true };
        var allowedTokens = {
          '--bg': true, '--surface': true, '--surface-2': true, '--surface-3': true, '--line': true,
          '--ink': true, '--ink-dim': true, '--ink-soft': true, '--ink-faint': true,
          '--accent': true, '--accent-bright': true, '--accent-dim': true, '--accent-soft': true, '--accent-contrast': true,
          '--danger': true, '--warning': true, '--info': true, '--warn': true, '--bad': true, '--good': true
        };
        function isRgbTriplet(value) {
          if (typeof value !== 'string') return false;
          var parts = value.trim().split(/\s+/);
          if (parts.length !== 3) return false;
          for (var i = 0; i < parts.length; i++) {
            if (!/^\d{1,3}$/.test(parts[i])) return false;
            var n = Number(parts[i]);
            if (!Number.isInteger(n) || n < 0 || n > 255) return false;
          }
          return true;
        }
        function normalize(raw) {
          if (raw === 'dark') return { preset: 'midnight' };
          if (raw === 'light') return { preset: 'paper' };
          if (!raw) return { preset: 'matrix' };
          try {
            var parsed = JSON.parse(raw);
            var preset = parsed && allowedPresets[parsed.preset] ? parsed.preset : 'matrix';
            var out = { preset: preset };
            if (parsed && parsed.overrides && typeof parsed.overrides === 'object') {
              out.overrides = {};
              for (var token in parsed.overrides) {
                if (allowedTokens[token] && isRgbTriplet(parsed.overrides[token])) {
                  out.overrides[token] = parsed.overrides[token].trim().replace(/\s+/g, ' ');
                }
              }
            }
            return out;
          } catch(e) {
            return { preset: 'matrix' };
          }
        }
        try {
          var settings = normalize(localStorage.getItem('verse-studio:theme'));
          var root = document.documentElement;
          root.dataset.theme = settings.preset;
          root.classList.remove('dark');
          if (settings.overrides) {
            for (var key in settings.overrides) {
              root.style.setProperty(key, settings.overrides[key]);
            }
          }
        } catch(e) {
          document.documentElement.dataset.theme = 'matrix';
        }
      })();
    </script>
