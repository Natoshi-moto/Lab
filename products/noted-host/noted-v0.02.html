Not found, exactly. Meridian found it for her. Her phone buzzed — a single, low pulse she'd learned to recognise — and the small amber icon appeared at the edge of her screen. A fragment, nearby.

She'd discovered forty-six fragments in three months of using the app. This was the first one that made her sit down on a stranger's front step.

Her father's voice. Six seconds. Recorded seven years ago, in a place she used to walk past every morning of her childhood without thinking.

"This is where I used to buy your mother flowers. Before the prices went up. Before everything went up."

A small laugh. Then silence. Then the soft click of the recording ending.

Six seconds. The whole shape of a man in six seconds.

Meridian showed her the date: March 3rd. His birthday. She hadn't known he did this — walked here, talked to no one, left something for someone he couldn't have known would come.

Or maybe he had.`},n={id:le.snapshotDoc,recordId:le.doc,recordType:"document",label:"First complete draft",data:JSON.stringify({body:t.body}),createdAt:Ce+18e5},r={id:le.noteCore,title:"Core concept — memory as place",projectId:le.project,isSeedData:!0,createdAt:Ce-864e5,updatedAt:Ce-864e5,body:`The thesis: memory is inseparable from place. You don't just remember your grandmother's kitchen — you remember it at a specific angle, with a specific smell, from a specific height you were when you were small.

Meridian externalises that. The memory stays where it happened. Someone else passes through years later and receives it — not as a story, but as a presence.

This is the difference between Meridian and a journal. A journal is yours. A fragment is a gift to the future of a specific location.

The emotional bet: people will want to leave something behind. Not for fame. Not for likes. Just to say: I was here. It mattered to me. Maybe it will matter to you.`},s={id:le.noteVoice,title:"Narrative voice — intimate and quiet",projectId:le.project,isSeedData:!0,createdAt:Ce-72e6,updatedAt:Ce-72e6,body:`The writing can't be loud.

Whatever fictional or editorial layer we put on top of Meridian — in marketing, in the app's own language, in any extended story world — needs to feel like someone talking quietly in a library. Not whispering. Just speaking at the volume of a private thought made public by accident.

Reference: Jenny Offill. Marilynne Robinson. The Rings of Saturn. Not because of their subjects but because of their sense that everything noticed is worth noticing.

The app itself should speak this way. Error messages. Prompts. The language of expiry. All of it calibrated to the tone of someone who takes time seriously.`},o={id:le.noteMechanics,title:"What makes a fragment expire?",projectId:le.project,isSeedData:!0,createdAt:Ce-432e5,updatedAt:Ce-432e5,body:`Mechanical question that's also a story question.

Option A: Time. Fragments expire after a fixed period. Simple, predictable. Sad in a good way.

Option B: Silence. A fragment nobody finds for N months expires. It was never discovered. It returns to noise. This feels more true — some things are simply lost.

Option C: Listening. The fragment expires after it's been heard by a certain number of people. It had an audience. Now it's done.

Option D: Creator's choice. They decide. Some fragments are meant to last forever. Some are meant for one person.

Lean toward B and D. C is the most interesting story possibility but creates incentives to game it.`},a=[{id:le.scrap1,projectId:le.project,body:"What if you could feel when someone else has found your fragment? A subtle notification. Not stalking — just: it landed. Someone was there.",sourceLabel:"scratchpad",isSeedData:!0,createdAt:Ce-36e5,updatedAt:Ce-36e5},{id:le.scrap2,projectId:le.project,body:"The app should never explain itself. No onboarding tutorial. No tooltips. Discovery is the experience. The first time you find a fragment, that's your tutorial.",sourceLabel:"scratchpad",isSeedData:!0,createdAt:Ce-72e5,updatedAt:Ce-72e5},{id:le.scrap3,projectId:le.project,body:"Sound design: fragments should whisper. Not literally — but volume, EQ, reverb calibrated to feel like memory. Like hearing something through a wall.",sourceLabel:"scratchpad",isSeedData:!0,createdAt:Ce-108e5,updatedAt:Ce-108e5}],c={id:le.longformDoc,title:"Meridian Story Bible",projectId:le.project,isSeedData:!0,createdAt:Ce-1728e5,updatedAt:Ce-1728e5},l=[{id:le.section1,projectId:le.longformDoc,title:"The World",order:0,isSeedData:!0,createdAt:Ce-1728e5,updatedAt:Ce-1728e5,body:`Meridian exists in a world where this is completely normal — leaving fragments. Nobody questions it the way nobody questions leaving a review or taking a photo. It's just something some people do.

The creator places it at a location. They choose how long it persists. They can make it public or semi-private.
