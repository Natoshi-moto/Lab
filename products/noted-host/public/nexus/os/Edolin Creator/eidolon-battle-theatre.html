<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EIDOLON · BATTLE THEATRE</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#050508;--bg2:#0d0e14;--bg3:#151621;--line:#2a2a38;--line2:#44445c;
  --text:#eeeaf6;--dim:#858394;--dim2:#525061;--accent:#ffcc44;--accent2:#aaeeff;--danger:#ff5566;--good:#76ffad;
  --phase-ant:#7a7aaa;--phase-str:#aaffcc;--phase-imp:#ffcc44;--phase-rec:#aaeeff;
  --mono:'IBM Plex Mono','Cascadia Mono','SF Mono',Menlo,Consolas,monospace;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--mono);font-size:12px;overflow:hidden;-webkit-font-smoothing:antialiased}
body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,rgba(0,0,0,.10) 0,rgba(0,0,0,.10) 1px,transparent 1px,transparent 4px);pointer-events:none;z-index:1000}
#app{height:100vh;display:grid;grid-template-columns:1fr 360px;grid-template-rows:38px 1fr 44px;overflow:hidden}
#top{grid-column:1/3;display:flex;align-items:center;gap:12px;padding:0 14px;background:var(--bg2);border-bottom:1px solid var(--line)}
#brand{font-size:11px;letter-spacing:3px;font-weight:700}#brand b{color:var(--accent)}
#status{margin-left:auto;color:var(--dim);font-size:10px;letter-spacing:1px}.pill{font-size:9px;letter-spacing:1px;border:1px solid var(--line2);padding:2px 8px;color:var(--dim);border-radius:2px}.pill.hot{color:var(--accent);border-color:var(--accent)}
#stage{position:relative;background:#030306;overflow:hidden;display:flex;align-items:center;justify-content:center;padding:12px;border-right:1px solid var(--line)}
#battle-canvas{width:100%;height:100%;max-width:100%;max-height:100%;aspect-ratio:16/9;background:#050508;border:1px solid var(--line);display:block}
#hud-left,#hud-right{position:absolute;top:22px;width:255px;background:rgba(8,9,14,.82);border:1px solid var(--line);backdrop-filter:blur(6px);padding:8px 10px;z-index:2}#hud-left{left:22px}#hud-right{right:22px;text-align:right}
.cname{font-weight:700;letter-spacing:1.8px;font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.types{margin-top:4px;display:flex;gap:4px;flex-wrap:wrap}.right .types{justify-content:flex-end}
.typechip{font-size:8px;letter-spacing:1px;text-transform:uppercase;border:1px solid currentColor;padding:1px 5px;border-radius:2px;background:rgba(255,255,255,.04)}
.hpbar{height:7px;background:rgba(255,255,255,.06);border:1px solid var(--line);margin-top:7px;overflow:hidden}.hpfill{height:100%;width:100%;background:var(--good);transition:width .25s}.hpfill.mid{background:var(--accent)}.hpfill.low{background:var(--danger)}.hpnums{color:var(--dim);font-size:9px;margin-top:3px}.tagsline{margin-top:5px;color:var(--dim);font-size:9px;line-height:1.5}
#log{position:absolute;left:22px;right:22px;bottom:22px;background:rgba(8,9,14,.88);border:1px solid var(--line);padding:9px 12px;letter-spacing:.5px;color:var(--text);min-height:34px;z-index:3;display:flex;align-items:center;gap:8px}#log span{color:var(--accent)}
#side{background:var(--bg2);display:flex;flex-direction:column;min-height:0}#panel-title{height:38px;border-bottom:1px solid var(--line);display:flex;align-items:center;padding:0 14px;font-size:10px;color:var(--dim);letter-spacing:2px;text-transform:uppercase;flex-shrink:0}
#panel-body{overflow:auto;padding:12px 14px;display:flex;flex-direction:column;gap:13px}.section{display:flex;flex-direction:column;gap:8px}.section h3{font-size:9px;color:var(--dim2);letter-spacing:2px;text-transform:uppercase;border-bottom:1px solid var(--line);padding-bottom:6px;font-weight:400}
.btn{font-family:inherit;font-size:10px;letter-spacing:.8px;color:var(--dim);background:transparent;border:1px solid var(--line);padding:7px 9px;border-radius:2px;cursor:pointer;text-transform:lowercase;transition:all .1s}.btn:hover{border-color:var(--line2);color:var(--text);background:var(--bg3)}.btn.primary{color:var(--accent);border-color:var(--accent)}.btn.good{color:var(--good);border-color:var(--good)}.btn.danger{color:var(--danger);border-color:var(--danger)}.btn.active{background:var(--accent);color:#111;border-color:var(--accent)}.grid2{display:grid;grid-template-columns:1fr 1fr;gap:6px}.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px}
#moves{display:grid;grid-template-columns:1fr 1fr;gap:6px}.move{min-height:52px;text-align:left;display:flex;flex-direction:column;gap:4px}.move b{font-size:10px;color:var(--text);letter-spacing:.8px}.move small{font-size:8px;color:var(--dim);line-height:1.4}.move.physical{border-left:3px solid #ff8844}.move.special{border-left:3px solid #44aaff}.move.status{border-left:3px solid #aabb33}
#attack-select{width:100%;background:var(--bg);border:1px solid var(--line);color:var(--text);font-family:inherit;font-size:10px;padding:6px}.kv{display:grid;grid-template-columns:90px 1fr;gap:5px 8px;font-size:10px}.k{color:var(--dim2);text-transform:uppercase;font-size:8px;letter-spacing:1px}.v{color:var(--dim);word-break:break-word}.meter{height:5px;background:var(--bg);border:1px solid var(--line);overflow:hidden}.meter div{height:100%;background:var(--accent)}
#timeline{display:flex;flex-direction:column;gap:6px}#scrub{appearance:none;width:100%;height:4px;background:var(--bg);border:1px solid var(--line);outline:none}#scrub::-webkit-slider-thumb{appearance:none;width:12px;height:16px;background:var(--text);border:none}.phasebar{height:8px;border:1px solid var(--line);display:flex}.pb{height:100%}.ant{background:var(--phase-ant)}.str{background:var(--phase-str)}.imp{background:var(--phase-imp)}.rec{background:var(--phase-rec)}.idle{background:#252532}
#bottom{grid-column:1/3;background:var(--bg2);border-top:1px solid var(--line);display:flex;align-items:center;gap:8px;padding:0 12px}.drop{position:fixed;inset:0;background:rgba(5,5,8,.92);border:3px dashed var(--accent);display:none;align-items:center;justify-content:center;z-index:999;color:var(--accent);font-size:24px;letter-spacing:4px}.drop.show{display:flex}
input[type=file]{display:none}.toast{position:fixed;left:50%;bottom:58px;transform:translateX(-50%);background:var(--bg3);border:1px solid var(--line2);padding:8px 14px;opacity:0;transition:opacity .15s;z-index:999}.toast.show{opacity:1}
@media(max-width:900px){#app{grid-template-columns:1fr;grid-template-rows:38px 58vh 1fr 44px}#top,#bottom{grid-column:1}#side{border-top:1px solid var(--line)}#hud-left,#hud-right{width:210px}.cname{font-size:10px}}
</style>
</head>
<body>
<div id="app">
  <div id="top"><div id="brand"><b>⚔</b>&nbsp;EIDOLON BATTLE THEATRE</div><span class="pill hot" id="phase-pill">IDLE</span><span class="pill" id="asset-pill">self-contained</span><div id="status">ready</div></div>
  <main id="stage">
    <canvas id="battle-canvas" width="1280" height="720"></canvas>
    <div id="hud-left"><div class="cname" id="left-name">—</div><div class="types" id="left-types"></div><div class="hpbar"><div class="hpfill" id="left-hp"></div></div><div class="hpnums" id="left-hpnums">—</div><div class="tagsline" id="left-tags"></div></div>
    <div id="hud-right" class="right"><div class="cname" id="right-name">—</div><div class="types" id="right-types"></div><div class="hpbar"><div class="hpfill" id="right-hp"></div></div><div class="hpnums" id="right-hpnums">—</div><div class="tagsline" id="right-tags"></div></div>
    <div id="log">Drop creature battle HTML, environment JSON, or attack JSON. <span>Then test it live.</span></div>
  </main>
  <aside id="side"><div id="panel-title">combat workbench</div><div id="panel-body">
    <div class="section"><h3>asset loadout</h3><div class="grid2"><button class="btn" onclick="pickFile('left')">load left</button><button class="btn" onclick="pickFile('right')">load right</button><button class="btn" onclick="pickFile('env')">load env</button><button class="btn" onclick="pickFile('attack')">load attack</button></div><input id="file-left" type="file" accept=".html,.json,application/json,text/html" onchange="loadSlot(event,'left')"><input id="file-right" type="file" accept=".html,.json,application/json,text/html" onchange="loadSlot(event,'right')"><input id="file-env" type="file" accept=".json,application/json" onchange="loadSlot(event,'env')"><input id="file-attack" type="file" accept=".json,application/json" onchange="loadSlot(event,'attack')"><div class="grid2"><button class="btn" onclick="randomEnemy()">random enemy</button><button class="btn" onclick="swapSides()">swap sides</button></div></div>
    <div class="section"><h3>moves</h3><div id="moves"></div></div>
    <div class="section"><h3>attack asset</h3><select id="attack-select" onchange="selectAttack(this.value)"><option value="auto">auto from move</option></select><div class="kv" id="attack-kv"></div></div>
    <div class="section"><h3>timeline</h3><div id="timeline"><div class="phasebar"><div class="pb ant" style="width:22%"></div><div class="pb str" style="width:18%"></div><div class="pb imp" style="width:13%"></div><div class="pb rec" style="width:27%"></div><div class="pb idle" style="width:20%"></div></div><input id="scrub" type="range" min="0" max="1000" value="0" oninput="manualScrub(this.value)"></div><div class="grid3"><button class="btn" onclick="replayLast()">replay</button><button class="btn" id="auto-btn" onclick="toggleAuto()">auto</button><button class="btn" onclick="resetHP()">reset hp</button></div></div>
    <div class="section"><h3>scene stats</h3><div class="kv" id="stats-kv"></div></div>
  </div></aside>
  <footer id="bottom"><button class="btn primary" onclick="exportFrame()">export frame png</button><button class="btn" onclick="exportSpritesheet()">export spritesheet</button><button class="btn" onclick="exportScene()">export scene json</button><button class="btn danger" onclick="clearStorage()">clear local</button><div id="status2" style="margin-left:auto;color:var(--dim);font-size:10px">animation-carryover lab</div></footer>
</div>
<div class="drop" id="drop">DROP ASSET</div><div class="toast" id="toast"></div>
<script>
'use strict';
const DEFAULT_GENE = {"name": "KRONPHIAX", "species": "Eidolon", "typeTag": "phosphor-specimen", "generation": 2, "nonce": "3a2b39a118ee1c29deccb27b", "birthHash": "d1500355173bcb168fb61ae149da9e96523694457e38db03baa7a64a4cdf5218", "parentNonce": "b45b4f8fd884fa52038ca19e", "parentHash": "d7f5f55751f77db00ad2d3d67867ffc28cba167e8c81fbc6188e88d8319d9b02", "dna": [183, 22, 46, 175, 220, 145, 6, 104, 214, 34, 106, 207, 189, 102, 253, 202], "hues": [298.79423990735825, 156.74825165609934, 29.858166830498078], "createdAt": "2026-05-05T06:06:49.037Z", "childCount": 0, "lineage": [{"name": "PHANTIVEX", "generation": 1, "nonce": "b45b4f8fd884fa52038ca19e"}]};
const TRAIT_NAMES=['venomous','spectral','swarming','titanic','murky','resonant','vital','volatile','ethereal','crystalline','feral','ancient','luminous','toxic','phantom','armored'];
const TRAIT_MOVES={
venomous:{name:'VENOM STING',power:35,cat:'physical',acc:100,effect:'poison',desc:'35 · may poison'},spectral:{name:'SPECTRAL RAY',power:65,cat:'special',acc:90,effect:null,desc:'65 · special'},swarming:{name:'SWARM RUSH',power:22,cat:'physical',acc:100,effect:'multi',desc:'22×2 · physical'},titanic:{name:'SEISMIC SLAM',power:90,cat:'physical',acc:80,effect:null,desc:'90 · heavy blow'},murky:{name:'MURK CLOUD',power:0,cat:'status',acc:100,effect:'acc-',desc:'lower foe accuracy'},resonant:{name:'RESONANCE',power:55,cat:'special',acc:100,effect:null,desc:'55 · resonant'},vital:{name:'VITAL SURGE',power:0,cat:'status',acc:100,effect:'heal+',desc:'restore 40% hp'},volatile:{name:'DETONATION',power:110,cat:'physical',acc:90,effect:'recoil',desc:'110 · recoil'},ethereal:{name:'PHASE SLIP',power:0,cat:'status',acc:100,effect:'dodge',desc:'dodge next hit'},crystalline:{name:'CRYSTAL LANCE',power:50,cat:'special',acc:100,effect:null,desc:'50 · piercing'},feral:{name:'FERAL CLAWS',power:28,cat:'physical',acc:100,effect:'multi',desc:'28×2 · physical'},ancient:{name:'ANCIENT POWER',power:60,cat:'special',acc:100,effect:'boost',desc:'60 · may boost'},luminous:{name:'FLASH BURST',power:40,cat:'special',acc:100,effect:'acc-',desc:'40 · blind'},toxic:{name:'ACID STREAM',power:50,cat:'special',acc:100,effect:'burn',desc:'50 · burn'},phantom:{name:'PHANTOM CLAW',power:70,cat:'physical',acc:95,effect:null,desc:'70 · ignores dodge'},armored:{name:'IRON WALL',power:0,cat:'status',acc:100,effect:'def+',desc:'raise def'}};
const BASE_MOVES=[{name:'PULSE',power:40,cat:'special',acc:100,effect:null,desc:'40 · reliable'},{name:'STRIKE',power:45,cat:'physical',acc:95,effect:null,desc:'45 · physical'},{name:'SHIELD',power:0,cat:'status',acc:100,effect:'def+',desc:'raise def'},{name:'MEND',power:0,cat:'status',acc:100,effect:'heal',desc:'restore 25%'}];
const TYPE_FROM_TRAIT={venomous:'TOXIC',spectral:'SPECTRAL',swarming:'WILD',titanic:'IRON',murky:'VOID',resonant:'SPECTRAL',vital:'WILD',volatile:'IRON',ethereal:'VOID',crystalline:'IRON',feral:'WILD',ancient:'ANCIENT',luminous:'LIGHT',toxic:'TOXIC',phantom:'SHADOW',armored:'IRON'};
const TYPE_COLOR={TOXIC:'#cc44ff',SPECTRAL:'#33eeff',WILD:'#44ff88',IRON:'#8899cc',VOID:'#5566ff',ANCIENT:'#ffaa44',LIGHT:'#ffdd33',SHADOW:'#aa55cc'};
const BEATS={TOXIC:['ANCIENT','WILD'],SPECTRAL:['ANCIENT','VOID'],WILD:['IRON','VOID'],IRON:['SPECTRAL','LIGHT'],VOID:['LIGHT','SHADOW'],ANCIENT:['SHADOW','SPECTRAL'],LIGHT:['TOXIC','ANCIENT'],SHADOW:['VOID','TOXIC']};
const BATTLE_AXES=['duration','anticipation_time','strike_time','impact_hold','recovery_time','hitstop','attack_sequence','lunge_distance','lunge_arc','windup_pullback','attacker_squash','attacker_stretch','recoil_distance','attack_form','arc_width','arc_height','trail_length','trail_thickness','trail_curve','beam_width','beam_pulse','chain_hits','impact_flash_size','impact_flash_brightness','spark_count','spark_spread','shockwave_radius','screen_shake','burst_radius','burst_rings','knockback_distance','knockback_angle','defender_squash','defender_stretch','stagger_wobble','damage_flash','damage_flash_decay','debris_count','debris_speed','debris_gravity','debris_lifetime','dust_amount','dust_spread','attack_hue','impact_hue','damage_hue','saturation','lightness','afterimage_opacity'];
const BID=Object.fromEntries(BATTLE_AXES.map((id,i)=>[id,i]));
const DEFAULT_ATTACK=[120,80,90,80,120,90,0,140,128,80,80,110,70,20,160,110,150,120,120,120,100,120,140,170,120,150,110,80,140,120,120,110,100,100,100,160,120,90,120,120,120,70,90,10,40,0,180,150,90];
let canvas=$('battle-canvas'), ctx=canvas.getContext('2d');
let left=makeBoard(DEFAULT_GENE), right=makeBoard(makeRandomGene('WILD FOE'));
let envSpec=null, attacks=[], selectedAttack='auto', active=null, lastMove=0, auto=false, scrubMode=false, scrubT=0, lastTime=performance.now(), t0=performance.now(), particles=[];
function $(id){return document.getElementById(id)}function clamp(v,a,b){return Math.max(a,Math.min(b,v))}function lerp(a,b,t){return a+(b-a)*t}function easeOut(t){return 1-(1-t)*(1-t)}function smooth(t){return t*t*(3-2*t)}function toast(msg){const t=$('toast');t.textContent=msg;t.classList.add('show');clearTimeout(toast.t);toast.t=setTimeout(()=>t.classList.remove('show'),2000);$('status').textContent=msg}
function mulberry32(seed){let s=seed>>>0;return()=>{s=(s+0x6D2B79F5)>>>0;let r=s;r=Math.imul(r^(r>>>15),r|1);r^=r+Math.imul(r^(r>>>7),r|61);return((r^(r>>>14))>>>0)/4294967296}}
function hashSeed(str){let h=2166136261>>>0;for(let i=0;i<String(str).length;i++){h^=String(str).charCodeAt(i);h=Math.imul(h,16777619)}return h>>>0}
function makeRandomGene(name){const r=mulberry32(Date.now()^Math.floor(Math.random()*0xffffffff));const dna=Array.from({length:16},()=>Math.floor(r()*256));return {name:name||makeName(dna),generation:1,dna,hues:[r()*360,r()*360,r()*360],createdAt:new Date().toISOString()}}
function makeName(dna){const P=['PHAN','VEX','AETH','KRON','LUMI','ETH','ARC','SPEC','ZYN','NETH','GLYPH','OMNI'];const M=['TI','LA','VO','RU','NI','KA','MO','EL','SI','RA','PHI','SU'];const S=['EX','ON','IX','AR','UM','AN','OX','IS','OR','EN','AX','UR'];return P[dna[0]%P.length]+M[dna[1]%M.length]+S[dna[2]%S.length]}
function computeStats(dna){return{maxHp:45+Math.floor(dna[7]/255*60),atk:20+Math.floor(dna[3]/255*55),def:20+Math.floor(dna[5]/255*55),spAtk:20+Math.floor(dna[4]/255*55),spDef:20+Math.floor(dna[6]/255*55),spd:15+Math.floor(dna[2]/255*60)}}
function deriveTypes(dna){const ex=TRAIT_NAMES.map((name,i)=>({name,val:dna[i]})).filter(t=>t.val>128).sort((a,b)=>b.val-a.val);const p=ex[0]?TYPE_FROM_TRAIT[ex[0].name]:'SPECTRAL';const s=ex[1]?TYPE_FROM_TRAIT[ex[1].name]:null;return s&&s!==p?[p,s]:[p]}
function deriveMoves(dna){const ex=TRAIT_NAMES.map((name,i)=>({name,val:dna[i]})).filter(t=>t.val>128).sort((a,b)=>b.val-a.val);const mv=ex.slice(0,4).map(t=>({...TRAIT_MOVES[t.name]}));let i=0;while(mv.length<4)mv.push({...BASE_MOVES[i++]});return mv}
function makeBoard(gene){const stats=computeStats(gene.dna);return{gene,dna:gene.dna,hues:gene.hues||[200,90,140],name:gene.name||makeName(gene.dna),types:deriveTypes(gene.dna),moves:deriveMoves(gene.dna),base:stats,maxHp:stats.maxHp,hp:stats.maxHp,atkSt:0,defSt:0,spASt:0,spDSt:0,status:null,flash:0,shake:0}}
function typeEff(atk,defs){let m=1;for(const d of defs)if((BEATS[atk]||[]).includes(d))m*=2;return m}
function stageM(s){return [.25,.28,.33,.4,.5,.67,1,1.5,2,2.5,3,3.5,4][clamp(s+6,0,12)]}
function damage(attacker,defender,move){if(!move.power)return 0;const phys=move.cat==='physical';const atk=attacker.base[phys?'atk':'spAtk']*stageM(phys?attacker.atkSt:attacker.spASt);const def=defender.base[phys?'def':'spDef']*stageM(defender.defSt);const eff=typeEff(attacker.types[0],defender.types);return Math.max(1,Math.floor((atk/def*move.power/50+2)*(0.88+Math.random()*0.12)*eff))}
function applyEffect(effect,att,def,dmg){let msg='';if(effect==='poison'&&!def.status&&Math.random()<.45){def.status='poison';msg=`${def.name} is poisoned.`}else if(effect==='burn'&&!def.status&&Math.random()<.35){def.status='burn';msg=`${def.name} is burned.`}else if(effect==='heal'||effect==='heal+'){let h=Math.floor(att.maxHp*(effect==='heal+'?.4:.25));att.hp=Math.min(att.maxHp,att.hp+h);msg=`${att.name} restored ${h} HP.`}else if(effect==='def+'){att.defSt=Math.min(6,att.defSt+2);msg=`${att.name}'s defense rose.`}else if(effect==='recoil'){let r=Math.floor(dmg*.33);att.hp=Math.max(0,att.hp-r);msg=`${att.name} took recoil.`}else if(effect==='acc-'){msg=`${def.name}'s accuracy glitched.`}else if(effect==='boost'&&Math.random()<.2){att.atkSt++;att.spASt++;msg=`${att.name}'s power surged.`}return msg}
function tagsFromGene(b){const expr=TRAIT_NAMES.map((name,i)=>({name,val:b.dna[i]})).filter(t=>t.val>128).sort((a,b)=>b.val-a.val).slice(0,4);return expr.map(t=>t.name).join(' · ')}
function renderHUD(){for(const [key,b] of [['left',left],['right',right]]){$(`${key}-name`).textContent=`${b.name} · Gen ${b.gene.generation||1}`;$(`${key}-types`).innerHTML=b.types.map(t=>`<span class="typechip" style="color:${TYPE_COLOR[t]};background:${TYPE_COLOR[t]}22">${t}</span>`).join('');const pct=b.hp/b.maxHp*100;const hp=$(`${key}-hp`);hp.style.width=pct+'%';hp.className='hpfill'+(pct<25?' low':pct<55?' mid':'');$(`${key}-hpnums`).textContent=`${b.hp}/${b.maxHp}`;$(`${key}-tags`).textContent=tagsFromGene(b)}renderMoves();renderStats()}
function renderMoves(){const el=$('moves');el.innerHTML=left.moves.map((m,i)=>`<button class="btn move ${m.cat}" onclick="useMove(${i})"><b>${m.name}</b><small>${m.desc} · ${m.cat}</small></button>`).join('')}
function renderStats(){const kv=$('stats-kv');const rows=[['environment',envSpec?envSpec.name||'loaded':'procedural'],['left',`${left.name} · ${left.types.join('/')}`],['right',`${right.name} · ${right.types.join('/')}`],['attack assets',String(attacks.length)],['selected attack',selectedAttack==='auto'?'auto':(attacks[+selectedAttack]?.name||'—')]];kv.innerHTML=rows.map(([k,v])=>`<div class="k">${k}</div><div class="v">${v}</div>`).join('');renderAttackKV()}
function renderAttackKV(){let a=selectedAttack==='auto'?null:attacks[+selectedAttack];$('attack-kv').innerHTML=a?`<div class="k">name</div><div class="v">${esc(a.name)}</div><div class="k">form</div><div class="v">${attackForm(a.values)}</div><div class="k">element</div><div class="v">${attackElement(a.values)}</div>`:`<div class="k">mode</div><div class="v">derived from selected move</div>`}
function esc(s){return String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}
function pickFile(slot){$(`file-${slot}`).click()}async function loadSlot(e,slot){const f=e.target.files[0];e.target.value='';if(!f)return;const text=await f.text();try{await ingest(text,f.name,slot);toast(`loaded ${slot}: ${f.name}`)}catch(err){console.error(err);toast('load failed: '+err.message)}}
async function ingest(text,name,slot){let data=null;if(/<script[^>]+id=["']creature-dna["']/i.test(text)){const m=text.match(/<script[^>]+id=["']creature-dna["'][^>]*>([\s\S]*?)<\/script>/i);data=JSON.parse(m[1]);if(slot==='right')right=makeBoard(data);else left=makeBoard(data);renderHUD();return}try{data=JSON.parse(text)}catch{throw new Error('not json/html creature')}if(data.format&&data.format.startsWith('vibe/')&&data.payload)data=data.payload;if(data.dna&&data.dna.length===16){if(slot==='right')right=makeBoard(data);else left=makeBoard(data);renderHUD();return}if(data.axes&&data.axes.some(a=>String(a.id).startsWith('sky_'))){envSpec={name:data.name||name,axes:data.axes};renderStats();return}let loaded=parseAttackPayload(data,name);if(loaded.length){attacks.push(...loaded);refreshAttackSelect();renderStats();return}throw new Error('unrecognized asset')}
function parseAttackPayload(data,name){const out=[];function normValues(x){if(Array.isArray(x)&&x.length>20)return x.slice(0,BATTLE_AXES.length).map(n=>clamp(Number(n)||0,0,255));if(x&&Array.isArray(x.values))return normValues(x.values);if(x&&Array.isArray(x.axes)){const arr=DEFAULT_ATTACK.slice();for(const a of x.axes){const idx=BID[a.id];if(idx!==undefined)arr[idx]=clamp(a.value,0,255)}return arr}return null}if(Array.isArray(data.templates)){for(const t of data.templates){const v=normValues(t.values||t);if(v)out.push({name:t.name||'attack template',values:v})}}else if(data.payload&&Array.isArray(data.payload.templates)){return parseAttackPayload(data.payload,name)}else{const v=normValues(data.values||data.axes?data:null);if(v)out.push({name:data.name||name.replace(/\.[^.]+$/,''),values:v})}return out}
function refreshAttackSelect(){const sel=$('attack-select');sel.innerHTML='<option value="auto">auto from move</option>'+attacks.map((a,i)=>`<option value="${i}">${esc(a.name)} · ${attackForm(a.values)} · ${attackElement(a.values)}</option>`).join('');sel.value=selectedAttack}
function selectAttack(v){selectedAttack=v;renderStats()}
function randomEnemy(){right=makeBoard(makeRandomGene());renderHUD();toast('random enemy generated')}function swapSides(){const tmp=left;left=right;right=tmp;renderHUD();toast('sides swapped')}function resetHP(){left.hp=left.maxHp;right.hp=right.maxHp;left.status=right.status=null;renderHUD();toast('hp reset')}
function useMove(i){lastMove=i;startAttack(left,right,left.moves[i],true)}function replayLast(){startAttack(left,right,left.moves[lastMove]||left.moves[0],false)}function toggleAuto(){auto=!auto;$('auto-btn').classList.toggle('active',auto);toast(auto?'auto battle on':'auto battle off');if(auto&&!active)setTimeout(()=>useMove(Math.floor(Math.random()*left.moves.length)),400)}
function attackValuesForMove(m){let vals=selectedAttack==='auto'?DEFAULT_ATTACK.slice():(attacks[+selectedAttack]?.values||DEFAULT_ATTACK).slice();if(selectedAttack==='auto'){vals[BID.attack_hue]=(hashSeed(m.name)*7)%256;vals[BID.impact_hue]=(vals[BID.attack_hue]+40)%256;vals[BID.attack_form]=m.cat==='status'?180:(m.cat==='special'?120:25);if(/CLAW|STING|STRIKE|SLAM|RUSH/.test(m.name))vals[BID.attack_form]=25;if(/RAY|STREAM|RESONANCE|PULSE/.test(m.name))vals[BID.attack_form]=145;if(/CLOUD|BURST|DETONATION/.test(m.name))vals[BID.attack_form]=190;if(/PHASE|ANCIENT/.test(m.name))vals[BID.attack_form]=230}return vals}
function startAttack(att,def,move,resolve=true){const vals=attackValuesForMove(move);active={att,def,move,vals,start:performance.now(),dur:850+vals[BID.duration]/255*1000,resolve,hitDone:false,side:att===left?'left':'right'};particles=[];$('log').innerHTML=`<b>${att.name}</b> used <span>${move.name}</span>.`;scrubMode=false;$('phase-pill').textContent='ATTACK'}
function resolveHit(a){if(a.hitDone||!a.resolve)return;a.hitDone=true;let dmg=damage(a.att,a.def,a.move);let hits=a.move.effect==='multi'?(Math.random()<.6?2:3):1;let total=dmg*hits;a.def.hp=Math.max(0,a.def.hp-total);a.def.flash=1;a.def.shake=1;let msg=`${a.move.name} dealt ${total} damage`;let eff=typeEff(a.att.types[0],a.def.types);if(eff>=2)msg+=' · super effective';let extra=applyEffect(a.move.effect,a.att,a.def,total);$('log').innerHTML=msg+(extra?`<br><span>${extra}</span>`:'');renderHUD()}
function afterAttack(){if(right.hp<=0){$('log').innerHTML=`<span>${right.name} collapses.</span> ${left.name} wins.`;auto=false;$('auto-btn').classList.remove('active');return}if(left.hp<=0){$('log').innerHTML=`<span>${left.name} collapses.</span> ${right.name} wins.`;auto=false;$('auto-btn').classList.remove('active');return}if(active&&active.side==='left'&&active.resolve){setTimeout(()=>{if(right.hp>0&&left.hp>0){const mv=right.moves.reduce((best,m,i)=>m.power>(right.moves[best]?.power||0)?i:best,0);startAttack(right,left,right.moves[mv],true)}},450)}else if(auto){setTimeout(()=>useMove(Math.floor(Math.random()*left.moves.length)),650)}}
function manualScrub(v){scrubMode=true;scrubT=+v/1000;if(!active)active={att:left,def:right,move:left.moves[lastMove]||left.moves[0],vals:attackValuesForMove(left.moves[lastMove]||left.moves[0]),start:performance.now(),dur:1200,resolve:false,hitDone:true,side:'left'}}
function getPhase(vals,t){const ant=.18+vals[BID.anticipation_time]/255*.12,str=.14+vals[BID.strike_time]/255*.16,imp=.08+vals[BID.impact_hold]/255*.10,rec=.22+vals[BID.recovery_time]/255*.18;let x=t;if(x<ant)return['anticipation',x/ant,ant,str,imp,rec];x-=ant;if(x<str)return['strike',x/str,ant,str,imp,rec];x-=str;if(x<imp)return['impact',x/imp,ant,str,imp,rec];x-=imp;if(x<rec)return['recovery',x/rec,ant,str,imp,rec];return['idle',0,ant,str,imp,rec]}
function attackForm(vals){const b=vals[BID.attack_form]||0;if(b<43)return'slash';if(b<86)return'thrust';if(b<129)return'projectile';if(b<171)return'beam';if(b<214)return'burst';return'chain'}function attackElement(vals){const h=Math.round((vals[BID.attack_hue]||0)/255*359);if(h<31)return'fire';if(h<61)return'lightning';if(h<151)return'nature';if(h<211)return'ice';if(h<271)return'void';return'arcane'}
function renderEnv(ctx,W,H,t){if(envSpec&&envSpec.axes){const map=Object.fromEntries(envSpec.axes.map(a=>[a.id,a.value]));const gv=(id,d=128)=>map[id]??d;const g01=(id,d)=>gv(id,d)/255;const gR=(id,d,a,b)=>a+g01(id,d)*(b-a);const topH=Math.round(g01('sky_top_hue',148)*359),botH=Math.round(g01('sky_bot_hue',200)*359),sat=Math.round(gR('sky_saturation',120,0,100));const topL=Math.round(gR('sky_top_lightness',45,0,60)),botL=Math.round(gR('sky_bot_lightness',120,0,80));const gy=gR('ground_y',170,.45,.95);let g=ctx.createLinearGradient(0,0,0,H*gy);g.addColorStop(0,`hsl(${topH},${sat}%,${topL}%)`);g.addColorStop(1,`hsl(${botH},${sat}%,${botL}%)`);ctx.fillStyle=g;ctx.fillRect(0,0,W,H);drawMountains(ctx,W,H,H*gy,botH,sat,g01('far_count',80)*30,gR('far_height',100,.05,.45),.33);drawMountains(ctx,W,H,H*gy,botH,sat,g01('mid_count',60)*22,gR('mid_height',140,.08,.55),.62);let gh=Math.round(g01('ground_hue',128)*359),gl=Math.round(gR('ground_lightness',80,4,50));let gg=ctx.createLinearGradient(0,H*gy,0,H);gg.addColorStop(0,`hsl(${gh},${sat}%,${gl}%)`);gg.addColorStop(1,`hsl(${gh},${sat*.6}%,${Math.max(2,gl*.3)}%)`);ctx.fillStyle=gg;ctx.fillRect(0,H*gy,W,H-H*gy);drawFog(ctx,W,H,Math.round(g01('fog_hue',150)*359),g01('fog_density',30));return H*gy}const hues=[left.hues[0],right.hues[0],left.hues[1]];ctx.fillStyle='#05050a';ctx.fillRect(0,0,W,H);let g=ctx.createRadialGradient(W*.5,H*.38,0,W*.5,H*.38,W*.8);g.addColorStop(0,`hsla(${hues[0]},45%,10%,.95)`);g.addColorStop(.55,`hsla(${hues[1]},40%,6%,.75)`);g.addColorStop(1,'#020205');ctx.fillStyle=g;ctx.fillRect(0,0,W,H);let r=mulberry32(999);for(let i=0;i<130;i++){ctx.fillStyle=`hsla(${hues[i%3]},60%,85%,${.06+r()*.32})`;ctx.beginPath();ctx.arc(r()*W,r()*H*.82,.3+r()*1.1,0,Math.PI*2);ctx.fill()}let gy=H*.72;drawMountains(ctx,W,H,gy,hues[1],40,22,.35);ctx.fillStyle='#0b0b15';ctx.fillRect(0,gy,W,H-gy);ctx.strokeStyle='#30304a';ctx.beginPath();ctx.moveTo(0,gy);ctx.lineTo(W,gy);ctx.stroke();return gy}
function drawMountains(ctx,W,H,base,hue,sat,n,h,alpha){n=Math.max(3,Math.floor(n));let r=mulberry32(n*97+13),step=W/n;ctx.beginPath();ctx.moveTo(0,base);for(let i=0;i<=n;i++){let x=i*step,y=base-H*h*(.25+r()*.9);ctx.lineTo(x,y)}ctx.lineTo(W,base);ctx.closePath();ctx.fillStyle=`hsla(${hue},${sat}%,8%,${alpha})`;ctx.fill()}function drawFog(ctx,W,H,hue,d){if(d>.03){let g=ctx.createLinearGradient(0,0,0,H);g.addColorStop(0,'transparent');g.addColorStop(1,`hsla(${hue},35%,60%,${d*.42})`);ctx.fillStyle=g;ctx.fillRect(0,0,W,H)}}
function renderCreatureOn(ctx,b,x,y,size,t,flip=false,hit=0){ctx.save();ctx.translate(x,y);if(flip)ctx.scale(-1,1);const dna=b.dna,hues=b.hues;const baseR=size*(.18+dna[0]/255*.08),pulse=Math.sin(t*(.5+dna[4]/255*1.2))*.5+.5;const ecy=Math.sin(t*.9)*baseR*.05;const nT=2+Math.floor(dna[1]/255*5),len=baseR*(1+dna[2]/255*1.4),wob=dna[3]/255*.45;let glowR=baseR*(2.1+dna[14]/255*2);let ag=ctx.createRadialGradient(0,ecy,0,0,ecy,glowR);ag.addColorStop(0,`hsla(${hues[0]},80%,55%,${.16*(1+pulse*.3)})`);ag.addColorStop(1,'transparent');ctx.fillStyle=ag;ctx.beginPath();ctx.arc(0,ecy,glowR,0,Math.PI*2);ctx.fill();for(let i=0;i<nT;i++){let a=i/nT*Math.PI*2+Math.sin(t*.5+i*.7)*wob,tx=Math.cos(a)*len,ty=ecy+Math.sin(a)*len*.85,cx=Math.cos(a+.3)*len*.5,cy=ecy+Math.sin(a+.3)*len*.45,tw=4+dna[(i+3)%16]/255*5;ctx.lineCap='round';ctx.strokeStyle='rgba(0,0,0,.9)';ctx.lineWidth=tw+4;ctx.beginPath();ctx.moveTo(0,ecy);ctx.quadraticCurveTo(cx,cy,tx,ty);ctx.stroke();ctx.strokeStyle=`hsla(${hues[i%3]},80%,60%,.78)`;ctx.lineWidth=tw;ctx.beginPath();ctx.moveTo(0,ecy);ctx.quadraticCurveTo(cx,cy,tx,ty);ctx.stroke()}let pts=[];for(let i=0;i<10;i++){let a=i/10*Math.PI*2-Math.PI/2,n=Math.sin(t*.85+i*.95)*(2+dna[3]/255*5);pts.push([Math.cos(a)*(baseR+n),ecy+Math.sin(a)*(baseR+n)])}function path(){ctx.beginPath();for(let i=0;i<pts.length;i++){let p0=pts[(i-1+10)%10],p1=pts[i],p2=pts[(i+1)%10],p3=pts[(i+2)%10],c1=[p1[0]+(p2[0]-p0[0])/6,p1[1]+(p2[1]-p0[1])/6],c2=[p2[0]-(p3[0]-p1[0])/6,p2[1]-(p3[1]-p1[1])/6];if(!i)ctx.moveTo(p1[0],p1[1]);ctx.bezierCurveTo(c1[0],c1[1],c2[0],c2[1],p2[0],p2[1])}ctx.closePath()}path();ctx.fillStyle=`hsl(${hues[0]},65%,${47+hit*35}%)`;ctx.fill();path();ctx.lineWidth=5;ctx.strokeStyle='rgba(0,0,0,.92)';ctx.stroke();ctx.save();path();ctx.clip();let sg=ctx.createLinearGradient(0,-baseR,0,baseR);sg.addColorStop(.45,'transparent');sg.addColorStop(1,'rgba(0,0,0,.46)');ctx.fillStyle=sg;ctx.fillRect(-baseR*2,-baseR*2,baseR*4,baseR*4);ctx.restore();for(let e=-1;e<=1;e+=2){let ex=e*bas function drawAttack(ctx,a,W,H,ground,t,phase,pt){let vals=a.vals,form=attackForm(vals),el=attackElement(vals);const hue=Math.round(vals[BID.attack_hue]/255*359),impactHue=Math.round(vals[BID.impact_hue]/255*359),sat=40+vals[BID.saturation]/255*60,light=38+vals[BID.lightness]/255*44;const fromX=a.side==='left'?W*.31:W*.69,toX=a.side==='left'?W*.69:W*.31,dir=a.side==='left'?1:-1,y=ground-H*.28;const progress=phase==='anticipation'?0:phase==='strike'?pt:phase==='impact'?1:1;const x=lerp(fromX,toX,easeOut(progress));if(phase==='anticipation')return;if(form==='slash'||form==='thrust'){let alpha=phase==='recovery'?(1-pt)*.6:1;ctx.save();ctx.translate(x,y);ctx.scale(dir,1);ctx.strokeStyle=`hsla(${hue},${sat}%,${light+20}%,${alpha})`;ctx.lineCap='round';ctx.lineWidth=6+vals[BID.trail_thickness]/255*18;if(form==='slash'){ctx.beginPath();ctx.arc(0,0,60+vals[BID.arc_width],-1.2,1.2);ctx.stroke();}else{ctx.beginPath();ctx.moveTo(-120,0);ctx.lineTo(40,0);ctx.stroke();ctx.beginPath();ctx.moveTo(45,0);ctx.lineTo(15,-22);ctx.lineTo(15,22);ctx.closePath();ctx.fillStyle=`hsla(${hue},${sat}%,${light+25}%,${alpha})`;ctx.fill()}ctx.restore()}else if(form==='projectile'||form==='beam'){ctx.save();ctx.strokeStyle=`hsla(${hue},${sat}%,${light+20}%,.9)`;ctx.lineCap='round';ctx.lineWidth=form==='beam'?12+vals[BID.beam_width]/255*36:5+vals[BID.trail_thickness]/255*12;if(form==='beam'){ctx.beginPath();ctx.moveTo(fromX,y);ctx.lineTo(toX,y);ctx.stroke()}else{ctx.beginPath();ctx.moveTo(x-dir*95,y);ctx.lineTo(x,y);ctx.stroke();ctx.fillStyle=`hsla(${hue},${sat}%,90%,.95)`;ctx.beginPath();ctx.arc(x,y,18,0,Math.PI*2);ctx.fill()}ctx.restore()}else if(form==='burst'){let r=(80+vals[BID.burst_radius])*easeOut(phase==='impact'?pt:progress);ctx.strokeStyle=`hsla(${hue},${sat}%,${light+20}%,${Math.max(0,1-pt*.8)})`;ctx.lineWidth=3;for(let i=0;i<3;i++){ctx.beginPath();ctx.arc((fromX+toX)/2,y,r*(.45+i*.3),0,Math.PI*2);ctx.stroke()}}else{for(let i=0;i<5;i++){let yy=y+Math.sin(i*1.7)*45,xx=toX+(i-2)*18;ctx.str function drawFrame(forceT=null){const now=performance.now(),t=(now-t0)/1000,W=canvas.width,H=canvas.height;let ground=renderEnv(ctx,W,H,t);let phase='idle',pt=0,a=active;let offL=0,offR=0,hitL=left.flash,hitR=right.flash;if(a){let local=scrubMode?scrubT:(forceT??(now-a.start)/a.dur);local=clamp(local,0,1);$('scrub').value=Math.round(local*1000);[phase,pt]=getPhase(a.vals,local);$('phase-pill').textContent=phase.toUpperCase();if(local>.43&&!a.hitDone)resolveHit(a);let dir=a.side==='left'?1:-1;if(phase==='anticipation'){if(a.side==='left')offL=-30*pt;else offR=30*pt}else if(phase==='strike'){if(a.side==='left')offL=170*easeOut(pt);else offR=-170*easeOut(pt)}else if(phase==='impact'){if(a.side==='right')hitL=1-pt;else hitR=1-pt}else if(phase==='recovery'){if(a.side==='left')offL=lerp(170,0,smooth(pt));else offR=lerp(-170,0,smooth(pt))}drawAttack(ctx,a,W,H,ground,local,phase,pt);if(local>=1&&!scrubMode){let old=active;active=null;$('phase-pill').textContent='IDLE';afterAttack(old)}}else{$('phase-pill').textContent='IDLE'}renderCreatureOn(ctx,left,W*.25+offL,ground-120,330,t,false,hitL);renderCreatureOn(ctx,right,W*.75+offR,ground-120,300,t*1.04,true,hitR);left.flash=Math.max(0,left.flash-.04);right.flash=Math.max(0,right.flash-.04);if(left.status||right.status){ctx.fillStyle='rgba(0,0,0,.2)';ctx.fillRect(0,0,W,H)}}
function loop(){drawFrame();requestAnimationFrame(loop)}
function exportFrame(){drawFrame();let a=document.createElement('a');a.href=canvas.toDataURL('image/png');a.download='eidolon-battle-frame.png';a.click()}function exportSpritesheet(){const cols=6,rows=4,w=320,h=180,sheet=document.createElement('canvas');sheet.width=cols*w;sheet.height=rows*h;const sctx=sheet.getContext('2d');let saved=active||{att:left,def:right,move:left.moves[lastMove]||left.moves[0],vals:attackValuesForMove(left.moves[lastMove]||left.moves[0]),start:performance.now(),dur:1200,resolve:false,hitDone:true,side:'left'};let prev=active;active=saved;scrubMode=true;for(let i=0;i<cols*rows;i++){scrubT=i/(cols*rows-1);drawFrame(scrubT);sctx.drawImage(canvas,(i%cols)*w,Math.floor(i/cols)*h,w,h)}active=prev;scrubMode=false;let a=document.createElement('a');a.href=sheet.toDataURL('image/png');a.download='eidolon-battle-spritesheet.png';a.click();toast('spritesheet exported')}function exportScene(){const scene={format:'eidolon-battle-scene/1',createdAt:new Date().toISOString(),left:left.gene,right:right.gene,environment:envSpec,attacks};let a=document.createElement('a');a.href=URL.createObjectURL(new Blob([JSON.stringify(scene,null,2)],{type:'application/json'}));a.download='eidolon-battle-scene.json';a.click();setTimeout(()=>URL.revokeObjectURL(a.href),1000)}function clearStorage(){localStorage.removeItem('eidolon-battle-theatre-scene');toast('local cleared')}
function saveLocal(){try{localStorage.setItem('eidolon-battle-theatre-scene',JSON.stringify({left:left.gene,right:right.gene,envSpec,attacks}))}catch{}}function loadLocal(){try{let s=JSON.parse(localStorage.getItem('eidolon-battle-theatre-scene')||'null');if(s){left=makeBoard(s.left||DEFAULT_GENE);right=makeBoard(s.right||makeRandomGene());envSpec=s.envSpec||null;attacks=s.attacks||[];refreshAttackSelect()}}catch{}}
let drag=0;window.addEventListener('dragenter',e=>{e.preventDefault();drag++;$('drop').classList.add('show')});window.addEventListener('dragover',e=>e.preventDefault());window.addEventListener('dragleave',e=>{drag=Math.max(0,drag-1);if(!drag)$('drop').classList.remove('show')});window.addEventListener('drop',async e=>{e.preventDefault();drag=0;$('drop').classList.remove('show');for(const f of e.dataTransfer.files){let text=await f.text();let slot=/environment|env/i.test(f.name)?'env':/attack|template/i.test(f.name)?'attack':(!left?'left':'right');try{await ingest(text,f.name,slot)}catch(err){console.warn(err)}}toast('drop import complete')});
