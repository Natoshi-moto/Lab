  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(kind === 'foot' ? 0 : alongAng);
  let widthMul, heightMul, isClaw = false;
  if(shape < 0.33){
    isClaw = true;
    widthMul = 1.0 + shape*0.6;
    heightMul = 0.5 + shape*1.2;
  } else if(shape < 0.66){
    const k = (shape - 0.33) / 0.33;
    widthMul = 0.95 + k*0.2;
    heightMul = 0.95 + k*0.05;
  } else {
    const k = (shape - 0.66) / 0.34;
    widthMul = 1.15 + k*0.85;
    heightMul = 0.95 - k*0.5;
  }
  const w = size * widthMul, h = size * heightMul;
  ctx.lineWidth = outlineW;
  ctx.strokeStyle = 'rgba(0,0,0,0.92)';
  ctx.fillStyle = `hsl(${huePri},${sat}%,${light}%)`;
  if(isClaw){
    ctx.beginPath();
    ctx.moveTo(-w*0.6, -h*0.65);
    ctx.quadraticCurveTo(-w*0.2, -h*1.05, w*0.85, 0);
    ctx.quadraticCurveTo(-w*0.2, h*1.05, -w*0.6, h*0.65);
    ctx.closePath();
  } else {
    const xOff = (kind === 'foot') ? w*0.15 : 0;
    const yOff = (kind === 'foot') ? -h*0.05 : 0;
    ctx.beginPath();
    ctx.ellipse(xOff, yOff, w, h, 0, 0, Math.PI*2);
  }
  ctx.fill(); ctx.stroke();
  // Highlight
  ctx.fillStyle = `hsla(${huePri},${sat*0.5}%,90%,0.25)`;
  ctx.beginPath();
  ctx.ellipse(-w*0.15, -h*0.25, w*0.4, h*0.3, 0, 0, Math.PI*2);
  ctx.fill();
  ctx.restore();
}


/* ═══════════════════════════════════════════════════════════════
   SURFACE MARKS — with > 180 sub-modes
   - spots > 180  → ring halos (concentric glow rings)
   - runes > 180  → vein branches (luminous root system)
   - facets > 180 → scale overlays (overlapping semicircles)
   ═══════════════════════════════════════════════════════════════ */
function drawBlobMarks(ctx, cx, bcy, baseR, sx, sy, t,
                       spotN, runeN, facetN,
                       spotRaw, runeRaw, facetRaw,
                       huePri, hueAcc, hueGlow, sat, pulse){
  // SPOTS (or halo rings if > 180)
  if(spotN > 0){
    const r1 = mulberry32(spotN*53 + 1);
    const haloMode = spotRaw > 180;
    for(let i=0; i<spotN; i++){
      const sa = r1()*Math.PI*2;
      const sr_ = baseR * (0.15 + r1()*0.55);
      const sxp = cx + Math.cos(sa)*sr_*sx;
      const syp = bcy + Math.sin(sa)*sr_*sy;
      const ssz = baseR * (0.05 + r1()*0.10);
      // Core spot
      const lg = ctx.createRadialGradient(sxp,syp,0, sxp,syp,ssz*2.5);
      lg.addColorStop(0, `hsla(${hueGlow},95%,90%,${0.7+pulse*0.2})`);
      lg.addColorStop(0.4,`hsla(${hueGlow},85%,75%,0.3)`);
      lg.addColorStop(1,'transparent');
      ctx.fillStyle = lg;
      ctx.beginPath(); ctx.arc(sxp,syp, ssz*2.5, 0, Math.PI*2); ctx.fill();
      // Halo rings on top
      if(haloMode){
        ctx.strokeStyle = `hsla(${hueGlow},95%,82%,${0.45+pulse*0.25})`;
        ctx.lineWidth = 1.2;
        for(let k=1; k<=3; k++){
          ctx.beginPath();
          ctx.arc(sxp, syp, ssz*2.5*(1 + k*0.55) + Math.sin(t*1.4 + i + k)*1.2, 0, Math.PI*2);
          ctx.stroke();
        }
      }
    }
  }
  // RUNES (or vein branches if > 180)
  if(runeN > 0){
    const r2 = mulberry32(runeN*71 + 7);
    if(runeRaw > 180){
      // Vein branches: starting from center, branching outward
      ctx.strokeStyle = `hsla(${hueGlow},92%,78%,${0.40 + pulse*0.18})`;
      ctx.lineCap = 'round';
      for(let i=0; i<runeN; i++){
        const startA = r2()*Math.PI*2;
        let x = cx + Math.cos(startA)*baseR*0.05*sx;
        let y = bcy + Math.sin(startA)*baseR*0.05*sy;
        let a = startA;
        const steps = 4 + Math.floor(r2()*4);
        ctx.lineWidth = 2.0;
        ctx.beginPath();
        ctx.moveTo(x, y);
        for(let s=0; s<steps; s++){
          const stepLen = baseR * (0.08 + r2()*0.18);
          a += (r2() - 0.5) * 0.9;
          x += Math.cos(a) * stepLen * sx;
          y += Math.sin(a) * stepLen * sy;
          ctx.lineTo(x, y);
          // Branch off occasionally
          if(r2() > 0.6 && s < steps-1){
            const bx = x, by = y;
            let ba = a + (r2()-0.5)*1.2;
            ctx.save();
            ctx.lineWidth = 1.2;
            ctx.beginPath();
            ctx.moveTo(bx, by);
            const bSteps = 2 + Math.floor(r2()*2);
            let bxc = bx, byc = by;
            for(let bs=0; bs<bSteps; bs++){
              const bLen = baseR * (0.05 + r2()*0.10);
              ba += (r2()-0.5)*0.8;
              bxc += Math.cos(ba)*bLen*sx;
              byc += Math.sin(ba)*bLen*sy;
              ctx.lineTo(bxc, byc);
            }
            ctx.stroke();
            ctx.restore();
            ctx.beginPath();
            ctx.moveTo(x, y);
            ctx.lineWidth = 2.0;
          }
        }
        ctx.stroke();
      }
    } else {
      ctx.strokeStyle = `hsla(${hueAcc},80%,70%,0.30)`;
      ctx.lineWidth = 1.5;
      for(let i=0; i<runeN; i++){
        const ra = r2()*Math.PI*2;
        const rr = baseR * (0.1 + r2()*0.45);
        const rx = cx + Math.cos(ra)*rr*sx;
        const ry = bcy + Math.sin(ra)*rr*sy;
        const rs = baseR * (0.06 + r2()*0.12);
        ctx.beginPath();
        ctx.moveTo(rx, ry-rs); ctx.lineTo(rx+rs*0.6, ry+rs*0.5);
        ctx.moveTo(rx, ry-rs); ctx.lineTo(rx-rs*0.6, ry+rs*0.5);
        ctx.moveTo(rx-rs*0.4, ry+rs*0.1); ctx.lineTo(rx+rs*0.4, ry+rs*0.1);
        ctx.stroke();
      }
    }
  }
  // FACETS (or scale overlays if > 180)
  if(facetN > 0){
    if(facetRaw > 180){
      // Scale overlays: tile semicircles over the surface (already clipped to body)
      const r3 = mulberry32(facetN * 89 + 13);
      const scaleSize = baseR * (0.06 + r3() * 0.09);
      const cols = Math.ceil((baseR * 2.5) / scaleSize);
      const rows = Math.ceil((baseR * 2.5) / scaleSize);
      const xStart = cx - cols*scaleSize/2;
      const yStart = bcy - rows*scaleSize/2;
      ctx.strokeStyle = `hsla(${hueGlow},80%,82%,0.32)`;
      ctx.lineWidth = 1.0;
      ctx.fillStyle = `hsla(${hueGlow},65%,${Math.max(20,Math.min(70,40))}%,0.10)`;
      for(let row=0; row<rows; row++){
        const y = yStart + row*scaleSize*0.7;
        const offset = (row % 2) * scaleSize*0.5;
        for(let col=0; col<cols; col++){
          const x = xStart + col*scaleSize + offset;
          ctx.beginPath();
          ctx.arc(x, y, scaleSize*0.55, Math.PI, 0); // upward-opening half-circle (downward arc)
          ctx.fill();
          ctx.stroke();
        }
      }
    } else {
      const r3 = mulberry32(facetN*89 + 13);
      ctx.strokeStyle = `hsla(${hueGlow},85%,88%,0.32)`;
      ctx.lineWidth = 1.0;
      for(let i=0; i<facetN; i++){
        const fa = r3()*Math.PI*2;
        const fr = baseR * (0.1 + r3()*0.7);
        const fx = cx + Math.cos(fa)*fr*sx;
        const fy = bcy + Math.sin(fa)*fr*sy;
        const fs = baseR * (0.05 + r3()*0.10);
        ctx.beginPath();
        ctx.moveTo(fx, fy-fs); ctx.lineTo(fx+fs, fy);
        ctx.lineTo(fx, fy+fs); ctx.lineTo(fx-fs, fy);
        ctx.closePath(); ctx.stroke();
      }
    }
  }
}

/* ── drawMarksInPath: same as blob marks but for biped/quad body parts.
   Already wrapped in clip via pathFn, so we can stamp anywhere. ── */
function drawMarksInPath(ctx, pathFn, cx, cy, hwid, hht, rot, t,
                        spotN, runeN, facetN,
                        spotRaw, runeRaw, facetRaw,
                        huePri, hueAcc, hueGlow, sat, pulse){
  ctx.save();
  pathFn(); ctx.clip();
  const c = Math.cos(rot), s = Math.sin(rot);
  function R(lx, ly){ return [cx + lx*c - ly*s, cy + lx*s + ly*c]; }

  if(spotN > 0){
    const r1 = mulberry32(spotN*53 + 1);
    const haloMode = spotRaw > 180;
    for(let i=0; i<spotN; i++){
      const sa = r1()*Math.PI*2;
      const sr_ = (0.15 + r1()*0.7);
      const lx = Math.cos(sa)*sr_*hwid;
      const ly = Math.sin(sa)*sr_*hht;
      const [sxp, syp] = R(lx, ly);
      const ssz = Math.min(hwid, hht) * (0.08 + r1()*0.14);
      const lg = ctx.createRadialGradient(sxp,syp,0, sxp,syp,ssz*2.5);
      lg.addColorStop(0, `hsla(${hueGlow},95%,90%,${0.7+pulse*0.2})`);
      lg.addColorStop(0.4,`hsla(${hueGlow},85%,75%,0.3)`);
      lg.addColorStop(1,'transparent');
      ctx.fillStyle = lg;
      ctx.beginPath(); ctx.arc(sxp,syp, ssz*2.5, 0, Math.PI*2); ctx.fill();
      if(haloMode){
        ctx.strokeStyle = `hsla(${hueGlow},95%,82%,${0.45+pulse*0.25})`;
        ctx.lineWidth = 1.2;
        for(let k=1; k<=3; k++){
          ctx.beginPath();
          ctx.arc(sxp, syp, ssz*2.5*(1 + k*0.55) + Math.sin(t*1.4 + i + k)*1.2, 0, Math.PI*2);
          ctx.stroke();
        }
      }
    }
  }
  if(runeN > 0){
    const r2 = mulberry32(runeN*71 + 7);
    if(runeRaw > 180){
      ctx.strokeStyle = `hsla(${hueGlow},92%,78%,${0.40 + pulse*0.18})`;
      ctx.lineCap = 'round';
      const baseRad = Math.min(hwid, hht);
      for(let i=0; i<runeN; i++){
        const startA = r2()*Math.PI*2;
        const [sxv, syv] = R(Math.cos(startA)*0.05*hwid, Math.sin(startA)*0.05*hht);
        let x = sxv, y = syv;
        let a = startA;
        const steps = 4 + Math.floor(r2()*4);
        ctx.lineWidth = 2.0;
        ctx.beginPath();
        ctx.moveTo(x, y);
        for(let s_=0; s_<steps; s_++){
          const stepLen = baseRad * (0.08 + r2()*0.18);
          a += (r2() - 0.5) * 0.9;
          x += Math.cos(a) * stepLen;
          y += Math.sin(a) * stepLen;
          ctx.lineTo(x, y);
        }
        ctx.stroke();
      }
    } else {
      ctx.strokeStyle = `hsla(${hueAcc},80%,70%,0.30)`;
      ctx.lineWidth = 1.5;
      for(let i=0; i<runeN; i++){
        const ra = r2()*Math.PI*2;
        const rr = (0.1 + r2()*0.55);
        const lx = Math.cos(ra)*rr*hwid;
        const ly = Math.sin(ra)*rr*hht;
        const [rx, ry] = R(lx, ly);
        const rs = Math.min(hwid, hht) * (0.08 + r2()*0.14);
        ctx.beginPath();
        ctx.moveTo(rx, ry-rs); ctx.lineTo(rx+rs*0.6, ry+rs*0.5);
        ctx.moveTo(rx, ry-rs); ctx.lineTo(rx-rs*0.6, ry+rs*0.5);
        ctx.moveTo(rx-rs*0.4, ry+rs*0.1); ctx.lineTo(rx+rs*0.4, ry+rs*0.1);
        ctx.stroke();
      }
    }
  }
  if(facetN > 0){
    if(facetRaw > 180){
      // Scale overlays inside this part's bounding region
      const r3 = mulberry32(facetN * 89 + 13);
      const scaleSize = Math.min(hwid, hht) * (0.13 + r3() * 0.10);
      const cols = Math.ceil((hwid * 2.5) / scaleSize);
      const rows = Math.ceil((hht * 2.5) / scaleSize);
      ctx.strokeStyle = `hsla(${hueGlow},80%,82%,0.32)`;
      ctx.lineWidth = 1.0;
      ctx.fillStyle = `hsla(${hueGlow},65%,40%,0.10)`;
      for(let row=0; row<rows; row++){
        const lyy = -hht*1.2 + row*scaleSize*0.7;
        const offset = (row % 2) * scaleSize*0.5;
        for(let col=0; col<cols; col++){
          const lxx = -hwid*1.2 + col*scaleSize + offset;
          const [px, py] = R(lxx, lyy);
          ctx.beginPath();
          ctx.arc(px, py, scaleSize*0.55, Math.PI + rot, 0 + rot);
          ctx.fill();
          ctx.stroke();
        }
      }
    } else {
      const r3 = mulberry32(facetN*89 + 13);
      ctx.strokeStyle = `hsla(${hueGlow},85%,88%,0.32)`;
      ctx.lineWidth = 1.0;
      for(let i=0; i<facetN; i++){
        const fa = r3()*Math.PI*2;
        const fr = (0.1 + r3()*0.8);
        const lx = Math.cos(fa)*fr*hwid;
        const ly = Math.sin(fa)*fr*hht;
        const [fx, fy] = R(lx, ly);
        const fs = Math.min(hwid, hht) * (0.07 + r3()*0.14);
        ctx.beginPath();
        ctx.moveTo(fx, fy-fs); ctx.lineTo(fx+fs, fy);
        ctx.lineTo(fx, fy+fs); ctx.lineTo(fx-fs, fy);
        ctx.closePath(); ctx.stroke();
      }
    }
  }
  ctx.restore();
}


/* ═══════════════════════════════════════════════════════════════
   ANIMATION LOOP
   ═══════════════════════════════════════════════════════════════ */
function loop(){
  const canvas = document.getElementById('canvas');
  const now = (performance.now() - t0) / 1000;
  const dt = Math.max(0, Math.min(0.1, now - prevT));
  prevT = now;

  // blink update
  blinkCd -= dt;
  if(!blinkActive && blinkCd <= 0){
    blinkActive = true;
    blinkP = 0;
  }
  if(blinkActive){
    blinkP += dt / 0.15;
    if(blinkP >= 1){
      blinkActive = false;
      blinkP = 0;
      blinkCd = 2.5 + Math.random() * 4;
    }
  }

  // sweep update
  if(sweepIdx !== -1){
    const elapsed = now - sweepStart;
    const phase = (elapsed / SWEEP_PERIOD) * Math.PI * 2;
    const w = (Math.sin(phase) + 1) * 0.5; // 0..1
    const newVal = Math.round(w * 255);
    values[sweepIdx] = newVal;
    const sl = document.getElementById('slider-' + sweepIdx);
    const vl = document.getElementById('val-' + sweepIdx);
    if(sl) sl.value = newVal;
    if(vl) vl.textContent = newVal;
  }

  if(canvas.width > 0 && canvas.height > 0){
    render(canvas, now);
  }
  requestAnimationFrame(loop);
}

/* ═══════════════════════════════════════════════════════════════
   UI: build axes + handlers
   ═══════════════════════════════════════════════════════════════ */
function buildAxes(){
  const root = document.getElementById('axes');
  while(root.firstChild) root.removeChild(root.firstChild);

  // group axes by their group
  const groupMap = {};
  for(let i=0; i<AXES.length; i++){
    const g = AXES[i].group;
    if(!groupMap[g]) groupMap[g] = [];
    groupMap[g].push(i);
  }
  for(const g of GROUPS){
    const idxs = groupMap[g];
    if(!idxs) continue;

    const head = document.createElement('div');
    head.className = 'group-head';
    const title = document.createElement('span');
    title.className = 'group-title';
    title.textContent = g;
    head.appendChild(title);
    const rndBtn = document.createElement('button');
    rndBtn.className = 'group-rand';
    rndBtn.textContent = '⚄ rand';
    rndBtn.title = 'Randomize this group only';
    rndBtn.addEventListener('click', ()=>randomizeGroup(g));
    head.appendChild(rndBtn);
    root.appendChild(head);

    for(const i of idxs){
      const ax = AXES[i];
      const row = document.createElement('div');
      row.className = 'axis-row';

      const lab = document.createElement('input');
      lab.type = 'text';
      lab.className = 'axis-label';
      lab.value = labels[i];
      lab.spellcheck = false;
      lab.maxLength = 32;
      lab.addEventListener('change', e => onLabelChange(i, e.target.value));
      lab.addEventListener('blur',   e => onLabelChange(i, e.target.value));

      const sl = document.createElement('input');
      sl.type = 'range';
      sl.min = 0; sl.max = 255; sl.step = 1;
      sl.value = values[i];
      sl.id = 'slider-' + i;
      sl.className = 'axis-slider';
      sl.addEventListener('input', e => onSlide(i, +e.target.value, true));

      const val = document.createElement('span');
      val.className = 'axis-val';
      val.id = 'val-' + i;
      val.textContent = values[i];

      const sw = document.createElement('button');
      sw.className = 'axis-btn sweep';
      sw.textContent = '⇌';
      sw.title = 'Sweep this axis';
      sw.id = 'sw-' + i;
      sw.addEventListener('click', ()=>toggleSweep(i));

      const lk = document.createElement('button');
      lk.className = 'axis-btn lock';
      lk.textContent = locked[i] ? '◉' : '◯';
      lk.title = 'Lock this axis (excluded from randomize)';
      lk.id = 'lk-' + i;
      if(locked[i]) lk.classList.add('on');
      lk.addEventListener('click', ()=>toggleLock(i));

      row.appendChild(lab);
      row.appendChild(sl);
      row.appendChild(val);
      row.appendChild(sw);
      row.appendChild(lk);
      root.appendChild(row);
    }
  }
}

let _lastEmitT = 0;
function maybeEmitChange(){
  const now = performance.now();
  if(now - _lastEmitT > 200){
    _lastEmitT = now;
    kernelEmitCreatureChange();
  }
}

function onSlide(i, val, fromUser){
  values[i] = val;
  const vl = document.getElementById('val-' + i);
  if(vl) vl.textContent = val;
  if(fromUser){
    if(sweepIdx === i) stopSweep();
    clearSeedOnEdit();
    maybeEmitChange();
  }
}

function onLabelChange(i, text){
  const t = (text || '').trim();
  if(!t){
    const el = document.querySelectorAll('.axis-label')[i];
    if(el) el.value = labels[i];
    return;
  }
  labels[i] = t;
  renamed[i] = (t !== AXES[i].label);
}

function toggleSweep(i){
  if(sweepIdx === i){ stopSweep(); return; }
  // clear previous sweep button state
  if(sweepIdx !== -1){
    const prev = document.getElementById('sw-' + sweepIdx);
    if(prev) prev.classList.remove('on');
  }
  sweepIdx = i;
  sweepStart = (performance.now() - t0) / 1000;
  sweepBaseVal = values[i];
  const btn = document.getElementById('sw-' + i);
  if(btn) btn.classList.add('on');
  document.getElementById('sweep-indicator').classList.add('on');
}

function stopSweep(){
  if(sweepIdx === -1) return;
  const btn = document.getElementById('sw-' + sweepIdx);
  if(btn) btn.classList.remove('on');
  sweepIdx = -1;
  document.getElementById('sweep-indicator').classList.remove('on');
}

function toggleLock(i){
  locked[i] = !locked[i];
  const btn = document.getElementById('lk-' + i);
  if(btn){
    btn.textContent = locked[i] ? '◉' : '◯';
    btn.classList.toggle('on', locked[i]);
  }
}

function syncAllSliders(){
  for(let i=0; i<N; i++){
    const sl = document.getElementById('slider-' + i);
    const vl = document.getElementById('val-' + i);
    if(sl) sl.value = values[i];
    if(vl) vl.textContent = values[i];
  }
}

function randomize(){
  if(sweepIdx !== -1) stopSweep();
  // If any axes are locked, randomize unlocked individually (preserve locks).
  // Otherwise use a seed so it's reproducible.
  const anyLocked = locked.some(Boolean);
  if(anyLocked){
    for(let i=0; i<N; i++){
      if(!locked[i]) values[i] = Math.floor(Math.random() * 256);
    }
    currentSeed = null;
    syncAllSliders();
    refreshSeedUI();
    setStatus('randomized (locks preserved)');
    kernelEmitCreatureChange();
  } else {
    const seed = (Math.random() * 0xFFFFFFFF) >>> 0;
    applySeed(seed);
    setStatus(`randomized · seed ${formatSeed(currentSeed)}`);
  }
}

function randomizeGroup(g){
  if(sweepIdx !== -1) stopSweep();
  for(let i=0; i<N; i++){
    if(AXES[i].group === g && !locked[i]){
      values[i] = Math.floor(Math.random() * 256);
    }
  }
  clearSeedOnEdit();
  syncAllSliders();
  setStatus('randomized group: ' + g);
  kernelEmitCreatureChange();
}

function resetAll(){
  if(sweepIdx !== -1) stopSweep();
  for(let i=0; i<N; i++){
    values[i] = AXES[i].default;
    labels[i] = AXES[i].label;
    renamed[i] = false;
    locked[i] = false;
  }
  currentSeed = null;
  buildAxes();
  refreshSeedUI();
  setStatus('reset to defaults');
  kernelEmitCreatureChange();
}

function setStatus(msg){
  const el = document.getElementById('status');
  if(el) el.textContent = msg;
}

/* ═══════════════════════════════════════════════════════════════
   EXPORT — frame + sprite sheet
   ═══════════════════════════════════════════════════════════════ */
function safeName(s){
  return (s || 'untitled').toLowerCase()
    .replace(/[^a-z0-9]+/g, '-')
    .replace(/^-+|-+$/g, '')
    .slice(0, 48) || 'untitled';
}

function toggleExportMenu(e){
  e.stopPropagation();
  const m = document.getElementById('export-menu');
  if(m) m.classList.toggle('show');
}

function downloadBlob(blob, filename){
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a);
  a.click();
  setTimeout(()=>{ document.body.removeChild(a); URL.revokeObjectURL(url); }, 100);
}

function exportFrame(){
  document.getElementById('export-menu').classList.remove('show');
  const size = parseInt(document.getElementById('export-size').value, 10) || 256;
  const tmp = document.createElement('canvas');
  tmp.width = size; tmp.height = size;
  const now = (performance.now() - t0) / 1000;
  render(tmp, now);
  tmp.toBlob(blob => {
    if(!blob){ setStatus('export failed'); return; }
    const fn = safeName(creatureName) + '-' + size + 'px.png';
    downloadBlob(blob, fn);
    setStatus('exported: ' + fn);
  }, 'image/png');
}

function exportSpriteSheet(frames){
  document.getElementById('export-menu').classList.remove('show');
  const frameSize = parseInt(document.getElementById('export-size').value, 10) || 256;
  const ANIM_CYCLE = 3.2;
  // Layout: 16 -> 4x4, 32 -> 8x4. Keep cols<=8 for reasonable sheet width.
  let cols, rows;
  if(frames === 16){ cols = 4; rows = 4; }
  else if(frames === 32){ cols = 8; rows = 4; }
  else { cols = Math.ceil(Math.sqrt(frames)); rows = Math.ceil(frames / cols); }

  const sheetW = cols * frameSize;
  const sheetH = rows * frameSize;
  const sheet = document.createElement('canvas');
  sheet.width = sheetW; sheet.height = sheetH;
  const sctx = sheet.getContext('2d');

  const tmp = document.createElement('canvas');
  tmp.width = frameSize; tmp.height = frameSize;

  // Save state we will temporarily override for deterministic frames
  const savedBlinkCd = blinkCd;
  const savedBlinkP = blinkP;
  const savedBlinkActive = blinkActive;
  const savedCursorTarget = { x: cursorTarget.x, y: cursorTarget.y };
  const savedCursorWander = { x: cursorWander.x, y: cursorWander.y };
  // Force eyes to center during export; suppress blinking
  cursorTarget.x = 0; cursorTarget.y = 0;
  cursorWander.x = 0; cursorWander.y = 0;
  blinkCd = 999; blinkP = 0; blinkActive = false;

  for(let f=0; f<frames; f++){
    const tFrame = (f / frames) * ANIM_CYCLE;
    render(tmp, tFrame);
    const cx = (f % cols) * frameSize;
    const cy = Math.floor(f / cols) * frameSize;
    sctx.drawImage(tmp, cx, cy);
  }

  // Restore
  blinkCd = savedBlinkCd;
  blinkP = savedBlinkP;
  blinkActive = savedBlinkActive;
  cursorTarget.x = savedCursorTarget.x;
  cursorTarget.y = savedCursorTarget.y;
  cursorWander.x = savedCursorWander.x;
  cursorWander.y = savedCursorWander.y;

  const slug = safeName(creatureName);
  const seedStr = currentSeed !== null ? formatSeed(currentSeed) : null;
  const manifest = {
    name: creatureName,
    seed: seedStr,
    frames: frames,
    cols: cols,
    rows: rows,
    frameWidth: frameSize,
    frameHeight: frameSize,
    fps: Math.round(frames / ANIM_CYCLE),
    loop: true,
    dna: DNA_ORDER.map(id => values[ID_INDEX[id]]),
    hues: [
      Math.round((v('hue_primary')/255) * 359),
      Math.round((v('hue_accent') /255) * 359),
      Math.round((v('hue_glow')   /255) * 359)
    ]
  };

  sheet.toBlob(blob => {
    if(!blob){ setStatus('sprite export failed'); return; }
    downloadBlob(blob, slug + '.sprite.png');
    const jblob = new Blob([JSON.stringify(manifest, null, 2)], { type:'application/json' });
    downloadBlob(jblob, slug + '.sprite.json');
    setStatus(`exported sprite sheet: ${frames}f @ ${frameSize}px`);
  }, 'image/png');
}

/* ═══════════════════════════════════════════════════════════════
   SAVE / LOAD — eidolon-forge/1 (with optional seed)
   Backward compat with eidolon-forge/1 (no seed) and vibe/1 mints
   ═══════════════════════════════════════════════════════════════ */
function buildSpec(){
  const axes = [];
  for(let i=0; i<N; i++){
    axes.push({
      id: AXES[i].id,
      value: values[i],
      label: renamed[i] ? labels[i] : undefined,
      locked: locked[i] ? true : undefined
    });
  }
  return {
    format: 'eidolon-forge/1',
    name: creatureName,
    seed: currentSeed !== null ? formatSeed(currentSeed) : null,
    axes: axes
  };
}

function saveCreature(){
  const spec = buildSpec();
  const blob = new Blob([JSON.stringify(spec, null, 2)], { type:'application/json' });
  const safe = safeName(creatureName);
  downloadBlob(blob, safe + '.eidolon.json');
  const seedSfx = currentSeed !== null ? ' · seed ' + formatSeed(currentSeed) : '';
  setStatus(`saved: ${safe}.eidolon.json${seedSfx}`);
}

function onLoadFile(input){
  const file = input.files && input.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const txt = ev.target.result;
      const data = JSON.parse(txt);
      if(!data || typeof data !== 'object'){ setStatus('load: invalid file'); return; }
      if(data.format === 'eidolon-forge/1' && Array.isArray(data.axes)){
        // Reset to defaults first, then overlay
        for(let i=0; i<N; i++){
          values[i] = AXES[i].default;
          labels[i] = AXES[i].label;
          renamed[i] = false;
          locked[i] = false;
        }
        for(const a of data.axes){
          const idx = ID_INDEX[a.id];
          if(idx === undefined) continue;
          if(typeof a.value === 'number') values[idx] = Math.max(0, Math.min(255, a.value|0));
          if(typeof a.label === 'string' && a.label.length){ labels[idx] = a.label; renamed[idx] = true; }
          if(a.locked === true) locked[idx] = true;
        }
        if(typeof data.name === 'string' && data.name.length){
          creatureName = data.name;
          document.getElementById('name-field').value = creatureName;
        }
        // Seed: parse if present, otherwise null
        if(typeof data.seed === 'string' && data.seed.length){
          const s = parseSeed(data.seed);
          currentSeed = (s !== null) ? s : null;
        } else if(typeof data.seed === 'number'){
          currentSeed = (data.seed >>> 0);
        } else {
          currentSeed = null;
        }
        buildAxes();
        refreshSeedUI();
        const seedSfx = currentSeed !== null ? ' · seed ' + formatSeed(currentSeed) : '';
        setStatus(`loaded: ${file.name}${seedSfx}`);
        kernelEmitCreatureChange();
      } else if(data.format === 'vibe/1' && data.payload && Array.isArray(data.payload.dna)){
        // Mint envelope: payload.dna is in DNA_ORDER (alphabetical)
        for(let i=0; i<N; i++){
          values[i] = AXES[i].default;
          labels[i] = AXES[i].label;
          renamed[i] = false;
          locked[i] = false;
        }
        const dna = data.payload.dna;
        for(let k=0; k<DNA_ORDER.length && k<dna.length; k++){
          const idx = ID_INDEX[DNA_ORDER[k]];
          if(idx === undefined) continue;
          const vv = dna[k];
          if(typeof vv === 'number') values[idx] = Math.max(0, Math.min(255, vv|0));
        }
        if(typeof data.name === 'string' && data.name.length){
          creatureName = data.name;
          document.getElementById('name-field').value = creatureName;
        } else if(data.payload && typeof data.payload.name === 'string'){
          creatureName = data.payload.name;
          document.getElementById('name-field').value = creatureName;
        }
        if(data.payload && typeof data.payload.seed === 'string'){
          const s = parseSeed(data.payload.seed);
          currentSeed = (s !== null) ? s : null;
        } else if(data.payload && typeof data.payload.seed === 'number'){
          currentSeed = (data.payload.seed >>> 0);
        } else {
          currentSeed = null;
        }
        buildAxes();
        refreshSeedUI();
        setStatus(`loaded mint: ${file.name}`);
        kernelEmitCreatureChange();
      } else {
        setStatus('load: unknown format');
      }
    } catch(err){
      setStatus('load: parse error');
    } finally {
      input.value = '';
    }
  };
  reader.onerror = ()=>{ setStatus('load: read error'); input.value=''; };
  reader.readAsText(file);
}

/* ═══════════════════════════════════════════════════════════════
   MINT — vibe/1 envelope. Preserved birthHash semantics.
   ═══════════════════════════════════════════════════════════════ */
function canonical(obj){
  // Stable JSON: sort keys recursively, no whitespace.
  if(obj === null || typeof obj !== 'object') return JSON.stringify(obj);
  if(Array.isArray(obj)){
    return '[' + obj.map(canonical).join(',') + ']';
  }
  const keys = Object.keys(obj).sort();
  const parts = [];
  for(const k of keys){
    parts.push(JSON.stringify(k) + ':' + canonical(obj[k]));
  }
  return '{' + parts.join(',') + '}';
}

async function sha256hex(str){
  const enc = new TextEncoder();
  const buf = enc.encode(str);
  if(crypto && crypto.subtle && crypto.subtle.digest){
    const h = await crypto.subtle.digest('SHA-256', buf);
    const bytes = new Uint8Array(h);
    let out = '';
    for(let i=0; i<bytes.length; i++) out += bytes[i].toString(16).padStart(2,'0');
    return out;
  }
  // Fallback (very unlikely path in modern browsers): a deterministic FNV-1a 256-ish digest.
  // Not cryptographically strong, but provides a deterministic id so mint isn't blocked.
  let h1 = 0x811c9dc5, h2 = 0xdeadbeef, h3 = 0x41c6ce57, h4 = 0x9e3779b9;
  for(let i=0; i<buf.length; i++){
    h1 ^= buf[i]; h1 = Math.imul(h1, 16777619) >>> 0;
    h2 = (Math.imul(h2 ^ buf[i], 2654435761)) >>> 0;
    h3 = (Math.imul(h3 ^ buf[i], 40503)) >>> 0;
    h4 = (Math.imul(h4 ^ buf[i], 2246822507)) >>> 0;
  }
  return [h1,h2,h3,h4].map(x=>x.toString(16).padStart(8,'0')).join('').padEnd(64,'0').slice(0,64);
}

function makeNonce(){
  const a = new Uint8Array(16);
  if(crypto && crypto.getRandomValues) crypto.getRandomValues(a);
  else for(let i=0; i<16; i++) a[i] = Math.floor(Math.random()*256);
  let out = '';
  for(let i=0; i<a.length; i++) out += a[i].toString(16).padStart(2,'0');
  return out;
}

function dnaArray(){
  return DNA_ORDER.map(id => values[ID_INDEX[id]]);
}

async function mintCreature(){
  try {
    const dna = dnaArray();
    const nonce = makeNonce();
    // birthHash is computed over canonical({nonce, dna}) — UNCHANGED for compat with Library
    const birthInput = canonical({ nonce: nonce, dna: dna });
    const birthHash = await sha256hex(birthInput);
    const hues = [
      Math.round((v('hue_primary')/255) * 359),
      Math.round((v('hue_accent') /255) * 359),
      Math.round((v('hue_glow')   /255) * 359)
    ];
    const seedStr = currentSeed !== null ? formatSeed(currentSeed) : null;
    const payload = {
      name: creatureName,
      dna: dna,
      nonce: nonce,
      hues: hues,
      seed: seedStr
    };
    const contentInput = canonical(payload);
    const contentHash = await sha256hex(contentInput);
    const envelope = {
      format: 'vibe/1',
      id: birthHash,
      name: creatureName,
      birthHash: birthHash,
      contentHash: contentHash,
      payload: payload,
      mintedAt: new Date().toISOString()
    };
    // Self-verify
    const verifyHash = await sha256hex(canonical({ nonce: nonce, dna: dna }));
    if(verifyHash !== birthHash){
      setStatus('mint: hash mismatch (aborted)');
      return;
    }
    const blob = new Blob([JSON.stringify(envelope, null, 2)], { type:'application/json' });
    const safe = safeName(creatureName);
    downloadBlob(blob, safe + '.vibe.json');
    const seedSfx = currentSeed !== null ? ' · seed ' + formatSeed(currentSeed) : '';
    setStatus(`minted ${birthHash.slice(0,24)}…${seedSfx}`);
    kernelEmit('nexus.notify', { className:'commit', title:'Creature minted', body: creatureName });
  } catch(err){
    setStatus('mint: error');
  }
}

/* ═══════════════════════════════════════════════════════════════
   MANAGED-BLOCK HANDSHAKE — degrades silently with no kernel
   ═══════════════════════════════════════════════════════════════ */
const MANIFEST = {
  emits: ['nexus.notify', 'nexus.launch', 'eidolon.creature.selected'],
  consumes: [],
  app: {
    title: 'Eidolon Forge Pro',
    icon: '◆',
    description: 'Creature forge — pro edition',
    visible: true
  }
};
let _kernelPort = null;
window.addEventListener('message', e => {
  const d = e.data;
  if(!d || d.type !== 'BOOT') return;
  if(!e.ports || !e.ports.length) return;
  _kernelPort = e.ports[0];
  _kernelPort.onmessage = ev => {
    const m = ev.data;
    if(!m) return;
    if(m.type === 'PING'){
      try { _kernelPort.postMessage({ type:'PONG', nonce: m.nonce }); } catch(_){}
    }
  };
  try { _kernelPort.postMessage({ type:'DECLARE', manifest: MANIFEST }); } catch(_){}
  try { _kernelPort.postMessage({ type:'MOUNT_ACK' }); } catch(_){}
});

function kernelEmit(channel, payload){
  if(!_kernelPort) return;
  try { _kernelPort.postMessage({ type:'PUB', channel: channel, payload: payload }); } catch(_){}
}

function kernelEmitCreatureChange(){
  if(!_kernelPort) return;
  kernelEmit('eidolon.creature.selected', {
    dna: dnaArray(),
    hues: [
      Math.round((v('hue_primary')/255) * 359),
      Math.round((v('hue_accent') /255) * 359),
      Math.round((v('hue_glow')   /255) * 359)
    ],
    name: creatureName,
    seed: currentSeed !== null ? formatSeed(currentSeed) : null
  });
}

/* ═══════════════════════════════════════════════════════════════
   BOOT
   ═══════════════════════════════════════════════════════════════ */
buildAxes();
document.getElementById('axis-count').textContent = N + ' axes';

// Name field
document.getElementById('name-field').addEventListener('input', e => {
  creatureName = (e.target.value || '').slice(0, 32) || 'Untitled';
  maybeEmitChange();
});

// Seed input wiring
const seedInput = document.getElementById('seed-input');
seedInput.addEventListener('keydown', e => {
  if(e.key === 'Enter'){
    setSeedFromInput(e.target.value);
    e.target.blur();
  }
});
seedInput.addEventListener('blur', e => {
  const txt = (e.target.value || '').trim();
  if(txt){ setSeedFromInput(txt); }
  else { refreshSeedUI(); }
});
document.getElementById('seed-random').addEventListener('click', ()=>{
  applySeed((Math.random() * 0xFFFFFFFF) >>> 0);
});
document.getElementById('seed-copy').addEventListener('click', ()=>{
  if(currentSeed === null){ setStatus('no seed to copy'); return; }
  const s = formatSeed(currentSeed);
  try {
    if(navigator.clipboard && navigator.clipboard.writeText){
      navigator.clipboard.writeText(s).then(
        ()=>setStatus('seed copied: ' + s),
        ()=>setStatus('clipboard blocked')
      );
    } else {
      // fallback
      const ta = document.createElement('textarea');
      ta.value = s; document.body.appendChild(ta); ta.select();
      try { document.execCommand('copy'); setStatus('seed copied: ' + s); }
      catch(_){ setStatus('clipboard unavailable'); }
      document.body.removeChild(ta);
    }
  } catch(_){
    setStatus('clipboard unavailable');
  }
});

// Export menu close on outside click
document.addEventListener('click', e => {
  const m = document.getElementById('export-menu');
  const b = document.getElementById('export-btn');
  if(m && m.classList.contains('show') && !m.contains(e.target) && e.target !== b){
    m.classList.remove('show');
  }
});

// ResizeObserver on canvas-wrap — canvas buffer follows wrap content size * DPR
const _canvasEl = document.getElementById('canvas');
const _canvasWrap = document.getElementById('canvas-wrap');
function _resizeCanvasFromRect(rect){
  const dpr = window.devicePixelRatio || 1;
  const W = Math.max(64, Math.round(rect.width  * dpr));
  const H = Math.max(64, Math.round(rect.height * dpr));
  if(_canvasEl.width  !== W) _canvasEl.width  = W;
  if(_canvasEl.height !== H) _canvasEl.height = H;
  _canvasEl.style.width  = rect.width  + 'px';
  _canvasEl.style.height = rect.height + 'px';
}
if(typeof ResizeObserver !== 'undefined'){
  const ro = new ResizeObserver(entries => {
    for(const ent of entries){ _resizeCanvasFromRect(ent.contentRect); break; }
  });
  ro.observe(_canvasWrap);
}
// initial size
_resizeCanvasFromRect(_canvasWrap.getBoundingClientRect());
window.addEventListener('resize', ()=>{
  _resizeCanvasFromRect(_canvasWrap.getBoundingClientRect());
});

// Mousemove → cursor target (normalized -1..1)
_canvasEl.addEventListener('mousemove', e => {
  const r = _canvasEl.getBoundingClientRect();
  if(r.width <= 0 || r.height <= 0) return;
  cursorTarget.x = ((e.clientX - r.left) / r.width  - 0.5) * 2;
  cursorTarget.y = ((e.clientY - r.top ) / r.height - 0.5) * 2;
});
_canvasEl.addEventListener('mouseleave', ()=>{
  cursorTarget.x = 0;
  cursorTarget.y = 0.15;
});

refreshSeedUI();
loop();
setStatus(`forge pro ready · ${N} axes · DNA order: alphabetical`);

</script>
