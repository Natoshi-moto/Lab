<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EIDOLON · WORLD BUILDER</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#050508;--bg2:#0d0e14;--bg3:#151621;--line:#2a2a38;--line2:#44445c;
  --text:#eeeaf6;--dim:#858394;--dim2:#525061;--accent:#ffcc44;--accent2:#aaeeff;--danger:#ff5566;--good:#76ffad;
  --mono:'IBM Plex Mono','Cascadia Mono','SF Mono',Menlo,Consolas,monospace;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--mono);font-size:12px;overflow:hidden;-webkit-font-smoothing:antialiased}
body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,rgba(0,0,0,.10) 0,rgba(0,0,0,.10) 1px,transparent 1px,transparent 4px);pointer-events:none;z-index:1000}
#app{height:100vh;display:grid;grid-template-rows:40px 1fr 36px;overflow:hidden}
/* TOPBAR */
#topbar{background:var(--bg2);border-bottom:1px solid var(--line);display:flex;align-items:center;gap:10px;padding:0 14px;flex-shrink:0}
#brand{font-size:11px;letter-spacing:3px;font-weight:700;white-space:nowrap}#brand b{color:var(--accent)}
#world-name{flex:0 0 200px;background:transparent;border:1px solid var(--line);color:var(--text);font-family:var(--mono);font-size:11px;padding:4px 8px;letter-spacing:1px}
#world-name:focus{outline:none;border-color:var(--accent)}
#world-desc{flex:1 1 0;background:transparent;border:1px solid var(--line);color:var(--dim);font-family:var(--mono);font-size:10px;padding:4px 8px}
#world-desc:focus{outline:none;border-color:var(--line2);color:var(--text)}
#status{margin-left:auto;color:var(--dim);font-size:10px;white-space:nowrap}
/* THREE PANELS */
#panels{display:grid;grid-template-columns:1fr 1fr 1fr;overflow:hidden}
.panel{display:flex;flex-direction:column;border-right:1px solid var(--line);overflow:hidden}
.panel:last-child{border-right:none}
.panel-head{padding:9px 12px;font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--dim2);border-bottom:1px solid var(--line);flex-shrink:0;background:var(--bg2);display:flex;align-items:center;gap:8px}
.panel-head span{color:var(--dim);font-size:10px}
.panel-tools{padding:8px 10px;border-bottom:1px solid var(--line);display:flex;gap:5px;flex-wrap:wrap;align-items:center;flex-shrink:0;background:var(--bg)}
.panel-scroll{overflow-y:auto;flex:1 1 0}
/* STATUS BAR */
#statusbar{background:var(--bg2);border-top:1px solid var(--line);display:flex;align-items:center;padding:0 14px;gap:16px;font-size:9px;color:var(--dim);letter-spacing:.5px}
#statusbar span{color:var(--dim2)}
/* BUTTONS */
.btn{font-family:inherit;font-size:10px;letter-spacing:.6px;color:var(--dim);background:transparent;border:1px solid var(--line);padding:5px 8px;border-radius:2px;cursor:pointer;text-transform:lowercase;transition:all .1s}
.btn:hover{border-color:var(--line2);color:var(--text);background:var(--bg3)}
.btn.primary{color:var(--accent);border-color:var(--accent)}
.btn.primary:hover{background:var(--accent);color:#111}
.btn.danger{color:var(--danger);border-color:var(--danger)}
.btn-sm{font-family:inherit;font-size:10px;color:var(--dim2);background:transparent;border:1px solid var(--line);padding:2px 6px;border-radius:2px;cursor:pointer;transition:all .1s}
.btn-sm:hover{color:var(--text);border-color:var(--line2)}
.btn-sm.danger{color:var(--danger)}
/* INPUTS */
.inp{width:100%;background:var(--bg);border:1px solid var(--line);color:var(--text);font-family:var(--mono);font-size:10px;padding:5px 7px;border-radius:2px}
.inp:focus{outline:none;border-color:var(--accent)}
.inp-sm{background:var(--bg);border:1px solid var(--line);color:var(--text);font-family:var(--mono);font-size:10px;padding:3px 5px;border-radius:2px}
.inp-sm:focus{outline:none;border-color:var(--accent)}
select.inp{cursor:pointer}
/* REGISTRY */
.reg-row{display:flex;align-items:center;gap:8px;padding:7px 10px;border-bottom:1px solid var(--line);transition:background .1s}
.reg-row:hover{background:var(--bg2)}
.reg-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.mini-canvas{border-radius:2px;background:#06060a;flex-shrink:0}
.reg-info{flex:1;min-width:0}
.reg-name{font-size:11px;font-weight:700;letter-spacing:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.reg-sub{font-size:9px;color:var(--dim);margin-top:2px}
.reg-chips{display:flex;gap:3px;flex-wrap:wrap;margin-top:3px}
.reg-actions{display:flex;gap:3px;flex-shrink:0}
/* CHIPS */
.chip{font-size:8px;letter-spacing:1px;text-transform:uppercase;border:1px solid currentColor;padding:1px 5px;border-radius:2px;background:rgba(255,255,255,.03)}
/* CARDS */
.card{margin:8px 10px;border:1px solid var(--line);border-radius:2px;overflow:hidden}
.card-head{display:flex;align-items:center;gap:6px;padding:8px 10px;cursor:pointer;background:var(--bg2);user-select:none;transition:background .1s}
.card-head:hover{background:var(--bg3)}
.card-title{font-size:10px;letter-spacing:1px;font-weight:700}
.card-body{padding:10px;display:flex;flex-direction:column;gap:7px}
.field-row{display:flex;align-items:center;gap:7px;font-size:9px;color:var(--dim2)}
.field-row label{flex:0 0 64px;text-align:right;text-transform:uppercase;letter-spacing:.5px;font-size:9px}
/* TYPE TOGGLES */
.type-toggles{display:flex;gap:3px;flex-wrap:wrap}
.type-toggle{font-family:inherit;font-size:8px;letter-spacing:.8px;text-transform:uppercase;padding:2px 6px;border:1px solid var(--line);background:transparent;color:var(--dim2);cursor:pointer;border-radius:2px;transition:all .1s}
.type-toggle.active{background:rgba(var(--tc,255,255,255),.15);color:var(--tc);border-color:var(--tc)}
/* TEAM ROWS */
.team-row{display:flex;align-items:center;gap:6px;padding:5px 0;border-bottom:1px solid var(--line);font-size:10px}
.team-row:last-child{border-bottom:none}
.team-name{flex:1;font-weight:700;letter-spacing:.8px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
/* SECTION DIVIDERS */
.section-div{padding:8px 12px 4px;font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--dim2);border-bottom:1px solid var(--line);background:var(--bg)}
/* STARTERS */
#starters-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;padding:10px}
.starter-slot{border:1px solid var(--line);padding:8px;display:flex;flex-direction:column;align-items:center;gap:5px;border-radius:2px;background:var(--bg2)}
.starter-slot canvas{border-radius:2px}
.starter-name{font-size:9px;letter-spacing:1px;text-align:center;overflow:hidden;text-overflow:ellipsis;width:100%}
/* EVOLUTION ROWS */
.evo-row{display:flex;align-items:center;gap:6px;padding:7px 10px;border-bottom:1px solid var(--line);font-size:10px}
.evo-arrow{color:var(--dim2)}
.evo-cond{color:var(--dim);font-size:9px;margin-left:2px}
/* MODAL */
#modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);display:none;align-items:center;justify-content:center;z-index:500;backdrop-filter:blur(4px)}
#modal-overlay.show{display:flex}
#modal{background:var(--bg2);border:1px solid var(--line2);width:480px;max-width:95vw;max-height:80vh;display:flex;flex-direction:column;border-radius:2px}
#modal-title{padding:12px 14px;border-bottom:1px solid var(--line);font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--accent);flex-shrink:0}
#modal-content{overflow-y:auto;flex:1;padding:0}
#modal-footer{padding:10px 14px;border-top:1px solid var(--line);display:flex;justify-content:flex-end;gap:6px;flex-shrink:0}
/* PICKER ROWS */
.picker-row{display:flex;align-items:center;gap:8px;padding:8px 12px;border-bottom:1px solid var(--line);cursor:pointer;transition:background .1s}
.picker-row:hover{background:var(--bg3)}
.picker-name{font-size:11px;font-weight:700;letter-spacing:1px}
.picker-sub{font-size:9px;color:var(--dim);margin-top:2px}
.picker-chips{display:flex;gap:3px;margin-top:2px}
/* WARNINGS */
#warnings{display:none;background:rgba(255,85,102,.08);border-bottom:2px solid var(--danger);padding:8px 14px;font-size:9px;color:var(--danger);line-height:1.7;flex-shrink:0}
#warnings .w-close{float:right;cursor:pointer;color:var(--danger);font-size:12px}
/* DROP */
.drop{position:fixed;inset:0;background:rgba(5,5,8,.92);border:3px dashed var(--accent);display:none;align-items:center;justify-content:center;z-index:999;color:var(--accent);font-size:20px;letter-spacing:4px}
.drop.show{display:flex}
/* TOAST */
.toast{position:fixed;left:50%;bottom:50px;transform:translateX(-50%);background:var(--bg3);border:1px solid var(--line2);padding:7px 14px;opacity:0;transition:opacity .15s;z-index:999;font-size:10px;letter-spacing:.5px}
.toast.show{opacity:1}
input[type=file]{display:none}
/* SCROLLBARS */
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--line2)}
/* ADD FORM */
.add-form{padding:10px;border-top:1px solid var(--line);display:flex;flex-direction:column;gap:6px;background:var(--bg)}
</style>
</head>
<body>
<div id="app">
  <div id="topbar">
    <div id="brand">🌍 <b>EIDOLON</b> WORLD BUILDER</div>
    <input id="world-name" placeholder="World name..." maxlength="80" oninput="onWorldMeta()" />
    <input id="world-desc" placeholder="Lore / description (max 280 chars)..." maxlength="280" oninput="onWorldMeta()" />
    <div id="status">ready</div>
    <div style="display:flex;gap:5px">
      <button class="btn primary" onclick="exportWorld()">export .world.json</button>
      <button class="btn" onclick="exportRoster()">export roster</button>
      <button class="btn" onclick="$('file-import').click()">import</button>
      <input id="file-import" type="file" accept=".json,application/json" onchange="handleImport(event)">
    </div>
  </div>
  <div id="panels">
    <!-- REGISTRY -->
    <div class="panel" id="panel-registry">
      <div class="panel-head">Registry <span id="reg-count">0</span></div>
      <div class="panel-tools">
        <input class="inp" id="reg-search" placeholder="search..." style="flex:1" oninput="renderRegistry()">
        <select class="inp" id="reg-sort" style="flex:0 0 100px" onchange="renderRegistry()">
          <option value="name">A-Z</option>
          <option value="stats">BST ↓</option>
          <option value="type">type</option>
          <option value="catch">catch rate</option>
        </select>
        <button class="btn" onclick="showRosterPicker()">+ roster</button>
        <button class="btn" onclick="addRandomCreature()">+ random</button>
      </div>
      <div id="warnings">
        <span class="w-close" onclick="$('warnings').style.display='none'">✕</span>
        <div id="warnings-list"></div>
      </div>
      <div class="panel-scroll" id="registry-list"></div>
    </div>
    <!-- GYMS -->
    <div class="panel" id="panel-gyms">
      <div class="panel-head">Gyms <span id="gym-count">0</span></div>
      <div class="panel-tools">
        <button class="btn" onclick="addGym()">+ new gym</button>
      </div>
      <div class="panel-scroll" id="gym-list"></div>
    </div>
    <!-- ROUTES & EXTRAS -->
    <div class="panel" id="panel-extras">
      <div class="panel-head">Routes &amp; Extras</div>
      <div class="panel-tools">
        <button class="btn" onclick="addRoute()">+ new route</button>
      </div>
      <div class="panel-scroll" id="extras-scroll">
        <div id="route-list"></div>
        <div class="section-div">Starters — player picks 1 of 3</div>
        <div id="starters-grid"></div>
        <div class="section-div">Evolution Chains</div>
        <div id="evo-list"></div>
        <div style="padding:8px 10px">
          <button class="btn" onclick="showEvoForm()">+ add evolution chain</button>
        </div>
      </div>
    </div>
  </div>
  <div id="statusbar">
    <div id="sb-counts"></div>
    <span>·</span>
    <div id="sb-save">not saved</div>
  </div>
</div>

<!-- MODAL -->
<div id="modal-overlay" onclick="closeModal()">
  <div id="modal" onclick="event.stopPropagation()">
    <div id="modal-title"></div>
    <div id="modal-content"></div>
    <div id="modal-footer">
      <button class="btn" onclick="closeModal()">close</button>
    </div>
  </div>
</div>

<div class="drop" id="drop">DROP .world.json / .creature.json</div>
<div class="toast" id="toast"></div>

<script>
'use strict';

// ── CONSTANTS ────────────────────────────────────────────────────────────────
const KEY_ROSTER = 'eidolon:roster:v1';
const KEY_WORLD  = 'eidolon:world:v1';

const TYPE_COLOR = {TOXIC:'#cc44ff',SPECTRAL:'#33eeff',WILD:'#44ff88',IRON:'#8899cc',VOID:'#5566ff',ANCIENT:'#ffaa44',LIGHT:'#ffdd33',SHADOW:'#aa55cc'};
const TYPE_LIST  = Object.keys(TYPE_COLOR);
const TERRAIN_COLORS = {fire:'#ff6633',forest:'#44cc66',cave:'#8866aa',water:'#33aaff',ruins:'#ccaa55',void:'#5544ff'};
const TERRAINS   = Object.keys(TERRAIN_COLORS);
const RARITIES   = ['common','uncommon','rare','legendary'];

// ── UTILITIES ────────────────────────────────────────────────────────────────
function esc(s){return String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}
function $(id){return document.getElementById(id)}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6)}
function statsTotal(c){const s=c.baseStats||{};return(s.hp||0)+(s.atk||0)+(s.def||0)+(s.spAtk||0)+(s.spDef||0)+(s.spd||0)}
function toast(msg,dur=2200){const t=$('toast');t.textContent=msg;t.classList.add('show');clearTimeout(toast._t);toast._t=setTimeout(()=>t.classList.remove('show'),dur);$('status').textContent=msg}
function timeSince(ts){if(!ts)return'never';const s=Math.floor((Date.now()-ts)/1000);if(s<5)return'just now';if(s<60)return s+'s ago';return Math.floor(s/60)+'m ago'}

// ── STORAGE ──────────────────────────────────────────────────────────────────
function sharedRead(key){try{const v=localStorage.getItem(key);return v?JSON.parse(v):null}catch{return null}}
function sharedWrite(key,val){try{localStorage.setItem(key,JSON.stringify(val))}catch(e){toast('storage error: '+e.message)}}

// ── STATE ────────────────────────────────────────────────────────────────────
let roster   = sharedRead(KEY_ROSTER)||[];
let world    = sharedRead(KEY_WORLD)||newWorld();
let lastSave = world.updatedAt||null;
let saveTimer, sbTimer;
let gymExpanded   = new Set(world.gyms.map(g=>g.id));
let routeExpanded = new Set(world.routes.map(r=>r.id));
let modalCtx = null;
const t0 = performance.now();
const creaturePool = new Map(); // id → render proxy

function newWorld(){
  return {format:'eidolon-world/1',id:uid(),name:'',description:'',version:'0.1.0',
    createdAt:Date.now(),updatedAt:Date.now(),registry:[],gyms:[],routes:[],starters:[],evolutions:[]};
}
function saveWorld(){
  world.updatedAt = Date.now();
  clearTimeout(saveTimer);
  saveTimer = setTimeout(()=>{sharedWrite(KEY_WORLD,world);lastSave=Date.now();updateStatusBar();},400);
}

// ── RENDERING — verbatim from eidolon-battle-theatre.html ────────────────────
function mulberry32(seed){let s=seed>>>0;return()=>{s=(s+0x6D2B79F5)>>>0;let r=s;r=Math.imul(r^(r>>>15),r|1);r^=r+Math.imul(r^(r>>>7),r|61);return((r^(r>>>14))>>>0)/4294967296}}

function renderCreatureOn(ctx,b,x,y,size,t,flip=false,hit=0){ctx.save();ctx.translate(x,y);if(flip)ctx.scale(-1,1);const dna=b.dna,hues=b.hues;const baseR=size*(.18+dna[0]/255*.08),pulse=Math.sin(t*(.5+dna[4]/255*1.2))*.5+.5;const ecy=Math.sin(t*.9)*baseR*.05;const nT=2+Math.floor(dna[1]/255*5),len=baseR*(1+dna[2]/255*1.4),wob=dna[3]/255*.45;let glowR=baseR*(2.1+dna[14]/255*2);let ag=ctx.createRadialGradient(0,ecy,0,0,ecy,glowR);ag.addColorStop(0,`hsla(${hues[0]},80%,55%,${.16*(1+pulse*.3)})`);ag.addColorStop(1,'transparent');ctx.fillStyle=ag;ctx.beginPath();ctx.arc(0,ecy,glowR,0,Math.PI*2);ctx.fill();for(let i=0;i<nT;i++){let a=i/nT*Math.PI*2+Math.sin(t*.5+i*.7)*wob,tx=Math.cos(a)*len,ty=ecy+Math.sin(a)*len*.85,cx=Math.cos(a+.3)*len*.5,cy=ecy+Math.sin(a+.3)*len*.45,tw=4+dna[(i+3)%16]/255*5;ctx.lineCap='round';ctx.strokeStyle='rgba(0,0,0,.9)';ctx.lineWidth=tw+4;ctx.beginPath();ctx.moveTo(0,ecy);ctx.quadraticCurveTo(cx,cy,tx,ty);ctx.stroke();ctx.strokeStyle=`hsla(${hues[i%3]},80%,60%,.78)`;ctx.lineWidth=tw;ctx.beginPath();ctx.moveTo(0,ecy);ctx.quadraticCurveTo(cx,cy,tx,ty);ctx.stroke()}let pts=[];for(let i=0;i<10;i++){let a=i/10*Math.PI*2-Math.PI/2,n=Math.sin(t*.85+i*.95)*(2+dna[3]/255*5);pts.push([Math.cos(a)*(baseR+n),ecy+Math.sin(a)*(baseR+n)])}function path(){ctx.beginPath();for(let i=0;i<pts.length;i++){let p0=pts[(i-1+10)%10],p1=pts[i],p2=pts[(i+1)%10],p3=pts[(i+2)%10],c1=[p1[0]+(p2[0]-p0[0])/6,p1[1]+(p2[1]-p0[1])/6],c2=[p2[0]-(p3[0]-p1[0])/6,p2[1]-(p3[1]-p1[1])/6];if(!i)ctx.moveTo(p1[0],p1[1]);ctx.bezierCurveTo(c1[0],c1[1],c2[0],c2[1],p2[0],p2[1])}ctx.closePath()}path();ctx.fillStyle=`hsl(${hues[0]},65%,${47+hit*35}%)`;ctx.fill();path();ctx.lineWidth=5;ctx.strokeStyle='rgba(0,0,0,.92)';ctx.stroke();ctx.save();path();ctx.clip();let sg=ctx.createLinearGradient(0,-baseR,0,baseR);sg.addColorStop(.45,'transparent');sg.addColorStop(1,'rgba(0,0,0,.46)');ctx.fillStyle=sg;ctx.fillRect(-baseR*2,-baseR*2,baseR*4,baseR*4);ctx.restore();for(let e=-1;e<=1;e+=2){let ex=e*baseR*.32,ey=ecy-baseR*.14,er=baseR*.2;ctx.fillStyle=`hsl(${hues[2]},18%,93%)`;ctx.strokeStyle='rgba(0,0,0,.82)';ctx.lineWidth=2.5;ctx.beginPath();ctx.ellipse(ex,ey,er,er,0,0,Math.PI*2);ctx.fill();ctx.stroke();ctx.fillStyle='#030305';ctx.beginPath();ctx.arc(ex+Math.sin(t*.55)*2,ey,er*.38,0,Math.PI*2);ctx.fill()}let cg=ctx.createRadialGradient(0,ecy,0,0,ecy,baseR*.6);cg.addColorStop(0,`hsla(${hues[2]},95%,90%,.75)`);cg.addColorStop(1,'transparent');ctx.fillStyle=cg;ctx.beginPath();ctx.arc(0,ecy,baseR*.65,0,Math.PI*2);ctx.fill();ctx.restore()}

// ── RENDER PROXY ──────────────────────────────────────────────────────────────
function getRenderProxy(creature){
  let dna;
  if(creature._dna16){dna=creature._dna16;}
  else if(Array.isArray(creature.dna)){
    dna=creature.dna.length>=16?creature.dna.slice(0,16):[...creature.dna,...Array(Math.max(0,16-creature.dna.length)).fill(128)];
  } else {
    const d=creature.dna||{};
    dna=[d.body_radius??128,d.arm_count??100,d.body_radius??120,d.body_lumpiness??100,
      d.saturation??150,d.lightness??128,d.particle_count??128,d.eye_count??128,
      d.hue_primary??128,d.hue_accent??100,d.hue_glow??180,128,128,128,d.glow_radius??200,128];
  }
  return{dna,hues:creature.hues||[120,200,300]};
}
function getProxy(id){
  if(creaturePool.has(id))return creaturePool.get(id);
  const c=world.registry.find(x=>x.id===id)||roster.find(x=>x.id===id);
  if(!c)return null;
  const p=getRenderProxy(c);creaturePool.set(id,p);return p;
}

// ── MAKE RANDOM CREATURE ──────────────────────────────────────────────────────
function makeRandomCreature(){
  const r=mulberry32(Date.now()^(Math.random()*0xffffffff>>>0));
  const _dna16=Array.from({length:16},()=>Math.floor(r()*256));
  const dna={body_radius:_dna16[0],arm_count:_dna16[1],body_lumpiness:_dna16[3],
    saturation:_dna16[4],lightness:_dna16[5],glow_radius:_dna16[14],
    hue_primary:_dna16[8],hue_accent:_dna16[9],hue_glow:_dna16[10],
    particle_count:_dna16[6],eye_count:_dna16[7]};
  const hues=[Math.round(_dna16[8]/255*359),Math.round(_dna16[9]/255*359),Math.round(_dna16[10]/255*359)];
  const nameR=mulberry32(_dna16[0]*17+_dna16[1]);
  const P=['PHAN','VEX','AETH','KRON','LUMI','ETH','ARC','SPEC','ZYN','NETH'];
  const M=['TI','LA','VO','RU','NI','KA','MO','EL','SI','RA'];
  const S=['EX','ON','IX','AR','UM','AN','OX','IS','OR','EN'];
  const name=P[Math.floor(nameR()*P.length)]+M[Math.floor(nameR()*M.length)]+S[Math.floor(nameR()*S.length)];
  const h=hues[0];
  const types=[h<45?'TOXIC':h<90?'WILD':h<150?'SPECTRAL':h<210?'IRON':h<270?'VOID':h<315?'SHADOW':'ANCIENT'];
  return{format:'eidolon-creature/1',id:uid(),name,species:'Unknown Species',flavor:'',catchRate:128,

// ── REGISTRY PANEL ────────────────────────────────────────────────────────────
function renderRegistry(){
  let list=[...world.registry];
  const q=($('reg-search').value||'').toLowerCase();
  const sort=$('reg-sort').value;
  if(q)list=list.filter(c=>c.name.toLowerCase().includes(q));
  if(sort==='name')list.sort((a,b)=>a.name.localeCompare(b.name));
  else if(sort==='stats')list.sort((a,b)=>statsTotal(b)-statsTotal(a));
  else if(sort==='type')list.sort((a,b)=>((a.types||[''])[0]).localeCompare((b.types||[''])[0]));
  else if(sort==='catch')list.sort((a,b)=>(b.catchRate||0)-(a.catchRate||0));
  $('reg-count').textContent=world.registry.length;
  $('registry-list').innerHTML=list.map(c=>{
    const col=TYPE_COLOR[(c.types||[])[0]]||'#525061';
    return`<div class="reg-row">
      <div class="reg-dot" style="background:${col}"></div>
      <canvas class="mini-canvas" width="48" height="48" data-cid="${esc(c.id)}"></canvas>
      <div class="reg-info">
        <div class="reg-name">${esc(c.name)}</div>
        <div class="reg-sub">${esc(c.species||'Unknown')} · BST ${statsTotal(c)}</div>
        <div class="reg-chips">${typeChips(c.types)}</div>
      </div>
      <div class="reg-actions">
        <button class="btn-sm danger" onclick="removeFromRegistry('${esc(c.id)}')" title="remove">×</button>
      </div>
    </div>`;
  }).join('');
}
function addRandomCreature(){
  if(world.registry.length>=200)toast('registry 200+ — consider trimming');
  const c=makeRandomCreature();
  world.registry.push(c);creaturePool.delete(c.id);
  saveWorld();renderRegistry();updateStatusBar();toast('generated '+c.name);
}
function removeFromRegistry(id){
  const uses=checkInUse(id);
  if(uses.length&&!confirm(`Used in: ${uses.join(', ')}. Remove anyway?`))return;
  world.registry=world.registry.filter(c=>c.id!==id);creaturePool.delete(id);
  saveWorld();renderRegistry();renderGyms();renderRoutes();renderStarters();updateStatusBar();
}
function checkInUse(id){
  const u=[];
  world.gyms.forEach(g=>{if(g.team.some(m=>m.creatureId===id))u.push('Gym: '+(g.name||'unnamed'))});
  world.routes.forEach(r=>{if(r.encounters.some(e=>e.creatureId===id))u.push('Route: '+(r.name||'unnamed'))});
  if(world.starters.includes(id))u.push('Starters');return u;
}

function openModal(title,body,extraBtns=[]){

// openPicker(type, extra)
// types: 'roster','gym-team','route-enc','starter','evo-from','evo-to'
function openPicker(type,extra){
  modalCtx={type,extra};
  const source=type==='roster'?roster:world.registry;
  if(!source.length){toast(type==='roster'?'no creatures in roster — load a roster JSON':'registry is empty — add creatures first');return;}
  const searchId='picker-search-'+Date.now();
  openModal(type==='roster'?'Add from Roster':'Pick Creature',
    `<div style="padding:8px 12px;border-bottom:1px solid var(--line)">
       <input class="inp" id="${searchId}" placeholder="search..." oninput="filterPicker('${searchId}')">
     </div>
     <div id="picker-list">${source.map(c=>pickerRow(c,'selectCreature')).join('')}</div>`);
}
window.filterPicker=function(sid){
  const q=$( sid).value.toLowerCase();
  const source=modalCtx?.type==='roster'?roster:world.registry;
  $('picker-list').innerHTML=source.filter(c=>c.name.toLowerCase().includes(q)).map(c=>pickerRow(c,'selectCreature')).join('');
};
window.selectCreature=function(id){
  if(!modalCtx)return;
  const{type,extra}=modalCtx;
  if(type==='roster'){
    const c=roster.find(x=>x.id===id);
    if(!c)return;
    if(world.registry.find(x=>x.id===id)){toast(c.name+' already in registry');closeModal();return;}
    world.registry.push({...c});creaturePool.delete(id);
    saveWorld();renderRegistry();updateStatusBar();toast('added '+c.name);closeModal();
  } else if(type==='gym-team'){
    const g=world.gyms.find(x=>x.id===extra);
    if(g&&g.team.length<6){g.team.push({creatureId:id,level:1,heldItem:null});saveWorld();renderGyms();}
    closeModal();
  } else if(type==='route-enc'){
    const r=world.routes.find(x=>x.id===extra);
    if(r){r.encounters.push({creatureId:id,rarity:'common'});saveWorld();renderRoutes();}
    closeModal();
  } else if(type==='starter'){
    const idx=+extra;
    world.starters[idx]=id;
    // keep array length 3
    while(world.starters.length<3)world.starters.push(null);
    world.starters=world.starters.slice(0,3);
    saveWorld();renderStarters();updateStatusBar();closeModal();
  }
};

// roster picker shortcut

// ── VALIDATION ────────────────────────────────────────────────────────────────
function validateWorld(){
  const w=[];
  if(!world.name)w.push('World has no name');
  const validStarters=world.starters.filter(Boolean);
  if(validStarters.length<3)w.push(`Only ${validStarters.length}/3 starters selected`);
  if(!world.registry.length)w.push('Registry is empty');
  world.gyms.forEach(g=>{
    if(!g.team.length)w.push(`${g.name||'A gym'} has no team`);
    g.team.forEach(m=>{if(!world.registry.find(c=>c.id===m.creatureId))w.push(`${g.name||'Gym'}: creature "${m.creatureId}" not in registry`);});
  });
  world.routes.forEach(r=>{
    r.encounters.forEach(e=>{if(!world.registry.find(c=>c.id===e.creatureId))w.push(`Route "${r.name}": creature missing`);});
  });
  return w;
}
function showWarnings(ws){
  $('warnings-list').innerHTML=ws.map(w=>`<div>⚠ ${esc(w)}</div>`).join('');
  $('warnings').style.display='block';
}

// ── IMPORT / EXPORT ───────────────────────────────────────────────────────────
function download(name,blob){const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=name;a.click();setTimeout(()=>URL.revokeObjectURL(a.href),1000);}
function safeName(n){return(n||'').replace(/[^a-z0-9]/gi,'-').toLowerCase()||'my-world';}

function exportWorld(){
  const ws=validateWorld();
  if(ws.length)showWarnings(ws);
  world.updatedAt=Date.now();
  // strip internal _dna16 field
  const exportData={...world,registry:world.registry.map(({_dna16,...rest})=>rest)};
  const blob=new Blob([JSON.stringify(exportData,null,2)],{type:'application/json'});
  download(safeName(world.name)+'.world.json',blob);
  toast(`exported "${world.name||'world'}" — ${world.registry.length} creatures, ${world.gyms.length} gyms`);
}
function exportRoster(){
  const blob=new Blob([JSON.stringify(world.registry.map(({_dna16,...r})=>r),null,2)],{type:'application/json'});
  download(safeName(world.name)+'-roster.json',blob);
  toast('exported '+world.registry.length+' creatures as roster');
}
function handleImport(e){
  const f=e.target.files[0];e.target.value='';if(!f)return;
  const reader=new FileReader();
  reader.onload=ev=>{
    try{
      const data=JSON.parse(ev.target.result);
      if(data.format==='eidolon-world/1'){
        if(!confirm('Replace current world with imported world?'))return;
        world=data;
        if(!world.registry)world.registry=[];
        if(!world.gyms)world.gyms=[];
        if(!world.routes)world.routes=[];
        if(!world.starters)world.starters=[];
        if(!world.evolutions)world.evolutions=[];
        gymExpanded=new Set(world.gyms.map(g=>g.id));
        routeExpanded=new Set(world.routes.map(r=>r.id));
        creaturePool.clear();
        sharedWrite(KEY_WORLD,world);
        fullRender();toast('world imported: '+world.name);
      } else if(Array.isArray(data)&&data[0]?.format==='eidolon-creature/1'){
        const added=data.filter(c=>!world.registry.find(x=>x.id===c.id));
        world.registry.push(...added);creaturePool.clear();
        saveWorld();renderRegistry();updateStatusBar();toast('merged '+added.length+' creatures into registry');
      } else if(data.format==='eidolon-creature/1'){
        if(!world.registry.find(x=>x.id===data.id)){world.registry.push(data);creaturePool.clear();}
        saveWorld();renderRegistry();updateStatusBar();toast('added '+data.name+' to registry');
      } else toast('unrecognized file format');
    }catch(err){toast('import failed: '+err.message);}
  };reader.readAsText(f);
}

// ── STATUS BAR ────────────────────────────────────────────────────────────────
function updateStatusBar(){
  $('sb-counts').innerHTML=`${world.registry.length} creatures · ${world.gyms.length} gyms · ${world.routes.length} routes · ${world.starters.filter(Boolean).length}/3 starters · ${world.evolutions.length} evolutions`;
  $('sb-save').textContent='auto-saved '+timeSince(lastSave);
}

// ── FULL RENDER ───────────────────────────────────────────────────────────────
function fullRender(){
  $('world-name').value=world.name||'';
  $('world-desc').value=world.description||'';
  renderRegistry();renderGyms();renderRoutes();renderStarters();renderEvolutions();updateStatusBar();
}

// ── ANIMATION LOOP ────────────────────────────────────────────────────────────
function loop(){
  const t=(performance.now()-t0)/1000;
  document.querySelectorAll('canvas[data-cid]').forEach(canvas=>{
    const proxy=getProxy(canvas.dataset.cid);if(!proxy)return;
    const ctx=canvas.getContext('2d');const s=canvas.width;
    ctx.clearRect(0,0,s,s);ctx.fillStyle='#06060a';ctx.fillRect(0,0,s,s);
    renderCreatureOn(ctx,proxy,s/2,s*.6,s*3.2,t);
  });
  requestAnimationFrame(loop);
}

// ── DRAG-DROP IMPORT ─────────────────────────────────────────────────────────
let dragCount=0;
window.addEventListener('dragenter',e=>{e.preventDefault();dragCount++;$('drop').classList.add('show')});
window.addEventListener('dragover',e=>e.preventDefault());
window.addEventListener('dragleave',()=>{dragCount=Math.max(0,dragCount-1);if(!dragCount)$('drop').classList.remove('show')});
window.addEventListener('drop',async e=>{
  e.preventDefault();dragCount=0;$('drop').classList.remove('show');
  for(const f of e.dataTransfer.files){
    try{
      const text=await f.text();const data=JSON.parse(text);
      const evt={target:{files:[new File([text],f.name,{type:f.type})],value:''}};
      handleImport({target:{files:[f],value:''}});
      break;
    }catch(err){toast('drop import failed: '+err.message);}
  }
});

// ── INIT ──────────────────────────────────────────────────────────────────────
fullRender();
setInterval(updateStatusBar,5000);
loop();
</script>
</body>
</html>
