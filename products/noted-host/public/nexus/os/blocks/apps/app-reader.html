<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Reader</title>
<style>
:root { color-scheme: dark; }
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; font-family: 'JetBrains Mono', 'SF Mono', monospace; font-size: 13px; }
body { background: #111318; color: #d2d5de; display: flex; flex-direction: column; }
#nx-boot-screen {
  flex: 1; display: flex; flex-direction: column; align-items: center;
  justify-content: center; gap: 10px;
}
#nx-boot-icon  { font-size: 40px; }
#nx-boot-title { font-size: 15px; font-weight: 600; }
#nx-boot-state { font-size: 10px; color: #6b7089; letter-spacing: 1px; margin-top: 4px; }
#nx-app { display: none; width: 100%; height: 100%; flex-direction: column; overflow: hidden; }
body.nx-mounted #nx-boot-screen { display: none; }
body.nx-mounted #nx-app         { display: flex; }
/* Scrollbars */
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #262a35; border-radius: 3px; }
/* Shared surface tokens */
:root {
  --bg: #08090c; --surface: #111318; --surface-2: #181b22; --surface-3: #1f222b;
  --border: #262a35; --border-hi: #363b4a; --text: #d2d5de; --text-dim: #6b7089;
  --text-muted: #3e4255; --accent: #4dbb7a; --accent-dim: rgba(77,187,122,.10);
  --danger: #ef4444; --warn: #f59e0b; --info: #3b82f6; --radius: 6px;
}

#rd-toolbar {
  padding: 6px 10px; border-bottom: 1px solid var(--border); display: flex;
  gap: 6px; align-items: center; background: var(--surface-2); flex-shrink: 0;
}
#rd-filename {
  flex: 1; background: var(--surface-3); border: 1px solid var(--border);
  border-radius: var(--radius); color: var(--text); font-family: inherit;
  font-size: 11px; padding: 3px 8px; outline: none; transition: border-color .12s;
}
#rd-filename:focus { border-color: var(--accent); }
.rd-btn {
  font-size: 10px; padding: 3px 8px; border-radius: var(--radius); cursor: pointer;
  background: var(--surface-3); border: 1px solid var(--border); color: var(--text-dim);
  font-family: inherit; transition: all .12s; white-space: nowrap;
}
.rd-btn:hover { color: var(--accent); border-color: var(--accent); }
#rd-body {
  flex: 1; overflow-y: auto; padding: 24px 32px;
  background: var(--bg); color: var(--text); line-height: 1.7;
}
#rd-body pre {
  background: var(--surface-2); border: 1px solid var(--border); border-radius: var(--radius);
  padding: 12px 14px; overflow-x: auto; font-size: 12px; margin: 12px 0;
}
#rd-body code { font-family: inherit; font-size: 12px; color: var(--accent); }
#rd-body h1, #rd-body h2, #rd-body h3 { color: var(--text); margin: 16px 0 8px; font-weight: 600; }
#rd-body h1 { font-size: 18px; border-bottom: 1px solid var(--border); padding-bottom: 8px; }
#rd-body h2 { font-size: 15px; }
#rd-body h3 { font-size: 13px; color: var(--text-dim); }
#rd-body p  { margin: 8px 0; color: var(--text-dim); }
#rd-body a  { color: var(--accent); text-decoration: none; }
#rd-body ul, #rd-body ol { margin: 8px 0 8px 20px; color: var(--text-dim); }
#rd-body blockquote { border-left: 3px solid var(--accent); padding: 4px 12px;
  margin: 12px 0; background: var(--accent-dim); border-radius: 0 var(--radius) var(--radius) 0; }
#rd-status { padding: 5px 10px; border-top: 1px solid var(--border); font-size: 10px;
  color: var(--text-muted); background: var(--surface-2); flex-shrink: 0; }

</style>
</head>
<body>

<!-- Shown during protocol handshake -->
<div id="nx-boot-screen">
  <div id="nx-boot-icon">📖</div>
  <div id="nx-boot-title">Reader</div>
  <div id="nx-boot-state">WAITING</div>
</div>

<!-- App UI — revealed on MOUNTED -->
<div id="nx-app">
  <div id="rd-toolbar">
    <input id="rd-filename" type="text" value="README.md" autocomplete="off" placeholder="filename…">
    <button class="rd-btn" id="rd-open">Open</button>
    <button class="rd-btn" id="rd-raw" title="Toggle raw/rendered">Raw</button>
  </div>
  <div id="rd-body"><p style="color:var(--text-muted);font-size:12px">Enter a filename and press Open.</p></div>
  <div id="rd-status">no file loaded</div>
</div>

<script src="../../engines/nexus-block-client.js"></script>
<script>
"use strict";
// ══════════════════════════════════════════════════════════════
//  Nexus OS — Managed Block  |  Reader
//  Protocol: handled by engines/nexus-block-client.js
// ══════════════════════════════════════════════════════════════

const rdBody     = document.getElementById("rd-body");
const rdFilename = document.getElementById("rd-filename");
const rdStatus   = document.getElementById("rd-status");
let   rawMode    = false;
let   lastContent = "";

const nx = window.NexusBlockClient?.bootBlock({
  manifest: {
    emits:    ["fs.read","fs.list","fs.status"],
    consumes: ["fs.result","fs.mounted"],
    app: {
      title:       "Reader",
      icon:        "📖",
      description: "Markdown document viewer",
      visible:     true
    }
  },
  onMessage({ channel, payload }) {
    if (channel === "fs.result" && payload.requestChannel === "fs.read") {
      if (!payload.ok) { rdStatus.textContent = "error: " + payload.error; return; }
      lastContent = payload.content || "";
      rdStatus.textContent = rdFilename.value + "  (" + (payload.size || 0) + " bytes)";
      renderContent(lastContent);
    }
  }
});

if (nx) {
  nx.ready.then(() => {
    document.body.classList.add("nx-mounted");
    nx.subscribe("fs.result");
    nx.subscribe("fs.mounted");
  });
}

function renderContent(text) {
  if (rawMode) {
    rdBody.textContent = "";
    const pre = document.createElement("pre");
    pre.textContent = text;
    rdBody.appendChild(pre);
    return;
  }
  // Minimal safe Markdown renderer (no innerHTML from user content)
  rdBody.textContent = "";
  const lines = text.split("\n");
  const frag  = document.createDocumentFragment();
  let   inPre = false;
  let   preEl = null;
  let   preLines = [];

  for (let i = 0; i < lines.length; i++) {
    const line = lines[i];
    if (line.startsWith("\`\`\`")) {
      if (!inPre) { inPre = true; preLines = []; preEl = document.createElement("pre"); }
      else { preEl.textContent = preLines.join("\n"); frag.appendChild(preEl); inPre = false; }
      continue;
    }
    if (inPre) { preLines.push(line); continue; }
    let el;
    if (line.startsWith("# "))        { el = document.createElement("h1"); el.textContent = line.slice(2); }
    else if (line.startsWith("## "))  { el = document.createElement("h2"); el.textContent = line.slice(3); }
    else if (line.startsWith("### ")) { el = document.createElement("h3"); el.textContent = line.slice(4); }
    else if (line.startsWith("- ") || line.startsWith("* ")) {
      const ul = document.createElement("ul");
      const li = document.createElement("li"); li.textContent = line.slice(2);
      ul.appendChild(li); el = ul;
    }
    else if (line.startsWith("> ")) {
      el = document.createElement("blockquote"); el.textContent = line.slice(2);
    }
    else if (line.trim() === "") { el = document.createElement("br"); }
    else { el = document.createElement("p"); el.textContent = line; }
    frag.appendChild(el);
  }
  rdBody.appendChild(frag);
}

document.getElementById("rd-open").onclick = () => {
  const name = rdFilename.value.trim();
  if (!name) return;
  rdStatus.textContent = "opening…";
  if (nx) nx.emit("fs.read", { path: name, _reqId: "rd-open" });
};

document.getElementById("rd-raw").onclick = () => {
  rawMode = !rawMode;
  document.getElementById("rd-raw").textContent = rawMode ? "Rendered" : "Raw";
  if (lastContent) renderContent(lastContent);
};


</script>
</body>
</html>
