<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Verse Studio</title>
    <!-- Sweep 28: inline SVG favicon — no external asset, file:// safe -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='5' fill='%232a2825'/%3E%3Cpath d='M9 9L16 23L23 9' stroke='%23b29bdf' stroke-width='2.2' fill='none' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E">
    <script src="../../engines/nexus-block-client.js"></script>
<script>
(function(){
  if (!window.NexusBlockClient) return; // standalone mode

  var pendingImports = [];

  function handleCanvasImport(payload){
    if (!payload || !payload.json) {
      console.warn('[verse-studio] canvas import missing json payload');
      if (window.nx) {
        window.nx.emit('verse.canvas.imported', {
          ok: false,
          error: 'missing json',
          _reqId: payload && payload._reqId
        });
      }
      return;
    }
    try {
      window.__verseStudio.importCompanionCanvas(payload.json);
      if (window.nx) {
        window.nx.emit('verse.canvas.imported', {
          ok: true,
          ts: Date.now(),
          _reqId: payload._reqId
        });
      }
    } catch(e) {
      console.warn('[verse-studio] canvas import failed', e);
      if (window.nx) {
        window.nx.emit('verse.canvas.imported', {
          ok: false,
          error: String(e && e.message || e),
          _reqId: payload._reqId
        });
      }
    }
  }

  function tryDrainImports(){
    if (!window.__verseStudio ||
        typeof window.__verseStudio.importCompanionCanvas !== 'function') return;
    while (pendingImports.length) {
      handleCanvasImport(pendingImports.shift());
    }
  }

  window.nx = window.NexusBlockClient.bootBlock({
    manifest: {
      emits:    ['verse.ready', 'verse.state.snapshot', 'verse.canvas.imported'],
      consumes: ['companion.canvas.export', 'companion.canvas.export.undo'],
      app: {
        title: 'Verse Studio',
        icon:  '◇',
        description: 'Local-first creative workspace',
        visible: true,
        defaultWidth: 1200,
        defaultHeight: 800
      }
    },
    onMessage: function(evt){
      if (evt.channel === 'companion.canvas.export') {
        if (window.__verseStudio &&
            typeof window.__verseStudio.importCompanionCanvas === 'function') {
          handleCanvasImport(evt.payload);
        } else {
          pendingImports.push(evt.payload);
        }
      } else if (evt.channel === 'companion.canvas.export.undo') {
        var payload = evt.payload || {};
        console.warn('[verse-studio] undo received for canvas import', payload._reqId);
        try {
          window.nx && window.nx.emit('verse.canvas.imported', {
            ok: false,
            undone: true,
            _reqId: payload._reqId,
            ts: Date.now()
          });
        } catch(e) {
          console.warn('[verse-studio] undo acknowledgement emit failed', e);
        }
      }
    }
  });
  // Emit ready when the React app has populated __verseStudio.
  // Poll briefly because we cannot hook the React lifecycle from
  // outside the bundle.
  var tries = 0;
  var iv = setInterval(function(){
    tries++;
    if (window.__verseStudio && typeof window.__verseStudio.getState === 'function') {
      clearInterval(iv);
      tryDrainImports();
      try {
        window.nx && window.nx.emit('verse.ready', { ts: Date.now() });
      } catch(e) { console.warn('[verse-studio] ready emit failed', e); }
    } else if (tries > 100) {
      clearInterval(iv);
      console.warn('[verse-studio] __verseStudio never appeared; ready event not emitted');
    }
  }, 100);
})();
</script>
