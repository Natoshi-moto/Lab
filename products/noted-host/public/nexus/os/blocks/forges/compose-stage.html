<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="nexus-block" content="managed"><meta name="nexus-emits" content="system.attack.selected nexus.launch nexus.notify"><meta name="nexus-consumes" content=""><title>Battle Forge</title><script src="../../engines/nexus-block-client.js"></script><script src="../../engines/eidolon-schema.js"></script><script src="../../engines/eidolon-battle-renderer.js"></script><script src="../../engines/eidolon-storage.js"></script><style>
:root{--bg:#0a0a0e;--bg2:#13131a;--bg3:#1a1a23;--line:#2a2a36;--line2:#3a3a4a;--text:#e8e8ee;--dim:#7a7a88;--dim2:#4a4a58;--accent:#ffcc44;--accent2:#ff8844;--cyan:#aaeeff;--red:#ff5566;--mono:ui-monospace,SFMono-Regular,Menlo,monospace;--display:ui-serif,Georgia,serif}*{box-sizing:border-box}html,body{height:100%;margin:0;background:var(--bg);color:var(--text);font-family:var(--mono);font-size:12px;overflow:hidden}#app{display:grid;grid-template-columns:1fr 330px;height:100vh}#stage{display:flex;flex-direction:column;border-right:1px solid var(--line)}#topbar{height:38px;display:flex;align-items:center;gap:12px;padding:0 14px;background:var(--bg2);border-bottom:1px solid var(--line)}#brand{font-weight:800;letter-spacing:3px}#brand b{color:var(--accent)}#phase-indicator{font-size:10px;letter-spacing:1.5px;color:var(--dim2);padding:2px 8px;border:1px solid var(--dim2);border-radius:2px;text-transform:uppercase;min-width:88px;text-align:center}#status{margin-left:auto;color:var(--dim);font-size:10px}#grid-wrap{flex:1;display:grid;place-items:center;padding:12px;background:#060609;overflow:hidden}#grid{display:grid;grid-template-columns:repeat(3,1fr);grid-template-rows:repeat(3,1fr);gap:5px;width:min(72vw,760px);aspect-ratio:1}.cell{position:relative;border:2px solid transparent;background:#050508;border-radius:4px;overflow:hidden;cursor:pointer}.cell:hover{border-color:var(--line2)}.cell.selected{border-color:var(--accent);box-shadow:0 0 28px rgba(255,204,68,.18)}.cell canvas{width:100%;height:100%}.cell-badge{position:absolute;top:5px;left:6px;font-size:9px;color:var(--dim2);letter-spacing:.5px}.cell.selected .cell-badge{color:var(--accent)}#stage-foot{min-height:42px;border-top:1px solid var(--line);display:flex;align-items:center;gap:8px;padding:6px 12px;background:var(--bg2);flex-wrap:wrap}#sel-info{flex:1;color:var(--dim);font-size:10px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}button{font-family:inherit;font-size:11px;letter-spacing:1px;color:var(--dim);background:transparent;border:1px solid var(--line);padding:6px 10px;cursor:pointer;border-radius:2px;text-transform:lowercase}button:hover{color:var(--text);border-color:var(--line2);background:var(--bg3)}.primary{color:var(--accent);border-color:var(--accent)}#panel{display:flex;flex-direction:column;background:var(--bg2)}.panel-head{padding:10px 14px;border-bottom:1px solid var(--line);font-size:10px;letter-spacing:2px;color:var(--dim);text-transform:uppercase}#panel-body{flex:1;overflow:auto;padding:12px 14px;display:flex;flex-direction:column;gap:14px}.section-label{font-size:9px;letter-spacing:2px;color:var(--dim2);text-transform:uppercase;padding-bottom:6px;border-bottom:1px solid var(--line)}.ctrl-section{display:flex;flex-direction:column;gap:8px}.ctrl-row{display:grid;grid-template-columns:52px 1fr 32px;align-items:center;gap:8px;color:var(--dim);font-size:10px}.ctrl-row input[type=range],#scrubber{width:100%;height:4px;appearance:none;background:var(--bg);border:1px solid var(--line)}.ctrl-row input::-webkit-slider-thumb,#scrubber::-webkit-slider-thumb{appearance:none;width:10px;height:14px;background:var(--text)}#phase-bar-panel{height:8px;width:100%;border:1px solid var(--line);display:flex}.pb-seg{height:100%}.playback-row,.btnrow{display:flex;gap:5px;flex-wrap:wrap}.statusbox{border:1px solid var(--line);border-radius:10px;padding:10px;color:var(--cyan);font-size:10px;line-height:1.5;background:rgba(170,238,255,.05)}.tpl-empty{font-size:10px;color:var(--dim2);line-height:1.7;font-style:italic}.tpl-item{display:flex;gap:4px}.tpl-btn{flex:1;text-align:left;border-left:3px solid var(--accent);color:var(--text)}@media(max-width:880px){#app{grid-template-columns:1fr}#panel{height:42vh}#grid{width:min(94vw,520px)}}
</style></head><body><div id="app"><div id="stage"><div id="topbar"><span id="brand"><b>⚔</b>&nbsp;BATTLEFORGE</span><span id="phase-indicator">—</span><span id="status">ready</span></div><div id="grid-wrap"><div id="grid"></div></div><div id="stage-foot"><span id="sel-info">randomize to begin · click any cell to select</span><input id="tpl-name-input" type="text" maxlength="32" spellcheck="false" placeholder="attack name…"><button class="primary" id="save-attack">save attack</button></div></div><div id="panel"><div class="panel-head">Make the ingredients, then enter The Room</div><!-- Battle forging starts in The Room; this sweep upgrades the router into a scrub/playback Battleforge surface. --><div id="panel-body"><div class="ctrl-section"><div class="section-label">current ingredients</div><div id="companion-status" class="statusbox">checking companion…</div><div id="world-status" class="statusbox">checking world…</div><div class="btnrow"><button data-open="first">First Contact</button><button data-open="lattice">Creature Forge</button><button data-open="env">World Forge</button><button class="primary" data-open="room">Open The Room</button></div></div><div class="ctrl-section"><div class="section-label">playback</div><div id="phase-bar-panel"></div><input id="scrubber" type="range" min="0" max="1000" value="0"><div class="playback-row"><button id="replay">⟳ replay</button><button data-speed="0.5">0.5×</button><button data-speed="1" class="primary">1×</button><button data-speed="2">2×</button></div></div><div class="ctrl-section"><div class="section-label">generation</div><div class="ctrl-row"><label>jitter</label><input id="jitter-slider" type="range" min="0" max="255" value="80"><span id="jitter-val">80</span></div><button id="randomize" class="primary">randomize grid</button></div><div class="ctrl-section"><div class="section-label">attack templates</div><div id="templates-list"><div class="tpl-empty">select a cell · name it · save it.<br>each template becomes its own<br>custom randomize button.</div></div></div></div></div></div><script>
'use strict';
const SELECTED_ENV_KEY='nexus:selected-environment:v1', SELECTED_COMPANION_KEY='nexus:selected-companion:v1', ATTACK_KEY='nexus:selected-attack:v1';
const nx=window.NexusBlockClient?.bootBlock({manifest:{emits:['system.attack.selected','nexus.launch','nexus.notify'],consumes:[],app:{title:'Battle Forge',icon:'⚔',description:'Playable attack forge with scrubber',visible:true}}});
const routes={first:['✦','blocks/world/first-contact.html','First Contact',false],lattice:['❉','blocks/forges/lattice-shell.html','Lattice Shell',false],companion:['◌','blocks/apps/companion.html','Companion',false],env:['⛰','blocks/forges/environment-forge.html','Environment Forge',false],atlas:['⊕','./blocks/world/atlas.html','Atlas',false],library:['◈','blocks/vibes/vibes-library.html','Library',false],room:['⚔','blocks/forges/the-room.html','Battleforge',true],arena:['◇','blocks/vibes/vibes-arena.html','Vibes Arena',false]};
let cells=[],templates=NexusEidolonStorage.safeGet('eidolon:attack-templates:v1',[]),selectedIdx=-1,jitter=80,scrubT=0,speed=1,t0=performance.now(),autoNum=0;
function read(k){return NexusEidolonStorage.safeGet(k,null)}function labelCompanion(x){return x&&x.name?`${x.name} · 0x${(x.seed>>>0).toString(16)}`:'No selected companion yet.'}function labelWorld(x){return x&&x.name?`${x.name} · desktop source ${x.source||x.kind||'eidolon'}`:'No selected world yet.'}
function refresh(){document.getElementById('companion-status').textContent=labelCompanion(read(SELECTED_COMPANION_KEY));document.getElementById('world-status').textContent=labelWorld(read(SELECTED_ENV_KEY))}
function launch(key){const r=routes[key];if(!r)return;nx?.emit('nexus.launch',{path:r[1],title:r[2],icon:r[0],legacy:!!r[3]});nx?.emit('nexus.notify',{className:'info',title:'Opening '+r[2],body:r[1]})}
function makeCandidate(seed, base){return NexusEidolonSchema.randomizeAttackSpec(seed, {}, base)}
function randomizeGrid(base){cells=[];const seed=Date.now()+autoNum++;for(let i=0;i<9;i++)cells.push(makeCandidate(seed+i*(37+jitter),base));selectedIdx=-1;drawGrid();}
function drawGrid(){const grid=document.getElementById('grid');grid.textContent='';cells.forEach((spec,i)=>{const d=document.createElement('div');d.className='cell'+(i===selectedIdx?' selected':'');d.innerHTML=`<canvas></canvas><div class="cell-badge">${String(i+1).padStart(2,'0')}</div>`;d.onclick=()=>{selectedIdx=i;document.getElementById('sel-info').textContent=spec.name+' · '+Math.round(NexusEidolonBattleRenderer.getPhases(spec).totalMs)+'ms';drawGrid();drawPhases();};grid.appendChild(d);NexusEidolonBattleRenderer.drawAttackPreview(d.querySelector('canvas'),spec,scrubT)});drawPhases();}
function drawPhases(){const bar=document.getElementById('phase-bar-panel');const spec=cells[selectedIdx]||cells[0];if(!spec){bar.textContent='';return;}const p=NexusEidolonBattleRenderer.getPhases(spec);bar.innerHTML=p.segments.map(s=>`<div class="pb-seg" style="width:${(s[2]-s[1])*100}%;background:${s[0]==='ant'?'#7a7aaa':s[0]==='str'?'#aaffcc':s[0]==='imp'?'#ffcc44':'#aaeeff'}"></div>`).join('');document.getElementById('phase-indicator').textContent=NexusEidolonBattleRenderer.phaseAt(spec,scrubT)[0];}
function tick(){scrubT=(scrubT+(speed*0.003))%1;document.getElementById('scrubber').value=Math.round(scrubT*1000);drawGrid();requestAnimationFrame(tick)}
function renderTemplates(){const box=document.getElementById('templates-list');if(!templates.length){box.innerHTML='<div class="tpl-empty">select a cell · name it · save it.<br>each template becomes its own<br>custom randomize button.</div>';return;}box.innerHTML=templates.map((t,i)=>`<div class="tpl-item"><button class="tpl-btn" data-i="${i}">${t.name}</button><button data-del="${i}">×</button></div>`).join('')}
function saveAttack(){const spec=cells[selectedIdx];if(!spec){document.getElementById('sel-info').textContent='Select an attack cell first.';return;}const name=document.getElementById('tpl-name-input').value.trim()||spec.name;const saved=Object.assign({},spec,{name,updatedAt:Date.now()});templates=[saved,...templates.filter(t=>t.id!==saved.id)].slice(0,24);NexusEidolonStorage.safeSet('eidolon:attack-templates:v1',templates);NexusEidolonStorage.setSelectedAttack(saved);nx?.emit('system.attack.selected',saved);nx?.emit('nexus.notify',{className:'commit',title:'Attack saved',body:name,route:'compose-stage'});renderTemplates();}
document.body.addEventListener('click',e=>{const b=e.target.closest('button[data-open],button[data-speed],button[data-i],button[data-del]');if(!b)return;if(b.dataset.open)launch(b.dataset.open);if(b.dataset.speed){speed=Number(b.dataset.speed)||1;document.querySelectorAll('[data-speed]').forEach(x=>x.classList.toggle('primary',x===b));}if(b.dataset.i){const t=templates[Number(b.dataset.i)];if(t)randomizeGrid(t)}if(b.dataset.del){templates.splice(Number(b.dataset.del),1);NexusEidolonStorage.safeSet('eidolon:attack-templates:v1',templates);renderTemplates();}});
document.getElementById('randomize').onclick=()=>randomizeGrid();document.getElementById('jitter-slider').oninput=e=>{jitter=Number(e.target.value);document.getElementById('jitter-val').textContent=jitter};document.getElementById('scrubber').oninput=e=>{scrubT=Number(e.target.value)/1000;drawGrid()};document.getElementById('replay').onclick=()=>{scrubT=0};document.getElementById('save-attack').onclick=saveAttack;window.addEventListener('storage',refresh);refresh();setInterval(refresh,1000);renderTemplates();randomizeGrid();tick();
</script></body></html>
