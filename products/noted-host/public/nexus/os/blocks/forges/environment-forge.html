<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="nexus-block" content="managed"><meta name="nexus-emits" content="system.environment.selected nexus.notify nexus.launch vibe.save"><meta name="nexus-consumes" content="vibe.result"><title>Environment Forge</title><script src="../../engines/nexus-block-client.js"></script><script src="../../engines/eidolon-schema.js"></script><script src="../../engines/eidolon-environment-renderer.js"></script><script src="../../engines/eidolon-creature-renderer.js"></script><script src="../../engines/eidolon-storage.js"></script><style>
:root{--bg:#0a0a0e;--bg2:#13131a;--bg3:#1a1a23;--line:#2a2a36;--line2:#3a3a4a;--text:#e8e8ee;--dim:#7a7a88;--dim2:#4a4a58;--accent:#aaffcc;--accent2:#aaeeff;--sweep:#ff88aa;--warn:#ffcc66;--mono:ui-monospace,SFMono-Regular,Menlo,monospace}*{box-sizing:border-box}html,body{height:100%;margin:0;background:var(--bg);color:var(--text);font-family:var(--mono);font-size:12px;overflow:hidden}#app{display:grid;grid-template-columns:1fr 390px;height:100vh}#stage{display:flex;flex-direction:column;border-right:1px solid var(--line);overflow:hidden}#topbar{display:flex;align-items:center;gap:12px;padding:0 14px;height:38px;background:var(--bg2);border-bottom:1px solid var(--line)}#brand{letter-spacing:3px;font-weight:700}#brand b{color:var(--accent2)}#name-field{flex:1;background:transparent;border:1px solid transparent;color:var(--text);font-family:inherit;padding:5px 8px;outline:none}#name-field:focus{border-color:var(--accent2);background:var(--bg3)}#axis-count,#status{font-size:10px;color:var(--dim);letter-spacing:1px}#canvas-wrap{flex:1;position:relative;display:flex;align-items:center;justify-content:center;padding:14px;background:#050508;overflow:hidden}#canvas{width:100%;max-height:100%;aspect-ratio:16/9;border:1px solid var(--line);background:#050508}#silhouette-overlay{position:absolute;inset:14px;display:flex;align-items:flex-end;justify-content:space-between;padding:0 8% 6%;pointer-events:none}#silhouette-overlay canvas{width:14%;aspect-ratio:1;opacity:.6;display:none}.show-creatures #silhouette-overlay canvas{display:block}#stage-foot{min-height:42px;border-top:1px solid var(--line);display:flex;align-items:center;gap:7px;padding:6px 10px;background:var(--bg2);flex-wrap:wrap}.btn,button{font-family:inherit;font-size:11px;letter-spacing:1px;color:var(--dim);background:transparent;border:1px solid var(--line);padding:6px 10px;cursor:pointer;border-radius:2px;text-transform:lowercase}.btn:hover,button:hover{color:var(--text);border-color:var(--line2);background:var(--bg3)}.primary{color:var(--accent);border-color:var(--accent)}.toggle.on{color:var(--bg);background:var(--accent2);border-color:var(--accent2)}#controls{display:flex;flex-direction:column;background:var(--bg2);overflow:hidden}.panel-head{padding:10px 14px;border-bottom:1px solid var(--line);font-size:10px;letter-spacing:2px;color:var(--dim);text-transform:uppercase;display:flex;justify-content:space-between}.panel-head .ph-hint{font-size:9px;color:var(--dim2);letter-spacing:.5px;text-transform:none}#presets{display:grid;grid-template-columns:1fr 1fr;gap:6px;padding:10px 12px;border-bottom:1px solid var(--line)}.preset{border:1px solid var(--line);border-radius:8px;padding:8px;cursor:pointer;color:var(--dim);background:var(--bg3)}.preset:hover,.preset.active{border-color:var(--accent2);color:var(--accent2)}#axes{flex:1;overflow:auto;padding:6px 0}.group-head{padding:10px 14px 4px;font-size:9px;letter-spacing:2px;color:var(--dim2);text-transform:uppercase;border-top:1px solid var(--line);background:var(--bg2);position:sticky;top:0;z-index:1}.axis{display:grid;grid-template-columns:1fr 42px 22px;gap:8px;align-items:center;padding:5px 14px;border-left:2px solid transparent}.axis:hover{background:var(--bg3)}.axis.sweeping{border-left-color:var(--sweep);background:rgba(255,136,170,.05)}.axis-label{font-size:10px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:text;padding:1px 3px;border:1px solid transparent}.axis-label:focus{outline:none;border-color:var(--accent2);background:var(--bg)}.axis-slider{appearance:none;width:100%;height:4px;background:var(--bg);border:1px solid var(--line);outline:none}.axis-slider::-webkit-slider-thumb{appearance:none;width:10px;height:14px;background:var(--text);cursor:pointer}.axis-val{font-size:10px;color:var(--dim);text-align:right}.axis-sweep{width:20px;height:20px;padding:0;color:var(--dim2)}.axis-sweep:hover,.axis.sweeping .axis-sweep{color:var(--sweep);border-color:var(--sweep)}#file-input,#creature-input{display:none}@media(max-width:900px){#app{grid-template-columns:1fr}#controls{height:45vh}}@media(prefers-reduced-motion:reduce){*{animation-duration:1ms!important;transition-duration:1ms!important}}
</style></head><body><div id="app"><div id="stage"><div id="topbar"><span id="brand"><b>◇</b>&nbsp;ENVIRONMENT FORGE</span><input id="name-field" type="text" maxlength="40" spellcheck="false"><span id="axis-count">32 axes</span></div><div id="canvas-wrap"><canvas id="canvas" width="1280" height="720"></canvas><div id="silhouette-overlay"><canvas id="sil-l"></canvas><canvas id="sil-r"></canvas></div></div><div id="stage-foot"><button class="btn" id="randomize">randomize</button><button class="btn" id="reset">reset</button><button class="btn" onclick="document.getElementById('file-input').click()">load env…</button><input id="file-input" type="file" accept=".json,application/json"><button class="btn toggle" id="creature-toggle">+ test creatures</button><input id="creature-input" type="file" accept=".json,application/json" multiple><button class="btn" id="preview">preview desktop</button><button class="btn primary" id="save">save/use world</button><span id="status">ready</span></div></div><div id="controls"><div class="panel-head"><span>AXES</span><span class="ph-hint">rename labels · ⇌ sweep · presets below</span></div><div id="presets"></div><div id="axes"></div></div></div><script>
'use strict';
const SELECTED_ENV_KEY='nexus:selected-environment:v1';
const ATLAS_LOCAL_KEY='atlas:worlds:fallback:v1';
const PRESETS=[['Amber Steppe',28,160,92],['Glass Reef',180,190,112],['Moss Canopy',112,150,86],['Umbral Drift',238,118,58],['Pearl Cairn',54,95,132],['Violet Fen',292,175,84]];
let env=NexusEidolonSchema.randomizeEnvironmentSpec(Date.now());let sweepIdx=null,sweepStart=0,sweepBase=0,t0=performance.now(),activePreset=-1,testCreaturesShown=false,testCreatures=[];
const nx=window.NexusBlockClient?.bootBlock({manifest:{emits:['system.environment.selected','nexus.notify','nexus.launch','vibe.save'],consumes:['vibe.result'],app:{title:'Environment Forge',icon:'⛰',description:'Live world forge',visible:true}}});
function safeSet(k,v){NexusEidolonStorage.safeSet(k,v)}function safeGet(k,f){return NexusEidolonStorage.safeGet(k,f)}
function canonical(v){if(v===null||typeof v!=='object')return JSON.stringify(v);if(Array.isArray(v))return '['+v.map(canonical).join(',')+']';return '{'+Object.keys(v).sort().map(k=>JSON.stringify(k)+':'+canonical(v[k])).join(',')+'}'}
async function sha256Hex(s){const buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(s));return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('')}
function setStatus(s){document.getElementById('status').textContent=s}function v(id){return env.axes[id]||0}
function payload(){return{format:'eidolon-environment/1',name:env.name,seed:env.seed>>>0,axes:env.axes,labels:env.labels,width:1280,height:720,createdAt:new Date(env.createdAt).toISOString()}}
async function envelope(){const p=payload();const hash=await sha256Hex(canonical(p));return{format:'vibe/1',id:'v_world_'+hash.slice(0,16),type:'world',subFormat:'eidolon-environment/1',name:env.name,tags:['environment-forge','eidolon'],parents:[],birthHash:'sha256:'+hash,content_hash:'sha256:'+hash,content_addr:'sha256:'+hash,createdAt:new Date().toISOString(),source:'environment-forge',payload:p}}
function mirrorAtlas(e){NexusEidolonStorage.pushUnique(ATLAS_LOCAL_KEY,e,80)}
async function saveLibrary(e){if(!nx||!nx.request)return{ok:false,error:'library unavailable'};try{return await nx.request('vibe.save',{envelope:e},{timeout:1200})}catch(err){return{ok:false,error:err.message}}}
function renderPresets(){document.getElementById('presets').innerHTML=PRESETS.map((p,i)=>`<div class="preset ${i===activePreset?'active':''}" data-i="${i}">${p[0]}<br><small>hue ${p[1]}°</small></div>`).join('')}
function applyPreset(i){const p=PRESETS[i];if(!p)return;activePreset=i;env=NexusEidolonSchema.normalizeEnvironmentSpec(env);env.name=p[0];env.axes.sky_top_hue=Math.round(p[1]/360*255);env.axes.sky_bot_hue=Math.round(((p[1]+45)%360)/360*255);env.axes.ground_hue=Math.round(((p[1]+120)%360)/360*255);env.axes.sky_saturation=p[2];env.axes.sky_bot_lightness=p[3];env.updatedAt=Date.now();renderAll();previewDesktop();}
function renderAxes(){const wrap=document.getElementById('axes');wrap.textContent='';for(const group of NexusEidolonSchema.groupAxes(NexusEidolonSchema.ENVIRONMENT_AXES)){const gh=document.createElement('div');gh.className='group-head';gh.textContent=group.name;wrap.appendChild(gh);for(const a of group.axes){const row=document.createElement('div');row.className='axis';row.dataset.id=a.id;row.innerHTML=`<div><div class="axis-label" contenteditable="true">${env.labels[a.id]||a.label}</div><input class="axis-slider" type="range" min="0" max="255" value="${env.axes[a.id]}"></div><div class="axis-val">${env.axes[a.id]}</div><button class="axis-sweep" title="sweep this axis">⇌</button>`;row.querySelector('.axis-slider').oninput=e=>{env.axes[a.id]=Number(e.target.value);row.querySelector('.axis-val').textContent=e.target.value;activePreset=-1;renderPresets();previewDesktop(false)};row.querySelector('.axis-label').oninput=e=>{env.labels[a.id]=e.target.textContent.trim()||a.label};row.querySelector('.axis-sweep').onclick=()=>{sweepIdx=sweepIdx===a.id?null:a.id;sweepStart=performance.now();sweepBase=env.axes[a.id];document.querySelectorAll('.axis').forEach(x=>x.classList.toggle('sweeping',x.dataset.id===sweepIdx));};wrap.appendChild(row)}}}
function renderText(){document.getElementById('name-field').value=env.name;document.getElementById('axis-count').textContent=Object.keys(env.axes).length+' axes'}
function renderAll(){renderText();renderPresets();renderAxes()}
function draw(){if(sweepIdx){const phase=((performance.now()-sweepStart)/4000)%1;env.axes[sweepIdx]=Math.round((Math.sin(phase*Math.PI*2)*.5+.5)*255);const row=document.querySelector(`.axis[data-id="${sweepIdx}"]`);if(row){row.querySelector('.axis-slider').value=env.axes[sweepIdx];row.querySelector('.axis-val').textContent=env.axes[sweepIdx];}}
NexusEidolonEnvironmentRenderer.drawEnvironment(document.getElementById('canvas'),env,performance.now()-t0);if(testCreaturesShown)drawSilhouettes();requestAnimationFrame(draw)}
function drawSilhouettes(){['sil-l','sil-r'].forEach((id,i)=>{const c=document.getElementById(id);const spec=testCreatures[i]||NexusEidolonSchema.randomizeCreatureSpec(env.seed+i*33);NexusEidolonCreatureRenderer.drawCreature(c,spec,performance.now()-t0)})}
function previewDesktop(noStatus){safeSet(SELECTED_ENV_KEY,Object.assign({},env,{source:'environment-forge.preview'}));nx?.emit('system.environment.selected',Object.assign({},env,{source:'environment-forge.preview'}));if(!noStatus)setStatus('Preview applied to desktop. Not finalized yet.')}
async function accept(){env=NexusEidolonSchema.normalizeEnvironmentSpec(env);env.name=document.getElementById('name-field').value.trim()||env.name;const e=await envelope();mirrorAtlas(e);safeSet(SELECTED_ENV_KEY,Object.assign({},env,{source:'environment-forge'}));const res=await saveLibrary(e);nx?.emit('system.environment.selected',Object.assign({},env,{source:'environment-forge'}));nx?.emit('nexus.notify',{className:'commit',title:'World selected',body:env.name+(res.ok?' · Library saved':' · local mirror'),route:'atlas',actionLabel:'Open Atlas →'});setStatus(res.ok?'Accepted · Library and Atlas mirror updated':'Accepted · Library asleep, Atlas local mirror updated')}
document.getElementById('name-field').addEventListener('input',e=>{env.name=e.target.value});document.getElementById('randomize').onclick=()=>{activePreset=-1;env=NexusEidolonSchema.randomizeEnvironmentSpec(Date.now(),{},env);renderAll();previewDesktop()};document.getElementById('reset').onclick=()=>{activePreset=-1;env=NexusEidolonSchema.createDefaultEnvironmentSpec(Date.now());renderAll();previewDesktop()};document.getElementById('preview').onclick=()=>previewDesktop();document.getElementById('save').onclick=()=>accept().catch(err=>setStatus('Save failed: '+err.message));document.getElementById('creature-toggle').onclick=e=>{testCreaturesShown=!testCreaturesShown;document.getElementById('canvas-wrap').classList.toggle('show-creatures',testCreaturesShown);e.currentTarget.classList.toggle('on',testCreaturesShown);e.currentTarget.textContent=testCreaturesShown?'hide creatures':'+ test creatures'};document.getElementById('file-input').onchange=async e=>{const f=e.target.files&&e.target.files[0];if(!f)return;try{env=NexusEidolonSchema.normalizeEnvironmentSpec(JSON.parse(await f.text()));activePreset=-1;renderAll();previewDesktop()}catch(err){setStatus('Load failed: '+err.message)}};document.getElementById('creature-input').onchange=async e=>{testCreatures=[];for(const f of Array.from(e.target.files||[]).slice(0,2)){try{testCreatures.push(NexusEidolonSchema.normalizeCreatureSpec(JSON.parse(await f.text())))}catch(_){}}testCreaturesShown=true;document.getElementById('canvas-wrap').classList.add('show-creatures');};document.getElementById('presets').onclick=e=>{const p=e.target.closest('.preset');if(p)applyPreset(Number(p.dataset.i))};renderAll();draw();
</script></body></html>
