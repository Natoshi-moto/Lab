<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="nexus-block" content="managed"><meta name="nexus-emits" content="system.companion.selected lattice.imprint lattice.library.changed nexus.notify nexus.launch vibe.save"><meta name="nexus-consumes" content="vibe.result"><title>Lattice Shell</title><script src="../../engines/nexus-block-client.js"></script><script src="../../engines/eidolon-schema.js"></script><script src="../../engines/eidolon-creature-renderer.js"></script><script src="../../engines/eidolon-storage.js"></script><style>
:root{--bg:#07070b;--bg2:#12121b;--bg3:#1a1a25;--ink:#f4ead8;--muted:#b4a78e;--line:rgba(255,255,255,.14);--amber:#e6a51a;--cyan:#8ee7ff;--sweep:#ff88aa;--warn:#ffcc66;--mono:ui-monospace,Menlo,monospace;--display:ui-serif,Georgia,serif}*{box-sizing:border-box}html,body{height:100%;margin:0;background:var(--bg);color:var(--ink);font-family:var(--mono);overflow:hidden}.wrap{height:100%;display:grid;grid-template-columns:1fr 390px}.stage{position:relative;display:grid;place-items:center;background:radial-gradient(circle at 50% 45%,rgba(230,165,26,.12),transparent 40%),#07070b;border-right:1px solid var(--line)}canvas#creature{width:min(74vmin,680px);height:min(74vmin,680px);filter:drop-shadow(0 0 32px rgba(230,165,26,.18))}.side{background:rgba(14,14,21,.9);display:flex;flex-direction:column;overflow:hidden}.top{padding:22px;border-bottom:1px solid var(--line)}.k{font-size:11px;color:var(--amber);letter-spacing:.22em;text-transform:uppercase}#name{width:100%;font-family:var(--display);font-size:42px;line-height:.95;margin:12px 0;background:transparent;border:1px solid transparent;color:var(--ink);outline:none}#name:focus{border-color:var(--cyan);background:var(--bg3)}.copy{color:var(--muted);line-height:1.55;font-size:12px}.stats{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:14px}.stat{border:1px solid rgba(255,255,255,.1);padding:9px;border-radius:12px;color:var(--muted);font-size:11px}.buttons{display:flex;flex-wrap:wrap;gap:6px;margin-top:14px}button{border:1px solid rgba(255,255,255,.16);border-radius:999px;background:rgba(255,255,255,.07);color:var(--ink);font-family:var(--mono);padding:8px 11px;cursor:pointer}button:hover{border-color:var(--amber)}.primary{background:var(--amber);border-color:var(--amber);color:#08080d;font-weight:800}.controls{flex:1;overflow:auto;padding-bottom:12px}.group-head{padding:12px 14px 5px;font-size:9px;letter-spacing:2px;color:rgba(244,234,216,.38);text-transform:uppercase;border-top:1px solid var(--line);background:var(--bg2);position:sticky;top:0}.axis{display:grid;grid-template-columns:1fr 40px 22px 22px;gap:7px;align-items:center;padding:5px 14px;border-left:2px solid transparent}.axis:hover{background:var(--bg3)}.axis.sweeping{border-left-color:var(--sweep);background:rgba(255,136,170,.05)}.axis.locked{border-left-color:var(--warn);background:rgba(255,204,102,.04)}.axis-label{font-size:10px;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:text;padding:1px 3px;border:1px solid transparent}.axis-label:focus{outline:none;border-color:var(--cyan);background:var(--bg)}.axis-slider{appearance:none;width:100%;height:4px;background:var(--bg);border:1px solid var(--line)}.axis-slider::-webkit-slider-thumb{appearance:none;width:10px;height:14px;background:var(--ink);cursor:pointer}.axis.locked .axis-slider{opacity:.45}.axis-val{font-size:10px;color:var(--muted);text-align:right}.axis-sweep,.axis-lock{width:20px;height:20px;padding:0;border-radius:4px;color:rgba(244,234,216,.42)}.axis-lock.on{color:var(--warn);border-color:var(--warn)}@media(max-width:880px){.wrap{grid-template-columns:1fr}.side{height:55vh}.stage{height:45vh}}@media(prefers-reduced-motion:reduce){*{animation-duration:1ms!important;transition-duration:1ms!important}}
</style></head><body><main class="wrap"><section class="stage"><canvas id="creature"></canvas></section><aside class="side"><div class="top"><div class="k">Lattice Shell · Eidolon creature forge</div><input id="name" spellcheck="false"><p class="copy">Live axis-level companion creation. Rename sliders, sweep single traits, lock what you love, randomize the rest, then imprint the selected companion.</p><div id="stats" class="stats"></div><div class="buttons"><button id="roll">↺ randomize unlocked</button><button id="reset">reset</button><button id="save" class="primary">Imprint companion</button><button id="companion">Open Companion</button><button id="library">Open Library</button></div></div><div id="axes" class="controls"></div></aside></main><script>
'use strict';
const KEY='nexus:selected-companion:v1';
let creature=NexusEidolonSchema.randomizeCreatureSpec(Date.now()),sweepIdx=null,sweepStart=0,t0=performance.now();
const nx=window.NexusBlockClient?.bootBlock({manifest:{emits:['system.companion.selected','lattice.imprint','lattice.library.changed','nexus.notify','nexus.launch','vibe.save'],consumes:['vibe.result'],app:{title:'Lattice Shell',icon:'❉',description:'Live creature randomizer and imprint bridge',visible:true}}});
function setText(){document.getElementById('name').value=creature.name;const hue=Math.round(creature.axes.hue_primary/255*360);document.getElementById('stats').innerHTML=['seed 0x'+(creature.seed>>>0).toString(16),'hue '+hue+'°','axes '+Object.keys(creature.axes).length,'locks '+Object.keys(creature.locked||{}).filter(k=>creature.locked[k]).length].map(x=>'<div class="stat">'+x+'</div>').join('')}
function renderAxes(){const wrap=document.getElementById('axes');wrap.textContent='';for(const group of NexusEidolonSchema.groupAxes(NexusEidolonSchema.CREATURE_AXES)){const gh=document.createElement('div');gh.className='group-head';gh.innerHTML=`<span>${group.name}</span> <button data-rand="${group.name}" title="randomize this group">roll group</button>`;wrap.appendChild(gh);for(const a of group.axes){const row=document.createElement('div');row.className='axis'+(creature.locked[a.id]?' locked':'');row.dataset.id=a.id;row.innerHTML=`<div><div class="axis-label" contenteditable="true">${creature.labels[a.id]||a.label}</div><input class="axis-slider" type="range" min="0" max="255" value="${creature.axes[a.id]}"></div><div class="axis-val">${creature.axes[a.id]}</div><button class="axis-sweep">⇌</button><button class="axis-lock ${creature.locked[a.id]?'on':''}">⚿</button>`;row.querySelector('.axis-slider').oninput=e=>{creature.axes[a.id]=Number(e.target.value);row.querySelector('.axis-val').textContent=e.target.value;setText()};row.querySelector('.axis-label').oninput=e=>{creature.labels[a.id]=e.target.textContent.trim()||a.label};row.querySelector('.axis-sweep').onclick=()=>{sweepIdx=sweepIdx===a.id?null:a.id;sweepStart=performance.now();document.querySelectorAll('.axis').forEach(x=>x.classList.toggle('sweeping',x.dataset.id===sweepIdx));};row.querySelector('.axis-lock').onclick=()=>{creature.locked[a.id]=!creature.locked[a.id];renderAxes();setText()};wrap.appendChild(row)}}wrap.querySelectorAll('[data-rand]').forEach(b=>b.onclick=()=>{const g=b.dataset.rand;const fresh=NexusEidolonSchema.randomizeCreatureSpec(Date.now(),creature.locked,creature);for(const a of NexusEidolonSchema.CREATURE_AXES.filter(x=>x[1]===g)){if(!creature.locked[a[0]])creature.axes[a[0]]=fresh.axes[a[0]]}creature.name=NexusEidolonSchema.normalizeCreatureSpec(creature).name;renderAxes();setText()})}
function draw(){if(sweepIdx&&!creature.locked[sweepIdx]){const phase=((performance.now()-sweepStart)/4000)%1;creature.axes[sweepIdx]=Math.round((Math.sin(phase*Math.PI*2)*.5+.5)*255);const row=document.querySelector(`.axis[data-id="${sweepIdx}"]`);if(row){row.querySelector('.axis-slider').value=creature.axes[sweepIdx];row.querySelector('.axis-val').textContent=creature.axes[sweepIdx];}}NexusEidolonCreatureRenderer.drawCreature(document.getElementById('creature'),creature,performance.now()-t0);requestAnimationFrame(draw)}
async function imprint(){creature=NexusEidolonSchema.normalizeCreatureSpec(Object.assign({},creature,{name:document.getElementById('name').value.trim()||creature.name,updatedAt:Date.now()}));NexusEidolonStorage.setSelectedCompanion(creature);nx?.emit('system.companion.selected',creature);nx?.emit('lattice.imprint',{creatureId:creature.id,name:creature.name,seed:creature.seed,source:'lattice-shell'});nx?.emit('lattice.library.changed',{creatureId:creature.id,name:creature.name,count:1,source:'lattice-shell'});nx?.emit('nexus.notify',{className:'commit',title:'Companion imprinted',body:creature.name,route:'library',actionLabel:'View Library →'})}
document.getElementById('name').oninput=e=>{creature.name=e.target.value};document.getElementById('roll').onclick=()=>{creature=NexusEidolonSchema.randomizeCreatureSpec(Date.now(),creature.locked,creature);renderAxes();setText()};document.getElementById('reset').onclick=()=>{creature=NexusEidolonSchema.createDefaultCreatureSpec(Date.now());renderAxes();setText()};document.getElementById('save').onclick=imprint;document.getElementById('companion').onclick=()=>nx?.emit('nexus.launch',{path:'blocks/apps/companion.html',title:'Companion',icon:'◌'});document.getElementById('library').onclick=()=>nx?.emit('nexus.launch',{path:'blocks/vibes/vibes-library.html',title:'Library',icon:'◈'});setText();renderAxes();draw();
</script></body></html>
