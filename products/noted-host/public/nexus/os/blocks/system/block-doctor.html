<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="nexus-block" content="managed">
<meta name="nexus-emits" content="">
<meta name="nexus-consumes" content="nexus.kernel.log nexus.kernel.ping system.companion.selected system.environment.selected system.attack.selected system.block_ready system.health lattice.imprint lattice.library.changed vibe.notify vibe.save vibe.list vibe.load economy.notify.balance_changed economy.notify.epoch_closed economy.notify.mint_published economy.notify.transfer_received economy.notify.publish_pending economy.notify.publish_succeeded economy.notify.publish_abandoned economy.notify.event_dropped nexus.wallet.state fs.mounted fs.status eidolon.battle.result eidolon.challenger.appears eidolon.minted companion.canvas.export verse.ready verse.state.snapshot db.notify web.navigation nexus.launch nexus.notify wallet.fork_proof.result wallet.lock.result nexus.deadletter nexus.notification.displayed nexus.notification.action">
<title>Block Doctor</title>
<style>
:root{--bg:#07080b;--s1:#0e0f14;--s2:#141620;--border:#222430;--border-hi:#2e3040;--ink:#c8cbd8;--ink-2:#6b7089;--ink-3:#3a3d52;--ok:#3dba6e;--ok-dim:rgba(61,186,110,.12);--warn:#f59e0b;--warn-dim:rgba(245,158,11,.12);--bad:#ef4444;--bad-dim:rgba(239,68,68,.12);--info:#3b82f6;--info-dim:rgba(59,130,246,.12);--cyan:#86d7ff;--amber:#c9920a;--amber-dim:rgba(201,146,10,.12);--purple:#a78bfa;--purple-dim:rgba(167,139,250,.10);--r:5px;--mono:'JetBrains Mono','Fira Code','SF Mono',monospace}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;font-family:var(--mono);font-size:11px;background:var(--bg);color:var(--ink)}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
#boot{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;z-index:999}
#boot-icon{font-size:32px;color:var(--warn)}#boot-title{font-size:13px;font-weight:600;letter-spacing:.06em}#boot-sub{font-size:10px;color:var(--ink-2);letter-spacing:.12em}
body.mounted #boot{display:none}
#app{display:none;width:100%;height:100%;flex-direction:column}body.mounted #app{display:flex}
#topbar{display:flex;align-items:center;gap:8px;padding:6px 10px;background:var(--s1);border-bottom:1px solid var(--border);flex-shrink:0;min-height:36px}
#topbar-title{font-size:11px;font-weight:700;letter-spacing:.1em;color:var(--warn)}#topbar-sub{font-size:9px;color:var(--ink-2);}#topbar .sp{flex:1}
.tbtn{padding:4px 8px;background:transparent;color:var(--ink-2);border:1px solid var(--border);border-radius:var(--r);cursor:pointer;font-family:var(--mono);font-size:10px;transition:all .1s}.tbtn:hover{color:var(--ink);border-color:var(--border-hi)}.tbtn.pri{color:var(--warn);border-color:var(--warn)}.tbtn.dng{color:var(--bad);border-color:var(--bad)}
#wb{display:none;flex-shrink:0;padding:4px 10px;background:rgba(239,68,68,.08);border-bottom:1px solid rgba(239,68,68,.25);color:var(--bad);font-size:10px;gap:6px;flex-wrap:wrap;align-items:center}
#wb.on{display:flex}.wi{padding:2px 6px;background:rgba(239,68,68,.1);border-radius:3px;white-space:nowrap}
#grid{flex:1;display:grid;grid-template-columns:1fr 1fr 1fr;grid-template-rows:1fr 1fr;gap:1px;background:var(--border);overflow:hidden;min-height:0}
.pane{background:var(--bg);display:flex;flex-direction:column;overflow:hidden;min-height:0}
.ph{display:flex;align-items:center;gap:6px;padding:5px 8px;background:var(--s1);border-bottom:1px solid var(--border);flex-shrink:0;font-size:9px;text-transform:uppercase;letter-spacing:.12em;color:var(--ink-2)}
.ph .bk{margin-left:auto;padding:1px 5px;border:1px solid var(--border);border-radius:6px;font-size:8px;color:var(--ink-3)}
.ph input{margin-left:auto;flex:1;max-width:110px;background:var(--s2);border:1px solid var(--border);color:var(--ink);padding:2px 6px;border-radius:3px;font-family:var(--mono);font-size:9px;outline:none}
.pb{flex:1;overflow-y:auto;padding:6px}
.bc{padding:6px 8px;background:var(--s1);border:1px solid var(--border);border-radius:var(--r);cursor:pointer;margin-bottom:4px;transition:border-color .1s}.bc:hover{border-color:var(--border-hi)}.bc.sl{border-color:var(--warn);background:var(--amber-dim)}
.br{display:flex;align-items:center;gap:6px}
.dot{width:7px;height:7px;border-radius:50%;background:var(--ink-3);flex-shrink:0}.dot.mounted,.dot.ok{background:var(--ok);box-shadow:0 0 5px var(--ok)}.dot.loading,.dot.boot{background:var(--info);animation:pu 1s infinite}@keyframes pu{0%,100%{opacity:.4}50%{opacity:1}}.dot.evicted,.dot.bad{background:var(--bad)}
.bid{font-weight:600;font-size:10px;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bfl{display:flex;gap:3px;flex-shrink:0}.fl{font-size:8px;padding:1px 4px;border-radius:3px;border:1px solid}.fl.leg{color:var(--purple);border-color:var(--purple);background:var(--purple-dim)}.fl.vio{color:var(--bad);border-color:var(--bad);background:var(--bad-dim)}.fl.ret{color:var(--warn);border-color:var(--warn);background:var(--warn-dim)}
.bs{font-size:9px;color:var(--ink-2);margin-top:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.fi{display:flex;gap:8px;padding:3px 0;border-bottom:1px solid var(--border)}.fi .k{color:var(--ink-2);width:88px;flex-shrink:0;font-size:9px}.fi .v{color:var(--ink);word-break:break-all;flex:1;font-size:9px}.fi .v.ok{color:var(--ok)}.fi .v.w{color:var(--warn)}.fi .v.b{color:var(--bad)}
.sh{font-size:9px;text-transform:uppercase;letter-spacing:.1em;color:var(--ink-3);padding:8px 0 4px;border-bottom:1px solid var(--border);margin-bottom:4px}
.ct{display:flex;flex-wrap:wrap;gap:3px;margin:4px 0}.ct span{font-size:8px;padding:1px 5px;border-radius:3px;border:1px solid}.ct .em{color:var(--ok);border-color:var(--ok);background:var(--ok-dim)}.ct .co{color:var(--info);border-color:var(--info);background:var(--info-dim)}
.dx{padding:5px 8px;border-radius:var(--r);font-size:9px;margin:4px 0;line-height:1.5}.dx.bad{background:var(--bad-dim);color:var(--bad);border:1px solid rgba(239,68,68,.25)}.dx.warn{background:var(--warn-dim);color:var(--warn);border:1px solid rgba(245,158,11,.25)}.dx.ok{background:var(--ok-dim);color:var(--ok);border:1px solid rgba(61,186,110,.25)}
.lg{display:flex;flex-direction:column;gap:1px;font-size:9px}.ln{display:flex;gap:6px;padding:2px 4px;border-radius:2px}.ln:hover{background:var(--s2)}.ln .ts{color:var(--ink-3);flex-shrink:0;width:60px}.ln .lv{flex-shrink:0;width:28px;text-align:center;border-radius:2px;padding:0 2px}.ln .lv.ok{color:var(--ok);background:var(--ok-dim)}.ln .lv.info{color:var(--info);background:var(--info-dim)}.ln .lv.warn{color:var(--warn);background:var(--warn-dim)}.ln .lv.bad{color:var(--bad);background:var(--bad-dim)}.ln .mg{color:var(--ink);flex:1;word-break:break-all}
.sk{display:flex;flex-direction:column;gap:2px;margin-bottom:6px;background:var(--s1);border:1px solid var(--border);border-radius:var(--r);padding:5px 7px;cursor:pointer}.sk:hover{border-color:var(--border-hi)}.sk .kk{font-size:9px;color:var(--cyan)}.sk .vv{font-size:9px;color:var(--ink-2);word-break:break-all;max-height:44px;overflow:hidden}.sk.ex .vv{max-height:500px}
.cr{display:flex;align-items:center;gap:6px;padding:4px 6px;border-radius:var(--r);margin-bottom:2px;background:var(--s1);border:1px solid var(--border);cursor:pointer;flex-wrap:wrap}.cr:hover{border-color:var(--border-hi)}.cr.ac{border-color:var(--cyan)}.cn{flex:1;font-size:9px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0}.cc{font-size:9px;color:var(--ink-3);flex-shrink:0;min-width:24px;text-align:right}.crt{font-size:8px;color:var(--cyan);flex-shrink:0;min-width:36px;text-align:right}.cp{font-size:8px;color:var(--ink-2);padding:4px 6px;background:var(--s2);border-radius:3px;display:none;word-break:break-all;max-height:70px;overflow:hidden;width:100%}.cr.ac .cp{display:block}.dl{background:var(--bad-dim);border-color:rgba(239,68,68,.3)}.dl .cn{color:var(--bad)}
.ps{margin-bottom:10px}.pl{font-size:9px;text-transform:uppercase;letter-spacing:.1em;color:var(--ink-3);padding-bottom:4px;border-bottom:1px solid var(--border);margin-bottom:5px}.pn{font-size:13px;font-weight:600;margin-bottom:4px}.pu{font-size:9px;color:var(--ink-2);margin-bottom:6px}
.ag{display:grid;grid-template-columns:repeat(5,1fr);gap:3px;margin-bottom:4px}.ax{display:flex;flex-direction:column;align-items:center;gap:1px}.abw{width:100%;height:22px;background:var(--s2);border-radius:2px;overflow:hidden;position:relative}.ab{position:absolute;bottom:0;left:0;right:0;border-radius:2px 2px 0 0}.al{font-size:7px;color:var(--ink-3);text-align:center;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;width:100%}.av{font-size:7px;color:var(--ink-2)}.nd{font-size:10px;color:var(--ink-3);padding:8px 0}
.ff{display:flex;gap:3px}.fb{padding:2px 6px;border:1px solid var(--border);border-radius:3px;cursor:pointer;font-size:8px;background:transparent;color:var(--ink-3);font-family:var(--mono)}.fb.on.ok{color:var(--ok);border-color:var(--ok)}.fb.on.w{color:var(--warn);border-color:var(--warn)}.fb.on.b{color:var(--bad);border-color:var(--bad)}.fb.on.i{color:var(--info);border-color:var(--info)}
</style>
</head>
<body>
<div id="boot"><div id="boot-icon">⊕</div><div id="boot-title">BLOCK DOCTOR</div><div id="boot-sub">connecting to kernel…</div></div>
<div id="app">
  <div id="topbar">
    <span id="topbar-title">BLOCK DOCTOR</span>
    <span id="topbar-sub">v2 · <span id="up">—</span></span>
    <div class="sp"></div>
    <button class="tbtn pri" id="btn-ai">⎘ copy AI report</button>
    <button class="tbtn" id="btn-rf">↺ refresh</button>
    <button class="tbtn dng" id="btn-cl">clear log</button>
  </div>
  <div id="wb"></div>
  <div id="grid">
    <div class="pane"><div class="ph">Blocks <span id="bct" class="bk">0</span><input id="bsr" placeholder="filter…" autocomplete="off"></div><div class="pb" id="bl"></div></div>
    <div class="pane"><div class="ph">Detail <span id="did" class="bk">—</span></div><div class="pb" id="db"><div style="color:var(--ink-3);font-size:10px;padding:12px">Select a block ←</div></div></div>
    <div class="pane"><div class="ph">Kernel Feed <span id="fct" class="bk">0</span><div class="ff" style="margin-left:4px"><button class="fb on ok" data-l="OK">OK</button><button class="fb on i" data-l="INFO">INF</button><button class="fb on w" data-l="WARN">WRN</button><button class="fb on b" data-l="BAD">BAD</button></div></div><div class="pb" id="fb"></div></div>
    <div class="pane"><div class="ph">Storage <span id="sct" class="bk">0</span></div><div class="pb" id="sb"></div></div>
    <div class="pane"><div class="ph">Channels <span id="cct" class="bk">0</span></div><div class="pb" id="cb"></div></div>
    <div class="pane"><div class="ph">Forge Probe</div><div class="pb" id="fp"></div></div>
  </div>
</div>
<script src="../../engines/nexus-block-client.js"></script>
<script>
'use strict';
const BLK=new Map(),FEED=[],CHTRAF=new Map(),DEAD=[];
let selBl=null,actCh=null,filt=new Set(['OK','INFO','WARN','BAD']),bootAt=Date.now(),SS={};
const ALL=['nexus.kernel.log','nexus.kernel.ping','system.companion.selected','system.environment.selected','system.attack.selected','system.block_ready','system.health','lattice.imprint','lattice.library.changed','vibe.notify','vibe.save','vibe.list','vibe.load','vibe.battle.results','vibe.imprint.create','economy.notify.balance_changed','economy.notify.epoch_closed','economy.notify.mint_published','economy.notify.transfer_received','economy.notify.publish_pending','economy.notify.publish_succeeded','economy.notify.publish_abandoned','economy.notify.event_dropped','nexus.wallet.state','fs.mounted','fs.status','eidolon.battle.result','eidolon.challenger.appears','eidolon.minted','eidolon.world.tick','companion.canvas.export','verse.ready','verse.state.snapshot','db.notify','web.navigation','nexus.launch','nexus.notify','wallet.fork_proof.result','wallet.lock.result','nexus.deadletter','nexus.notification.displayed','nexus.notification.action','nexus.v4.transition','eidolon.sim.speed','arena.play','db.query','db.result','db.subscribe','iww.admission','crucible.session.complete','companion.brief.copied','web.clip','web.open'];
try{
  const nx=window.NexusBlockClient.bootBlock({manifest:{emits:[],consumes:ALL,app:{title:'Block Doctor',icon:'⊕',description:'System diagnostic & AI handoff tool',visible:true}}});
  nx.onMessage((ch,pl)=>{recCh(ch,pl);if(ch==='nexus.kernel.log'){const{level:lv,message:msg,at}=pl||{};addFeed(lv||'INFO',msg||String(pl),at);parseLog(lv,msg,pl);}if(ch==='nexus.deadletter'){DEAD.unshift({channel:pl.channel,src:pl.src||'?',at:Date.now(),payload:pl.payload});if(DEAD.length>100)DEAD.pop();}if(ch.startsWith('system.')||ch==='lattice.imprint')rdSS();sched();});
  document.body.classList.add('mounted');
}catch(e){document.getElementById('boot-sub').textContent='standalone mode';setTimeout(()=>document.body.classList.add('mounted'),800);}
rdSS();setInterval(()=>{rdSS();renderAll();},1000);

function recCh(ch,pl){if(!CHTRAF.has(ch))CHTRAF.set(ch,{count:0,lastAt:0,lastPayload:null,msgs:[],rw:[]});const r=CHTRAF.get(ch);r.count++;r.lastAt=Date.now();r.lastPayload=pl;const cut=Date.now()-60000;r.rw=r.rw.filter(t=>t>cut);r.rw.push(Date.now());r.msgs.unshift({at:Date.now(),payload:pl});if(r.msgs.length>10)r.msgs.pop();}
function parseLog(lv,msg,raw){
  if(!msg)return;
  const sp=msg.match(/^spawn ([^\s]+) → (.+)/);if(sp){eb(sp[1]).url=sp[2];eb(sp[1]).state='loading';eb(sp[1]).spawnAt=Date.now();}
  const bt=msg.match(/^([^\s]+) BOOT sent/);if(bt){eb(bt[1]).state='boot';eb(bt[1]).bootAt=Date.now();}
  const mt=msg.match(/^([^\s]+) (?:BOOT received|loaded|mounted|loaded \(legacy)/i);if(mt){eb(mt[1]).state='mounted';eb(mt[1]).mountAt=Date.now();}
  const fa=msg.match(/^([^\s]+) BOOT failed: (.+)/);if(fa){eb(fa[1]).state='evicted';eb(fa[1]).evictedReason=fa[2];}
  const ev=msg.match(/^evict(?:ing)? ([^\s]+)[, ]+(?:reason: )?(.+)/i);if(ev){eb(ev[1]).state='evicted';eb(ev[1]).evictedReason=ev[2];}
  const vi=msg.match(/^([^\s]+) violation: (.+)/);if(vi){const b=eb(vi[1]);b.violations=(b.violations||0)+1;b.lastViol=vi[2];}
  const re=msg.match(/^([^\s]+) reload \(retry #(\d+)\)/);if(re){eb(re[1]).retryCount=Number(re[2]);}
  if(raw&&raw.blockId&&raw.manifest){const b=eb(raw.blockId);b.manifest=raw.manifest;}
  const fw=msg.match(/^([A-Z0-9-]{3,})/);if(fw&&BLK.has(fw[1])){const b=BLK.get(fw[1]);b.log.push({at:Date.now(),lvl:(lv||'INFO').toUpperCase(),msg});if(b.log.length>200)b.log.shift();}
}
function addFeed(lv,msg,at){FEED.unshift({at:at||Date.now(),lvl:(lv||'INFO').toUpperCase(),msg:String(msg)});if(FEED.length>500)FEED.pop();}
function eb(id){if(!BLK.has(id))BLK.set(id,{id,url:null,state:'loading',spawnAt:Date.now(),bootAt:null,mountAt:null,violations:0,retryCount:0,evictedReason:null,lastViol:null,manifest:{emits:[],consumes:[]},log:[],legacy:false});return BLK.get(id);}
function rdSS(){SS={};try{for(let i=0;i<localStorage.length;i++){const k=localStorage.key(i);if(!k)continue;if(k.startsWith('nexus:')||k.startsWith('eidolon:')||k==='nexus.proxyUrl'){try{SS[k]=localStorage.getItem(k);}catch(_){}}};}catch(_){}}
function sg(k){try{const v=localStorage.getItem(k);return v?JSON.parse(v):null;}catch(_){return null;}}
function warns(){const w=[];const co=sg('nexus:selected-companion:v1');const en=sg('nexus:selected-environment:v1');if(!co)w.push('No companion — First Contact needed');if(!en)w.push('No environment — desktop world unset');const hasFsh=Object.keys(SS).some(k=>k.startsWith('nexus:fs-handle'));if(!hasFsh)w.push('No folder mounted — saves will fail');const run=Array.from(BLK.values()).filter(b=>b.state==='mounted').map(b=>b.id);if(!run.some(id=>id.toLowerCase().includes('atlas')))w.push('Atlas offline');if(!run.some(id=>id.toLowerCase().includes('wallet')))w.push('Wallet not running');for(const b of BLK.values()){if(b.state==='boot'&&b.bootAt&&Date.now()-b.bootAt>8000)w.push(`${b.id}: boot stalled >8s — needs legacy:true?`);if(b.retryCount>2)w.push(`${b.id}: ${b.retryCount} crash-reloads`);if(b.violations>0)w.push(`${b.id}: ${b.violations} violation(s)`);}if(DEAD.length>0)w.push(`${DEAD.length} dead letter(s)`);return w;}
function diag(b){if(b.state==='evicted')return{s:'bad',t:`Evicted: ${b.evictedReason||'unknown'}. If a non-NexusBlockClient block: add legacy:true to BUILTIN_CATALOG.`};if(b.state==='boot'&&b.bootAt&&Date.now()-b.bootAt>8000)return{s:'bad',t:'Boot stalled >8s. Block does not implement NexusBlockClient BOOT handshake. Set legacy:true in BUILTIN_CATALOG entry.'};if(b.state==='loading'&&b.spawnAt&&Date.now()-b.spawnAt>5000)return{s:'warn',t:'Load >5s — wrong path or file not found?'};if(b.violations>0)return{s:b.violations>3?'bad':'warn',t:`${b.violations} protocol violation(s). Last: ${b.lastViol||'?'}`};if(b.retryCount>0)return{s:b.retryCount>2?'bad':'warn',t:`Reloaded ${b.retryCount}× — unstable block`};if(b.state==='mounted')return{s:'ok',t:'Healthy · mounted · kernel handshake complete'};return null;}
let rq=false;function sched(){if(!rq){rq=true;requestAnimationFrame(()=>{renderAll();rq=false;});}}
function renderAll(){renderW();renderBl();renderFd();renderSS();renderCh();renderFP();renderDet();document.getElementById('up').textContent=dur(Date.now()-bootAt);}
function renderW(){const bar=document.getElementById('wb');const w=warns();bar.innerHTML='';if(!w.length){bar.classList.remove('on');return;}bar.classList.add('on');const lbl=document.createElement('span');lbl.style.cssText='color:var(--bad);font-weight:700;font-size:9px;flex-shrink:0';lbl.textContent=`⚠ ${w.length}:`;bar.appendChild(lbl);for(const x of w){const el=document.createElement('span');el.className='wi';el.textContent=x;bar.appendChild(el);}}
function renderBl(){const el=document.getElementById('bl');const q=document.getElementById('bsr').value.toLowerCase();document.getElementById('bct').textContent=BLK.size;el.innerHTML='';const ord={mounted:0,boot:1,loading:2,evicted:3};const sorted=Array.from(BLK.values()).sort((a,b)=>(ord[a.state]??4)-(ord[b.state]??4));for(const b of sorted){if(q&&!b.id.toLowerCase().includes(q)&&!(b.url||'').toLowerCase().includes(q))continue;const c=document.createElement('div');c.className='bc'+(b.id===selBl?' sl':'');c.onclick=()=>{selBl=b.id;renderDet();renderBl();};const r=document.createElement('div');r.className='br';const d=document.createElement('div');d.className=`dot ${b.state}`;r.appendChild(d);const id=document.createElement('div');id.className='bid';id.textContent=b.id;r.appendChild(id);const fl=document.createElement('div');fl.className='bfl';if(b.legacy){const f=document.createElement('span');f.className='fl leg';f.textContent='LEG';fl.appendChild(f);}if(b.violations>0){const f=document.createElement('span');f.className='fl vio';f.textContent=`V${b.violations}`;fl.appendChild(f);}if(b.retryCount>0){const f=document.createElement('span');f.className='fl ret';f.textContent=`R${b.retryCount}`;fl.appendChild(f);}r.appendChild(fl);c.appendChild(r);if(b.url){const s=document.createElement('div');s.className='bs';s.textContent=`${b.state} · ${b.url.length>38?b.url.slice(0,35)+'…':b.url}`;c.appendChild(s);}el.appendChild(c);}if(!BLK.size)el.innerHTML='<div style="color:var(--ink-3);font-size:10px;padding:12px">Waiting for kernel feed…</div>';}
function renderDet(){const el=document.getElementById('db');const idEl=document.getElementById('did');if(!selBl||!BLK.has(selBl)){idEl.textContent='—';el.innerHTML='<div style="color:var(--ink-3);font-size:10px;padding:12px">Select a block ←</div>';return;}const b=BLK.get(selBl);idEl.textContent=b.id;el.innerHTML='';const af=(k,v,cls)=>{const f=document.createElement('div');f.className='fi';const kk=document.createElement('span');kk.className='k';kk.textContent=k;const vv=document.createElement('span');vv.className='v'+(cls?' '+cls:'');vv.textContent=v;f.appendChild(kk);f.appendChild(vv);el.appendChild(f);};af('state',b.state,b.state==='mounted'?'ok':b.state==='evicted'?'b':b.state==='boot'?'w':'');af('legacy',String(b.legacy),b.legacy?'w':'');if(b.url)af('url',b.url);if(b.spawnAt)af('spawned',ft(b.spawnAt));if(b.mountAt)af('mounted',ft(b.mountAt));if(b.bootAt)af('boot sent',ft(b.bootAt));if(b.violations)af('violations',String(b.violations),'b');if(b.retryCount)af('reloads',String(b.retryCount),b.retryCount>2?'b':'w');if(b.evictedReason)af('evicted',b.evictedReason,'b');if(b.lastViol)af('last violation',b.lastViol,'w');if(b.spawnAt)af('lifetime',dur(Date.now()-b.spawnAt));if(b.manifest&&(b.manifest.emits.length||b.manifest.consumes.length)){const sh=document.createElement('div');sh.className='sh';sh.textContent='Manifest';el.appendChild(sh);const ct=document.createElement('div');ct.className='ct';for(const c of(b.manifest.emits||[])){const t=document.createElement('span');t.className='em';t.textContent='→ '+c;ct.appendChild(t);}for(const c of(b.manifest.consumes||[])){const t=document.createElement('span');t.className='co';t.textContent='← '+c;ct.appendChild(t);}el.appendChild(ct);}const dx=diag(b);if(dx){const sh=document.createElement('div');sh.className='sh';sh.textContent='Diagnosis';el.appendChild(sh);const d=document.createElement('div');d.className='dx '+dx.s;d.textContent=dx.t;el.appendChild(d);}const sh2=document.createElement('div');sh2.className='sh';sh2.textContent=`Log (${b.log.length})`;el.appendChild(sh2);const lg=document.createElement('div');lg.className='lg';for(const ln of b.log.slice(-50).reverse()){const row=document.createElement('div');row.className='ln';const ts=document.createElement('span');ts.className='ts';ts.textContent=ft(ln.at);const lv=document.createElement('span');lv.className='lv '+ln.lvl.toLowerCase();lv.textContent=ln.lvl.slice(0,4);const m=document.createElement('span');m.className='mg';m.textContent=ln.msg;row.appendChild(ts);row.appendChild(lv);row.appendChild(m);lg.appendChild(row);}if(!b.log.length){const e=document.createElement('div');e.style.cssText='color:var(--ink-3);font-size:9px;padding:4px';e.textContent='No log entries yet.';lg.appendChild(e);}el.appendChild(lg);}
function renderFd(){const el=document.getElementById('fb');document.getElementById('fct').textContent=FEED.length;el.innerHTML='';const show=FEED.filter(l=>filt.has(l.lvl)).slice(0,150);for(const ln of show){const row=document.createElement('div');row.className='ln';const ts=document.createElement('span');ts.className='ts';ts.textContent=ft(ln.at);const lv=document.createElement('span');lv.className='lv '+ln.lvl.toLowerCase();lv.textContent=ln.lvl.slice(0,4);const m=document.createElement('span');m.className='mg';m.textContent=ln.msg;row.appendChild(ts);row.appendChild(lv);row.appendChild(m);el.appendChild(row);}if(!FEED.length)el.innerHTML='<div style="color:var(--ink-3);padding:12px;font-size:10px">Waiting for kernel log…</div>';}
function renderSS(){const el=document.getElementById('sb');const ks=Object.keys(SS);document.getElementById('sct').textContent=ks.length;el.innerHTML='';if(!ks.length){el.innerHTML='<div style="color:var(--ink-3);padding:16px;font-size:10px;text-align:center">No nexus:/eidolon: keys found</div>';return;}for(const k of ks.sort()){const v=SS[k];const row=document.createElement('div');row.className='sk';row.onclick=()=>row.classList.toggle('ex');const kk=document.createElement('div');kk.className='kk';kk.textContent=k;let disp=v;try{disp=JSON.stringify(JSON.parse(v),null,1);}catch(_){}const vv=document.createElement('div');vv.className='vv';vv.textContent=disp||'(empty)';row.appendChild(kk);row.appendChild(vv);el.appendChild(row);}}
function renderCh(){const el=document.getElementById('cb');document.getElementById('cct').textContent=CHTRAF.size+DEAD.length;el.innerHTML='';if(DEAD.length){const dh=document.createElement('div');dh.style.cssText='font-size:9px;color:var(--bad);text-transform:uppercase;letter-spacing:.1em;padding:4px 0';dh.textContent=`Dead Letters (${DEAD.length})`;el.appendChild(dh);for(const dl of DEAD.slice(0,5)){const row=document.createElement('div');row.className='cr dl';const nm=document.createElement('div');nm.className='cn';nm.textContent=`${dl.channel} ← ${dl.src}`;const ts=document.createElement('div');ts.className='cc';ts.textContent=ft(dl.at);row.appendChild(nm);row.appendChild(ts);el.appendChild(row);}}for(const[ch,rec]of Array.from(CHTRAF.entries()).sort((a,b)=>b[1].lastAt-a[1].lastAt)){const row=document.createElement('div');row.className='cr'+(ch===actCh?' ac':'');row.onclick=()=>{actCh=actCh===ch?null:ch;renderCh();};const nm=document.createElement('div');nm.className='cn';nm.textContent=ch;const cnt=document.createElement('div');cnt.className='cc';cnt.textContent=rec.count;const rt=document.createElement('div');rt.className='crt';rt.textContent=rec.rw.length>0?`${rec.rw.length}/m`:'';row.appendChild(nm);row.appendChild(cnt);row.appendChild(rt);if(ch===actCh&&rec.msgs.length){const prev=document.createElement('div');prev.className='cp';prev.textContent=rec.msgs.slice(0,3).map(m=>{try{return JSON.stringify(m.payload,null,1).slice(0,120);}catch(_){return String(m.payload).slice(0,120);}}).join('\n---\n');row.appendChild(prev);}el.appendChild(row);}if(!CHTRAF.size)el.innerHTML='<div style="color:var(--ink-3);padding:12px;font-size:10px">No channel traffic yet…</div>';}
function renderFP(){const el=document.getElementById('fp');el.innerHTML='';const co=sg('nexus:selected-companion:v1');const en=sg('nexus:selected-environment:v1');const at=sg('nexus:selected-attack:v1');const tpls=sg('eidolon:attack-templates:v1')||[];const lib=sg('eidolon:creature-library:v1')||[];const sec=(label,fn)=>{const s=document.createElement('div');s.className='ps';const l=document.createElement('div');l.className='pl';l.textContent=label;s.appendChild(l);fn(s);el.appendChild(s);};const axGrid=(axes,list)=>{const g=document.createElement('div');g.className='ag';for(const[id,lbl]of list){const val=axes[id]!==undefined?axes[id]:128;const pct=(val/255*100).toFixed(0);const hue=id.includes('hue')?val/255*360:200;const ax=document.createElement('div');ax.className='ax';const w=document.createElement('div');w.className='abw';const b=document.createElement('div');b.className='ab';b.style.cssText=`height:${pct}%;background:hsl(${hue},60%,55%)`;w.appendChild(b);const al=document.createElement('div');al.className='al';al.textContent=lbl;const av=document.createElement('div');av.className='av';av.textContent=val;ax.appendChild(w);ax.appendChild(al);ax.appendChild(av);g.appendChild(ax);}return g;};
sec('Companion',s=>{if(co){const n=document.createElement('div');n.className='pn';n.textContent=co.name||'Unnamed';s.appendChild(n);const u=document.createElement('div');u.className='pu';u.textContent=`seed 0x${(co.seed>>>0).toString(16)} · ${co.id||'no id'}`;s.appendChild(u);if(co.axes)s.appendChild(axGrid(co.axes,[['body_radius','body r'],['arm_count','arms'],['eye_count','eyes'],['hue_primary','hue P'],['hue_accent','hue A'],['saturation','sat'],['lightness','lit'],['glow_radius','glow'],['particle_count','parts'],['mark_spots','spots'],['mark_drips','drips'],['mark_facets','facets'],['body_lumpiness','lumpy'],['pulse_rate','pulse'],['core_size','core']]));}else{const nd=document.createElement('div');nd.className='nd';nd.textContent='No companion — run First Contact';s.appendChild(nd);}});
sec('Environment',s=>{if(en){const n=document.createElement('div');n.className='pn';n.textContent=en.name||'Unnamed';s.appendChild(n);const u=document.createElement('div');u.className='pu';u.textContent=`seed 0x${(en.seed>>>0).toString(16)}`;s.appendChild(u);if(en.axes)s.appendChild(axGrid(en.axes,[['sky_top_hue','sky H'],['sky_saturation','sky S'],['sky_top_lightness','sky L'],['star_count','stars'],['far_count','far'],['mid_count','mid'],['ground_y','gnd Y'],['ground_hue','gnd H'],['fog_density','fog'],['vignette','vign']]));}else{const nd=document.createElement('div');nd.className='nd';nd.textContent='No environment selected';s.appendChild(nd);}});
sec('Attack',s=>{if(at&&at.axes){const n=document.createElement('div');n.className='pn';n.textContent=at.name||'Unnamed';s.appendChild(n);const ant=Math.round(at.axes.anticipation_time/255*800);const str=Math.round(at.axes.strike_time/255*400);const imp=Math.round(at.axes.impact_hold/255*400);const rec=Math.round(at.axes.recovery_time/255*600);const u=document.createElement('div');u.className='pu';u.textContent=`ant:${ant}ms · str:${str}ms · imp:${imp}ms · rec:${rec}ms · total:${ant+str+imp+rec}ms`;s.appendChild(u);}else{const nd=document.createElement('div');nd.className='nd';nd.textContent='No attack selected';s.appendChild(nd);}});
sec('Asset Counts',s=>{for(const[k,v]of[['Attack templates',tpls.length],['Creature library',Array.isArray(lib)?lib.length:Object.keys(lib).length]]){const f=document.createElement('div');f.className='fi';const kk=document.createElement('span');kk.className='k';kk.textContent=k;const vv=document.createElement('span');vv.className='v'+(v>0?' ok':'');vv.textContent=String(v);f.appendChild(kk);f.appendChild(vv);s.appendChild(f);}});}
function aiReport(){const lines=[];const co=sg('nexus:selected-companion:v1');const en=sg('nexus:selected-environment:v1');const at=sg('nexus:selected-attack:v1');const w=warns();lines.push('# NEXUS MOOT BLOCK DOCTOR REPORT');lines.push(`# ${new Date().toISOString()}`);lines.push('# Paste into a new AI chat for instant system context.');lines.push('');lines.push('## SYSTEM');lines.push(`uptime: ${dur(Date.now()-bootAt)}`);lines.push(`blocks: ${BLK.size} total / ${Array.from(BLK.values()).filter(b=>b.state==='mounted').length} mounted / ${Array.from(BLK.values()).filter(b=>b.state==='evicted').length} evicted`);lines.push(`channels_seen: ${CHTRAF.size} · dead_letters: ${DEAD.length} · storage_keys: ${Object.keys(SS).length}`);lines.push('');if(co){lines.push('## COMPANION');lines.push(`name: ${co.name} · seed: 0x${(co.seed>>>0).toString(16)} · id: ${co.id||'?'}`);if(co.axes)lines.push(`axes: ${JSON.stringify(co.axes)}`);}else lines.push('## COMPANION\nnone — First Contact not completed');lines.push('');if(en){lines.push('## ENVIRONMENT');lines.push(`name: ${en.name} · seed: 0x${(en.seed>>>0).toString(16)}`);if(en.axes)lines.push(`axes: ${JSON.stringify(en.axes)}`);}else lines.push('## ENVIRONMENT\nnone');lines.push('');if(at){lines.push('## SELECTED ATTACK');lines.push(`name: ${at.name}`);if(at.axes)lines.push(`axes: ${JSON.stringify(at.axes)}`);}lines.push('');lines.push('## BLOCKS');for(const b of Array.from(BLK.values()).sort((a,z)=>a.id.localeCompare(z.id))){lines.push(`[${b.id}] state=${b.state} legacy=${b.legacy} violations=${b.violations} retries=${b.retryCount}`);if(b.url)lines.push(`  url: ${b.url}`);if(b.evictedReason)lines.push(`  evicted: ${b.evictedReason}`);if(b.manifest&&b.manifest.emits.length)lines.push(`  emits: ${b.manifest.emits.join(', ')}`);if(b.manifest&&b.manifest.consumes.length)lines.push(`  consumes: ${b.manifest.consumes.join(', ')}`);const dx=diag(b);if(dx)lines.push(`  [${dx.s}] ${dx.t}`);}lines.push('');lines.push('## CHANNEL TRAFFIC');for(const[ch,r]of Array.from(CHTRAF.entries()).sort((a,b)=>b[1].count-a[1].count)){lines.push(`${ch}: total=${r.count} rate=${r.rw.length}/min last=${ft(r.lastAt)}`);if(r.lastPayload){try{lines.push(`  last: ${JSON.stringify(r.lastPayload).slice(0,200)}`);}catch(_){}}}lines.push('');if(DEAD.length){lines.push('## DEAD LETTERS');for(const dl of DEAD){lines.push(`${dl.channel} ← ${dl.src} at=${ft(dl.at)}`);try{lines.push(`  ${JSON.stringify(dl.payload).slice(0,120)}`);}catch(_){}}}lines.push('');lines.push('## STORAGE');for(const[k,v]of Object.entries(SS))lines.push(`${k}: ${(v||'').slice(0,300)}${v&&v.length>300?'…':''}`);lines.push('');if(w.length){lines.push('## WARNINGS');for(const x of w)lines.push(`- ${x}`);}else lines.push('## WARNINGS\nnone');lines.push('');lines.push('## RECENT LOG (last 30)');for(const ln of FEED.slice(0,30))lines.push(`${ft(ln.at)} ${ln.lvl} ${ln.msg}`);return lines.join('\n');}
document.getElementById('btn-cl').onclick=()=>{FEED.length=0;renderFd();};
document.getElementById('btn-rf').onclick=()=>{rdSS();renderAll();};
document.getElementById('btn-ai').onclick=async()=>{const r=aiReport();try{await navigator.clipboard.writeText(r);const btn=document.getElementById('btn-ai');const o=btn.textContent;btn.textContent='✓ copied';setTimeout(()=>btn.textContent=o,1800);}catch(e){const u=URL.createObjectURL(new Blob([r],{type:'text/plain'}));const a=document.createElement('a');a.href=u;a.download='block-doctor-report.txt';a.click();URL.revokeObjectURL(u);}};
document.getElementById('bsr').oninput=()=>renderBl();
document.querySelectorAll('.fb').forEach(btn=>btn.addEventListener('click',()=>{const l=btn.dataset.l;if(filt.has(l)){filt.delete(l);btn.classList.remove('on');}else{filt.add(l);btn.classList.add('on');}renderFd();}));
function ft(ts){return new Date(ts).toLocaleTimeString('en-GB',{hour12:false,hour:'2-digit',minute:'2-digit',second:'2-digit'});}
function dur(ms){if(ms<1000)return `${ms}ms`;if(ms<60000)return `${(ms/1000).toFixed(1)}s`;return `${Math.floor(ms/60000)}m ${Math.floor((ms%60000)/1000)}s`;}
</script>
