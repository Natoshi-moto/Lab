/* ════════════════════════════════════════════════════════════════════
   Section 10  ·  Command bar
   ════════════════════════════════════════════════════════════════════ */
const CATALOG = [
  { path:'./atlas.html',          title:'Atlas',           icon:'⊕', desc:'Worlds & releases' },
  { path:'./vibes-library.html',  title:'Vibes Library',   icon:'◈', desc:'Asset library & lineage' },
  { path:'./vibes-crucible.html', title:'Crucible',        icon:'⚒', desc:'Compose battles' },
  { path:'./vibes-arena.html',    title:'Arena',           icon:'⚔', desc:'Run battles' },
  { path:'./eidolon-router.html', title:'Eidolon Router',  icon:'◉', desc:'World engine' },
  { path:'blocks/eidolon/eidolon-os.html',     title:'Eidolon OS',      icon:'⚙', desc:'Battle cartridge' },
  { path:'./nexus-db.html',       title:'NexusDB',         icon:'▦', desc:'Persistence layer' },
  { path:'./nexus-witness.html',  title:'Nexus Witness',   icon:'◐', desc:'Provenance' },
];

function initCommandBar() {
  document.querySelectorAll('.qbtn[data-launch]').forEach(b => {
    b.addEventListener('click', () => {
      emit('nexus.launch', {
        path: b.dataset.launch,
        title: b.dataset.title,
        icon: b.dataset.icon,
        legacy: b.dataset.legacy === 'true' ? true : false
      });
      toast(`launching ${b.dataset.title}`);
    });
  });

  const openBtn = document.getElementById('cmd-open');
  openBtn.addEventListener('click', e => {
    showCmdPopover(e.target, CATALOG.map(a => ({
      icn: a.icon, ttl: a.title, desc: a.desc,
      onClick: () => emit('nexus.launch', { path: a.path, title: a.title, icon: a.icon, legacy: false })
    })));
  });

  const speedBtn = document.getElementById('cmd-speed');
  speedBtn.addEventListener('click', e => {
    const opts = [
      { ms: 1200, label: '0.5×  drowsy' },
      { ms: 600,  label: '1×    normal' },
      { ms: 200,  label: '3×    fast' },
      { ms: 50,   label: '12×   turbo' },
      { ms: 10,   label: '60×   sim preview' },
    ];
    showCmdPopover(e.target, opts.map(o => ({
      icn: '◑', ttl: o.label,
      desc: o.ms === STATE.simSpeed ? 'current' : `tick = ${o.ms}ms`,
      onClick: () => {
        STATE.simSpeed = o.ms;
        speedBtn.textContent = '▾ ' + o.label.split(' ').slice(0,2).join(' ');
        emit('eidolon.sim.speed', { tickIntervalMs: o.ms });
        toast(`sim speed → ${o.label.trim()}`);
      }
    })));
  });

  // Query bar
  const qInput = document.getElementById('cmd-query');
  qInput.addEventListener('keydown', e => {
    if (e.key === 'Enter') runQuery(qInput.value);
  });

  // feed filters
  document.querySelectorAll('.tog[data-filter]').forEach(t => {
    t.addEventListener('click', () => {
      const k = t.dataset.filter;
      STATE.filters[k] = !STATE.filters[k];
      t.classList.toggle('on', STATE.filters[k]);
      renderFeed();
    });
  });
  document.getElementById('feed-search').addEventListener('input', e => {
    STATE.filters.search = e.target.value || '';
    renderFeed();
  });
}

let popover = null;
function showCmdPopover(anchor, items) {
  hideCmdPopover();
  popover = document.createElement('div');
  popover.className = 'cmd-popover';
  for (const it of items) {
    const row = document.createElement('div');
    row.className = 'cmd-item';
    row.innerHTML = `<span class="icn">${it.icn||'◆'}</span><span class="ttl">${escapeHtml(it.ttl)}</span><span class="desc">${escapeHtml(it.desc||'')}</span>`;
    row.addEventListener('click', () => { it.onClick && it.onClick(); hideCmdPopover(); });
    popover.appendChild(row);
  }
  document.body.appendChild(popover);
  const r = anchor.getBoundingClientRect();
  popover.style.left = r.left + 'px';
  popover.style.bottom = (window.innerHeight - r.top + 4) + 'px';
  setTimeout(() => document.addEventListener('mousedown', outsideClose, true), 0);
}
function outsideClose(e) {
  if (popover && !popover.contains(e.target)) hideCmdPopover();
}
function hideCmdPopover() {
  if (popover) {
    popover.remove(); popover = null;
    document.removeEventListener('mousedown', outsideClose, true);
  }
}

async function runQuery(q) {
  q = (q||'').trim();
  if (!q) return;
  toast(`query: ${q}`);
  // simple parser: "vibe.list type=creature", "block=router", "channel=eidolon.world.tick"
  if (/^vibe\.list/i.test(q)) {
    const type = (q.match(/type=(\S+)/) || [])[1];
    try {
      const r = await call('vibe.list', { type });
      if (r.ok) {
        const data = r.data || [];
        const root = document.getElementById('inspector');
        root.innerHTML = `
          <div class="dossier">
            <h2><span class="pin"></span>QUERY · vibe.list</h2>
            <div class="subtitle">${data.length} result${data.length!==1?'s':''}${type?' · type='+escapeHtml(type):''}</div>
            <section>
              <div class="recent">
                ${data.slice(0,40).map(v => `<div class="r-line" data-vibe="${escapeHtml(v.id)}" style="cursor:pointer;"><div class="r-time">${escapeHtml(v.type)}</div><div class="r-msg">${escapeHtml(v.name||v.id)}</div></div>`).join('') || '<span style="color:var(--ink-3); font-style:italic;">empty</span>'}
              </div>
            </section>
          </div>
        `;
        root.querySelectorAll('[data-vibe]').forEach(r => r.addEventListener('click', () => selectVibe(r.dataset.vibe)));
        document.getElementById('insp-crumb').textContent = `query · vibe.list`;
        STATE.inspector = { kind: 'query', ref: q };
      } else toast('query failed: ' + (r.error||'unknown'), 'bad');
    } catch (e) { toast('query failed: ' + e.message, 'bad'); }
    return;
  }
  const mb = q.match(/^block=(\S+)/i);
  if (mb) { selectBlock(mb[1]); return; }
  const mc = q.match(/^channel=(\S+)/i);
  if (mc) { selectChannel(mc[1]); return; }
  toast('unknown query syntax', 'warn');
}

/* ════════════════════════════════════════════════════════════════════
   Section 11  ·  Toasts
   ════════════════════════════════════════════════════════════════════ */
function toast(message, level = 'info', ttl = 3000) {
  const stack = document.getElementById('toasts');
  const t = document.createElement('div');
  t.className = 'toast' + (level !== 'info' ? ' ' + level : '');
  t.textContent = message;
  stack.appendChild(t);
  setTimeout(() => {
    t.style.transition = 'opacity 0.4s';
    t.style.opacity = '0';
    setTimeout(() => t.remove(), 400);
  }, ttl);
}

/* ════════════════════════════════════════════════════════════════════
   Section 12  ·  Boot orchestration
   ════════════════════════════════════════════════════════════════════ */
async function onMounted() {
  document.getElementById('boot-stamp').textContent = 'channels active — loading inventory…';

  // Fetch initial vibe inventory (live query, satisfies constraint #2: this isn't cached state, it's a derived view of the canonical store)
  try {
    const r = await call('vibe.list', {}, 5000);
    if (r && r.ok && Array.isArray(r.data)) {
      for (const v of r.data) STATE.vibes.set(v.id, v);
      pushStructured('system', 'info',
        `loaded ${r.data.length} vibes from library`,
        { what: `library inventory mirrored to mission-control index`,
          why:  `MC issued vibe.list on mount; library responded with envelope summaries`,
          so_what: `population/coverage stats now derive from this index plus live vibe.notify deltas` },
        null);
    }
  } catch (e) {
    pushStructured('system', 'warn',
      `library not reachable: ${e.message}`,
      { what: `vibe.list timed out`,
        why:  `vibes-library block isn't mounted, or hasn't subscribed yet`,
        so_what: `MC will keep retrying via vibe.notify; library stats degraded`,
        action: { label: 'launch library', kind: 'launch', target: './vibes-library.html' } });
  }

  // Show frame
  setTimeout(() => {
    document.getElementById('boot-overlay').classList.add('gone');
    setTimeout(() => document.getElementById('boot-overlay').remove(), 800);
  }, 350);

  // Once a second, refresh time-sensitive UI
  setInterval(() => {
    const up = Math.floor((Date.now() - APP.bootAt) / 1000);
    const hh = pad2(Math.floor(up/3600));
    const mm = pad2(Math.floor(up/60) % 60);
    const ss = pad2(up % 60);
    document.getElementById('cs-uptime').textContent = `${hh}:${mm}:${ss}`;
    // also expire old emissions
    const cutoff = nowTs() - EMISSION_WINDOW_MS;
    while (STATE.emissions.length && STATE.emissions[0].t < cutoff) STATE.emissions.shift();
    if (TOPO.svg) {
      // mild perturbation so edges that decay redraw their dash
      paintTopology();
    }
    if (!STATE.inspector) renderInspectorEmpty();
  }, 1000);
}

/* ════════════════════════════════════════════════════════════════════
   Section 13  ·  Keyboard shortcuts + help tag
   ════════════════════════════════════════════════════════════════════ */
const SHORTCUTS = [
  ['/',         'focus query / search bar'],
  ['?',         'show this help'],
  ['Esc',       'clear selection / close popovers'],
  ['Space',     'toggle live ↔ anchored time cursor'],
  ['j / k',     'feed cursor down / up'],
  ['1 2 3',     'toggle SYS / CH / WORLD filters'],
  ['o',         'open launch menu'],
  ['s',         'open sim-speed menu'],
];

function showHelpTag() {
  if (tagHideTimer) { clearTimeout(tagHideTimer); tagHideTimer = null; }
  if (!activeTag) ensureTagDom();
  const t = activeTag;
  t.classList.add('help');
  t.innerHTML = '';
  const k = document.createElement('div'); k.className = 'tag-kind'; k.textContent = 'KEYBOARD · MISSION CONTROL';
  t.appendChild(k);
  const what = document.createElement('div'); what.className = 'tag-what';
  what.textContent = 'Built for one-handed use with the left hand on the keys.';
  t.appendChild(what);
  const grid = document.createElement('div'); grid.className = 'help-grid';
  for (const [key, desc] of SHORTCUTS) {
    const kEl = document.createElement('kbd'); kEl.textContent = key;
    const dEl = document.createElement('span');
    dEl.style.fontFamily = 'var(--f-script)';
    dEl.style.fontStyle = 'italic';
    dEl.style.color = '#2a2820';
    dEl.textContent = desc;
    grid.appendChild(kEl); grid.appendChild(dEl);
  }
  t.appendChild(grid);
  // place center-screen
  const w = window.innerWidth, h = window.innerHeight;
  t.style.left = (w/2 - 190) + 'px';
  t.style.top  = (h/2 - 200) + 'px';
  t.classList.remove('right');
  requestAnimationFrame(() => t.classList.add('show'));
  setTimeout(() => { t.classList.remove('help'); }, 8000);
}

let feedCursorIdx = -1;
function moveFeedCursor(delta) {
  const list = document.getElementById('feed-list');
  const items = Array.from(list.querySelectorAll('.fe'));
  if (!items.length) return;
  feedCursorIdx = Math.max(0, Math.min(items.length - 1, feedCursorIdx + delta));
  if (feedCursorIdx < 0) feedCursorIdx = 0;
  items.forEach((el, i) => el.style.background = i === feedCursorIdx ? 'var(--bulkhead)' : '');
  items[feedCursorIdx].scrollIntoView({ block: 'nearest', behavior: 'instant' });
  // synthetic hover-explain
  const ev = STATE.events.find(e => e.id === items[feedCursorIdx].dataset.eventId);
  if (ev) {
    const r = items[feedCursorIdx].getBoundingClientRect();
    showEventTag({ clientX: r.left + 80, clientY: r.top, target: items[feedCursorIdx] }, ev);
  }
}

document.addEventListener('keydown', e => {
  // ignore when typing in an input
  const tag = (e.target && e.target.tagName) || '';
  const inField = tag === 'INPUT' || tag === 'TEXTAREA';

  if (e.key === 'Escape') {
    if (popover) { hideCmdPopover(); return; }
    hideTag();
    if (STATE.inspector) { STATE.inspector = null; STATE.selectedBlockId = null; STATE.selectedChannel = null; renderInspector(); renderTopologyHard(); }
    if (inField) e.target.blur();
    return;
  }

  if (inField) return;

  if (e.key === '/') {
    e.preventDefault();
    document.getElementById('cmd-query').focus();
    return;
  }
  if (e.key === '?') {
    e.preventDefault();
    showHelpTag();
    return;
  }
  if (e.key === ' ') {
    e.preventDefault();
    toggleAnchor();
    return;
  }
  if (e.key === 'j') { moveFeedCursor(1); return; }
  if (e.key === 'k') { moveFeedCursor(-1); return; }
  if (e.key === '1') { document.querySelector('.tog[data-filter="system"]').click(); return; }
  if (e.key === '2') { document.querySelector('.tog[data-filter="channel"]').click(); return; }
  if (e.key === '3') { document.querySelector('.tog[data-filter="world"]').click(); return; }
  if (e.key === 'o') { document.getElementById('cmd-open').click(); return; }
  if (e.key === 's') { document.getElementById('cmd-speed').click(); return; }
});

/* ════════════════════════════════════════════════════════════════════
   Section 14  ·  Time cursor — retrospective inspection
   ════════════════════════════════════════════════════════════════════
   This is a reading device, not a debugger. Drag the cursor to a moment,
   the feed dims everything outside that moment's vicinity, the topology
   meta line shows the snapshot, hover-explanations carry "as of" timestamps.
   Releasing or pressing LIVE returns to the present.
*/
const ANCHOR = {
  active: false,
  t: null,            // anchored timestamp
  windowMs: 4000,     // events within ±2s of t are "in focus"
};

function initTimeCursor() {
  const range = document.getElementById('tc-range');
  const liveBtn = document.getElementById('tc-live');
  const anchorBtn = document.getElementById('tc-anchor');
  const tsEl = document.getElementById('tc-ts');
  const bar = document.getElementById('timecursor');
  const list = document.getElementById('feed-list');

  function refreshLive() {
    if (!ANCHOR.active) {
      range.value = 100;
      tsEl.textContent = 'LIVE  ' + fmtTime(nowTs());
    }
  }
  setInterval(refreshLive, 800);

  range.addEventListener('input', () => {
    if (STATE.events.length === 0) return;
    ANCHOR.active = true;
    bar.classList.add('anchored');
    list.classList.add('anchored');
    const minT = STATE.events[0].t;
    const maxT = STATE.events[STATE.events.length - 1].t;
    const v = parseInt(range.value, 10);
    ANCHOR.t = minT + (maxT - minT) * (v / 100);
    tsEl.textContent = 'AT  ' + fmtTime(ANCHOR.t);
    applyAnchor();
  });

  liveBtn.addEventListener('click', () => snapToLive());
  anchorBtn.addEventListener('click', () => snapToLive());
}

function toggleAnchor() {
  if (ANCHOR.active) snapToLive();
  else {
    if (STATE.events.length === 0) return;
    ANCHOR.active = true;
    document.getElementById('timecursor').classList.add('anchored');
    document.getElementById('feed-list').classList.add('anchored');
    ANCHOR.t = STATE.events[STATE.events.length - 1].t;
    document.getElementById('tc-range').value = 100;
    document.getElementById('tc-ts').textContent = 'AT  ' + fmtTime(ANCHOR.t);
    applyAnchor();
  }
}

function snapToLive() {
  ANCHOR.active = false;
  ANCHOR.t = null;
  document.getElementById('timecursor').classList.remove('anchored');
  document.getElementById('feed-list').classList.remove('anchored');
  document.getElementById('tc-range').value = 100;
  document.getElementById('tc-ts').textContent = 'LIVE  ' + fmtTime(nowTs());
  Array.from(document.querySelectorAll('#feed-list .fe.in-focus')).forEach(el => el.classList.remove('in-focus'));
}

function applyAnchor() {
  const half = ANCHOR.windowMs / 2;
  const list = document.getElementById('feed-list');
  Array.from(list.querySelectorAll('.fe')).forEach(el => {
    const ev = STATE.events.find(e => e.id === el.dataset.eventId);
    if (!ev) return;
    if (Math.abs(ev.t - ANCHOR.t) <= half) el.classList.add('in-focus');
    else el.classList.remove('in-focus');
  });
  // jump first in-focus event into view
  const firstFocus = list.querySelector('.fe.in-focus');
  if (firstFocus) firstFocus.scrollIntoView({ block: 'center', behavior: 'instant' });
}

initTopology();
initCommandBar();
renderInspectorEmpty();
initTimeCursor();

/* status pill */
setInterval(() => {
  const pill = document.getElementById('live-pill');
  const t = document.getElementById('live-text');
  if (APP.mounted) { pill.classList.remove('disconnected'); t.textContent = 'LIVE'; }
  else { pill.classList.add('disconnected'); t.textContent = 'NO KERNEL'; }
}, 1500);
