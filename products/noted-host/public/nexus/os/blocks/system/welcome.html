<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="nexus-block" content="managed"><meta name="nexus-emits" content="nexus.launch nexus.notify"><meta name="nexus-consumes" content=""><title>Welcome</title><script src="../../engines/nexus-block-client.js"></script><style>
:root{--void:#08080d;--s:#151520;--line:rgba(255,255,255,.14);--ink:#f4ead8;--muted:#ab9e87;--amber:#e6a51a;--mono:ui-monospace,Menlo,monospace;--display:ui-serif,Georgia,serif}*{box-sizing:border-box}html,body{height:100%;margin:0;background:radial-gradient(circle at 30% 20%,rgba(230,165,26,.15),transparent 36%),var(--void);color:var(--ink);font-family:var(--mono)}main{min-height:100%;display:grid;place-items:center;padding:24px}.card{width:min(760px,100%);border:1px solid var(--line);border-radius:28px;background:rgba(16,16,24,.82);backdrop-filter:blur(18px);padding:34px;box-shadow:0 26px 90px rgba(0,0,0,.38)}.k{color:var(--amber);font-size:11px;letter-spacing:.24em;text-transform:uppercase}h1{font-family:var(--display);font-size:clamp(44px,8vw,92px);line-height:.86;margin:18px 0}.copy{color:var(--muted);line-height:1.7;max-width:62ch}.actions{display:flex;flex-wrap:wrap;gap:10px;margin-top:28px}button{border:1px solid rgba(255,255,255,.16);border-radius:999px;background:rgba(255,255,255,.07);color:var(--ink);font-family:var(--mono);padding:11px 15px;cursor:pointer}.primary{background:var(--amber);border-color:var(--amber);color:#07070b;font-weight:800}</style></head><body><main><section class="card"><div class="k">Nexus Moot</div><h1>The realm is local first.</h1><p class="copy">Start at zero. Choose a live companion and a home world. The wallet stays quiet until the economy actually gives you something to hold.</p><div class="actions"><button class="primary" data-path="blocks/world/first-contact.html" data-title="First Contact" data-icon="✦">Begin First Contact</button><button data-path="blocks/apps/companion.html" data-title="Companion" data-icon="◌">Open Companion</button><button data-path="blocks/system/Wallet_v4_nexus.html" data-title="Wallet" data-icon="◈">Open Wallet</button><button data-path="./blocks/world/atlas.html" data-title="Atlas" data-icon="⊕">Open Atlas</button></div></section></main><script>
const nx=window.NexusBlockClient?.bootBlock({manifest:{emits:['nexus.launch','nexus.notify'],consumes:[],app:{title:'Welcome',icon:'✦',description:'Start Nexus',visible:true}}});
document.addEventListener('click',e=>{const b=e.target.closest('button[data-path]');if(!b)return;nx?.emit('nexus.launch',{path:b.dataset.path,title:b.dataset.title,icon:b.dataset.icon});nx?.emit('nexus.notify',{className:'info',title:'Opening '+b.dataset.title,body:'Welcome route'});});
</script></body></html>
