<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Vibes Library</title>
<style>
:root {
  --void:#09090c; --s1:#111116; --s2:#18181f; --s3:#222230;
  --border:#2a2a3a; --border-hi:#3d3d58;
  --ink:#f2eadb; --ink-2:#c8bda8; --ink-3:#8b8173;
  --amber:#c9920a; --amber-glow:rgba(201,146,10,.12);
  --green:#4dbb7a; --rose:#9b2335; --purple:#7c3aed; --teal:#0d7377;
  --t-creature:#7c3aed; --t-environment:#0d7377; --t-attack:#c9920a;
  --t-kin:#9b2335; --t-battle:#4dbb7a;
  --mono:'JetBrains Mono','SF Mono',Consolas,monospace;
  --display:'Syne',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--void);color:var(--ink);font-family:var(--mono);font-size:13px;overflow:hidden}
body{display:flex;flex-direction:column}

/* ── Topbar ── */
#top{display:flex;align-items:center;gap:12px;padding:10px 14px;background:var(--s1);border-bottom:1px solid var(--border);flex-shrink:0}
#title{font-family:var(--display);font-weight:700;letter-spacing:3px;font-size:13px;color:var(--amber)}
#title-sub{color:var(--ink-3);letter-spacing:1px;font-size:10px}
#count{margin-left:auto;color:var(--ink-2);font-size:10px;letter-spacing:1px}
.tb-btn{background:var(--s2);border:1px solid var(--border);color:var(--ink);padding:5px 10px;font-family:var(--mono);font-size:10px;letter-spacing:.5px;cursor:pointer;border-radius:3px}
.tb-btn:hover{border-color:var(--border-hi);background:var(--s3)}
.tb-btn.primary{border-color:var(--amber);color:var(--amber);background:var(--amber-glow)}
.tb-btn.primary:hover{background:rgba(201,146,10,.22)}

/* ── Layout ── */
#main{flex:1;display:grid;grid-template-columns:200px 1fr;min-height:0;overflow:hidden}
#side{background:var(--s1);border-right:1px solid var(--border);overflow-y:auto;padding:12px 0}
#side h4{font-family:var(--display);font-size:9px;letter-spacing:2px;color:var(--ink-3);padding:0 12px;margin:14px 0 6px;font-weight:600}
#side h4:first-child{margin-top:0}
.side-row{display:flex;align-items:center;gap:8px;padding:5px 12px;cursor:pointer;font-size:11px;color:var(--ink-2);border-left:2px solid transparent}
.side-row:hover{color:var(--ink);background:rgba(255,255,255,.02)}
.side-row.active{color:var(--ink);background:var(--s2);border-left-color:var(--amber)}
.side-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;background:var(--ink-3)}
.side-dot.t-creature{background:var(--t-creature)} .side-dot.t-environment{background:var(--t-environment)}
.side-dot.t-attack{background:var(--t-attack)} .side-dot.t-kin{background:var(--t-kin)}
.side-dot.t-battle{background:var(--t-battle)}
.side-count{margin-left:auto;color:var(--ink-3);font-size:9px}

/* ── Body ── */
#body{display:flex;flex-direction:column;overflow:hidden}
#search-row{display:flex;gap:8px;padding:10px 12px;border-bottom:1px solid var(--border);background:var(--s1);align-items:center;flex-shrink:0}
#search{flex:1;background:#050508;border:1px solid var(--border-hi);color:var(--ink);padding:7px 10px;font-family:var(--mono);font-size:12px;border-radius:3px;outline:none}
#search:focus{border-color:var(--amber)}
#sort{background:var(--s2);border:1px solid var(--border);color:var(--ink);padding:5px 8px;font-family:var(--mono);font-size:10px;border-radius:3px;cursor:pointer}

#grid-wrap{flex:1;overflow-y:auto;padding:14px;background:var(--void)}
#grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:10px}
.card{background:var(--s1);border:1px solid var(--border);border-radius:5px;padding:10px;cursor:pointer;display:flex;flex-direction:column;gap:6px;transition:border-color .12s,transform .12s}
.card:hover{border-color:var(--border-hi);transform:translateY(-1px)}
.card.selected{border-color:var(--amber);box-shadow:0 0 0 1px var(--amber-glow)}
.card-head{display:flex;align-items:center;gap:6px}
.type-chip{font-size:8px;letter-spacing:1.2px;text-transform:uppercase;padding:2px 5px;border-radius:2px;font-weight:700}
.type-chip.t-creature{background:rgba(124,58,237,.18);color:var(--t-creature);border:1px solid rgba(124,58,237,.35)}
.type-chip.t-environment{background:rgba(13,115,119,.20);color:#3aa5a8;border:1px solid rgba(13,115,119,.40)}
.type-chip.t-attack{background:rgba(201,146,10,.18);color:var(--amber);border:1px solid rgba(201,146,10,.35)}
.type-chip.t-kin{background:rgba(155,35,53,.18);color:#d6526a;border:1px solid rgba(155,35,53,.35)}
.type-chip.t-battle{background:rgba(77,187,122,.18);color:var(--green);border:1px solid rgba(77,187,122,.35)}
.type-chip.t-world{background:rgba(77,187,122,.12);color:#8fd9aa;border:1px solid rgba(77,187,122,.25)}
.type-chip.t-realm-charter{background:rgba(201,146,10,.12);color:var(--amber);border:1px solid rgba(201,146,10,.25)}
.card-name{font-family:var(--display);font-weight:700;font-size:14px;color:var(--ink);letter-spacing:.5px;line-height:1.35;word-break:break-word;text-shadow:0 1px 8px rgba(0,0,0,.45)}
.card-meta{display:flex;flex-wrap:wrap;gap:4px;font-size:9px;color:var(--ink-3);margin-top:auto}
.tag{background:var(--s3);border:1px solid var(--border);padding:1px 5px;border-radius:2px;font-size:8px;color:var(--ink-2)}
.card-foot{font-size:9px;color:var(--ink-3);display:flex;justify-content:space-between;letter-spacing:.5px}

/* ── Empty state ── */
#empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;text-align:center;color:var(--ink-2);height:100%}
#empty.hidden{display:none}
#empty-title{font-family:var(--display);font-size:18px;letter-spacing:2px;color:var(--ink);margin-bottom:8px}
#empty-glyph{font-family:var(--display);font-size:38px;color:var(--amber);opacity:.75;margin-bottom:12px;text-shadow:0 0 24px var(--amber-glow)}
#empty-sub{font-size:11px;color:var(--ink-3);margin-bottom:24px;max-width:420px;line-height:1.6}
.empty-actions{display:flex;gap:8px;flex-wrap:wrap;justify-content:center}

/* ── Detail panel (right slide-out) ── */
#detail{position:absolute;top:0;right:0;bottom:0;width:340px;background:var(--s1);border-left:1px solid var(--border);transform:translateX(100%);transition:transform .2s ease;display:flex;flex-direction:column;z-index:10}
#detail.open{transform:translateX(0)}
#detail-head{padding:14px;border-bottom:1px solid var(--border);background:var(--s2)}
#detail-name{font-family:var(--display);font-size:16px;font-weight:700;color:var(--ink);letter-spacing:1px;margin-bottom:6px}
#detail-meta{font-size:9px;color:var(--ink-3);letter-spacing:1px;line-height:1.5}
#detail-body{flex:1;overflow-y:auto;padding:14px}
#detail-close{position:absolute;top:10px;right:10px;background:transparent;border:none;color:var(--ink-3);font-size:18px;cursor:pointer;line-height:1}
#detail-close:hover{color:var(--ink)}
.kv{display:grid;grid-template-columns:80px 1fr;gap:6px 12px;font-size:10px;margin-bottom:14px}
.kv .k{color:var(--ink-3);letter-spacing:1px;text-transform:uppercase;font-size:9px}
.kv .v{color:var(--ink-2);word-break:break-all}
.kv .v code{font-family:var(--mono);background:var(--void);padding:1px 4px;border-radius:2px;color:var(--ink)}
#detail-tags{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:14px}
#tag-input{background:var(--void);border:1px solid var(--border);color:var(--ink);padding:4px 8px;font-family:var(--mono);font-size:10px;border-radius:2px;width:100%;outline:none;margin-bottom:14px}
#tag-input:focus{border-color:var(--amber)}
.detail-section h5{font-family:var(--display);font-size:9px;letter-spacing:2px;color:var(--ink-3);margin:14px 0 8px;font-weight:600}
.lineage-row{font-size:10px;color:var(--ink-2);padding:4px 8px;background:var(--void);border:1px solid var(--border);border-radius:2px;margin-bottom:4px;cursor:pointer}
.lineage-row:hover{border-color:var(--border-hi)}
#detail-actions{padding:12px;border-top:1px solid var(--border);background:var(--s2);display:flex;gap:6px;flex-wrap:wrap}

/* ── Drop zone overlay ── */
#drop-overlay{position:fixed;inset:0;background:rgba(9,9,12,.92);display:none;align-items:center;justify-content:center;z-index:1000;border:3px dashed var(--amber);pointer-events:none}
#drop-overlay.show{display:flex}
#drop-overlay-text{font-family:var(--display);font-size:24px;color:var(--amber);letter-spacing:3px}

/* ── Toast ── */
#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--s2);border:1px solid var(--border-hi);color:var(--ink);padding:8px 16px;border-radius:3px;font-size:11px;z-index:500;opacity:0;transition:opacity .2s;pointer-events:none}
#toast.show{opacity:1}

/* Scrollbars */
::-webkit-scrollbar{width:8px;height:8px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
::-webkit-scrollbar-thumb:hover{background:var(--border-hi)}
</style>
</head>
<body>

<div id="top">
  <div id="title">VIBES LIBRARY</div>
  <div id="title-sub">v1 · local · content-addressed</div>
  <div id="count">— vibes</div>
  <button class="tb-btn" id="btn-mount" style="display:none">⬢ Mount Folder</button>
  <button class="tb-btn primary" id="btn-rescan">↻ Sync Folder</button>
</div>

<div id="main">
  <aside id="side"></aside>
  <div id="body">
    <div id="search-row">
      <input id="search" placeholder="search name, tag, type…" autocomplete="off">
      <select id="sort">
        <option value="recent">most recent</option>
        <option value="name">name a–z</option>
        <option value="type">type</option>
        <option value="parents">most descendants</option>
      </select>
    </div>
    <div id="grid-wrap">
      <div id="grid"></div>
      <div id="empty" class="hidden">
        <div id="empty-glyph">▱</div>
        <div id="empty-title">NO MOOTS COLLECTED</div>
        <div id="empty-sub">
          Walk a planet to encounter the creatures that have always been there.<br>
          <span id="empty-instructions">Checking folder mount…</span>
        </div>
        <div class="empty-actions">
          <button class="tb-btn primary" id="empty-mount">↻ Sync Folder</button>
        </div>
      </div>
    </div>
  </div>
</div>

<div id="detail">
  <button id="detail-close" title="close">×</button>
  <div id="detail-head">
    <div id="detail-name">—</div>
    <div id="detail-meta">—</div>
  </div>
  <div id="detail-body">
    <div class="detail-section">
      <h5>METADATA</h5>
      <div class="kv" id="detail-kv"></div>
    </div>
    <div class="detail-section">
      <h5>TAGS</h5>
      <div id="detail-tags"></div>
      <input id="tag-input" placeholder="add tag, press enter">
    </div>
    <div class="detail-section">
      <h5>LINEAGE</h5>
      <div id="detail-lineage"></div>
    </div>
  </div>
  <div id="detail-actions">
    <button class="tb-btn" id="d-export">↓ Export</button>
    <button class="tb-btn" id="d-copy-id">📋 Copy ID</button>
    <button class="tb-btn" id="d-delete" style="color:#d6526a;border-color:rgba(155,35,53,.4)">⌫ Delete</button>
  </div>
</div>

<div id="drop-overlay"><div id="drop-overlay-text">DROP TO IMPORT</div></div>
<div id="toast"></div>

<script src="../../engines/breed-engine.js"></script>
<script src="../../engines/battle-engine.js"></script>
<script src="../../engines/nexus-block-client.js"></script>
<script src="../../engines/battle-protocol.js"></script>
<script src="../../engines/witness-selection.js"></script>
<script src="../../engines/eidolon-generator.js"></script>
<script>
'use strict';

/* ════════════════════════════════════════════════════════════════════
   VIBES LIBRARY — managed Nexus block
   Owns: IndexedDB store, in-memory cache, FS bidi, vibe.* channel handlers
   ════════════════════════════════════════════════════════════════════ */

// ── Constants ──────────────────────────────────────────────────────
const DB_NAME = 'VibesLibrary';
const DB_VERSION = 3;
const TYPE_FAMILIES = ['creature', 'creature-stub', 'environment', 'attack', 'kin', 'battle', 'battle-result', 'world', 'realm-charter'];
const TYPES = TYPE_FAMILIES;
const TYPE_LABELS = { creature:'Creatures', 'creature-stub':'Foreign Stubs', environment:'Environments', attack:'Attacks', kin:'Kin', battle:'Battles', 'battle-result':'Battle Results', world:'Worlds', 'realm-charter':'Realms' };
const REALM_META_IMPORTED = 'realm_genesis_0_imported';
const REALM_META_CURRENT = 'current_realm_id';
const ATTESTATION_KIND = 30420;
const BREED_OFFER_KIND = 30421;
const BREED_COMMIT_KIND = 30422;
const BREED_REVEAL_KIND = 30423;
const BREED_RECEIPT_KIND = 30424;
const BATTLE_INTENT_KIND = 30431;
const BATTLE_COMMIT_KIND = 30432;
const BATTLE_REVEAL_KIND = 30433;
const BATTLE_RESULT_KIND = 30434;
const WITNESS_AD_KIND = 30450;
const BUILTIN_REALM_GENESIS_0 = {"format":"vibe/1","id":"v_realm_c85fe8b5cb6941eb","type":"realm-charter/1","name":"Genesis Realm","tags":["realm","genesis","season:s0","ruleset:eidolon-core@1.2"],"parents":[],"birthHash":"sha256:c85fe8b5cb6941eba828ae7b633207fa788c97770594d529da6d032e7a426ee9","createdAt":"2026-05-04T00:00:00.000Z","source":"builtin","payload":{"realm_id":"realm_genesis_0","season":"s0","ruleset":{"id":"eidolon-core","version":"1.2"},"ruleset_hash":"sha256:d2d9728ead1542f1b216b988bd93a8dc4e678b0e3ea6350661b8674cd212ec39","engine_hash":"sha256:79cd0f7ce56120d4aee1aa6616e94c1adbda58d164ffd444e4201e2215ef65a9","substrate_epoch":1,"gen1_policy":{"method":"open","notes":"open Gen-1 admission for genesis season"},"created_at":"2026-05-04T00:00:00.000Z","notes":"Canonical genesis realm. Open admission. Ruleset: eidolon-core v1.2 with PHANTIVEX-verified platform battle engine."}};

// ── State ──────────────────────────────────────────────────────────
let db = null;
let port = null; // legacy standalone sentinel; IPC now uses NexusBlockClient.
let mounted = false;
let nx = null;
let currentRealmId = null;
const cache = new Map();         // id -> envelope
const subs = [];                 // array of {filter, blockId} from external blocks
let filterType = null;           // null = all
let filterTag = null;
let searchQ = '';
let sortBy = 'recent';
let selectedId = null;
let fsAvailable = false;
let folderName = null;
const attRelay = { active:false, sockets:new Map(), timers:new Map(), subId:null, realm:null, reconnects:new Map(), secp:null };
const breedState = { offers:new Map(), messages:[], receipts:new Map(), waiters:[] };
const battleState = { intents:new Map(), messages:[], results:new Map(), waiters:[], witnessPool:new Map() };

// ── Logging ────────────────────────────────────────────────────────
function log(m, lvl='info') { console.log(`[vibes-library:${lvl}]`, m); }

// ── Canonical hash (matches adapter) ───────────────────────────────
function canonical(v) {
  if (v === null || typeof v !== 'object') return JSON.stringify(v);
  if (Array.isArray(v)) return '[' + v.map(canonical).join(',') + ']';
  return '{' + Object.keys(v).sort().map(k => JSON.stringify(k)+':'+canonical(v[k])).join(',') + '}';
}
async function sha256Hex(s) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(s));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
}

function typeFamily(type) {
  const raw = String(type || '').trim();
  if (!raw) return 'creature';
  if (raw.startsWith('realm-charter')) return 'realm-charter';
  if (raw.startsWith('creature-stub')) return 'creature-stub';
  if (raw.startsWith('battle-result')) return 'battle-result';
  return raw.split('/')[0];
}
function matchesType(env, queryType) {
  if (!queryType) return true;
  const q = String(queryType).trim();
  const fam = typeFamily(env.type);
  if (q === 'creature/*') return fam === 'creature' || fam === 'creature-stub' || String(env.type||'').startsWith('creature/');
  if (q.endsWith('/*')) {
    const prefix = q.slice(0, -1);
    return String(env.type || '').startsWith(prefix);
  }
  return env.type === q || fam === q;
}
function isRealmRequiredType(type) {
  const fam = typeFamily(type);
  return fam === 'creature' || fam === 'creature-stub' || fam === 'world';
}
function getRealmIdFromCharter(env) {
  return env && env.payload && typeof env.payload.realm_id === 'string' ? env.payload.realm_id : null;
}
function realmCharters() {
  return Array.from(cache.values()).filter(e => e.type === 'realm-charter/1' && getRealmIdFromCharter(e));
}
function findCharterByRealmId(realmId) {
  return realmCharters().find(e => getRealmIdFromCharter(e) === realmId) || null;
}
async function normalizeRealmForSave(env) {
  if (!env || !env.type) return { ok:false, error:'invalid envelope' };
  if (isRealmRequiredType(env.type)) {
    env.realm = String(env.realm || currentRealmId || '').trim();
    if (!env.realm) return { ok:false, error:'realm required' };
  } else if (env.realm !== undefined && env.realm !== null) {
    env.realm = String(env.realm).trim() || undefined;
  }
  return { ok:true, envelope: env };
}
async function contentAddressForEnvelopeBody(env) {
  const body = {
    format: env.format || 'vibe/1',
    type: env.type,
    subFormat: env.subFormat || null,
    name: env.name || null,
    tags: Array.isArray(env.tags) ? env.tags : [],
    parents: Array.isArray(env.parents) ? env.parents : [],
    birthHash: env.birthHash || null,
    payload: env.payload
  };
  return 'sha256:' + await sha256Hex(canonical(body));
}
function stripExternalRef(ref) {
  const s = String(ref || '').trim();
  return s.startsWith('external:') ? s.slice(9) : s;
}
function refCandidates(ref) {
  const raw = stripExternalRef(ref);
  const out = new Set([raw, String(ref || '').trim()]);
  if (raw.startsWith('sha256:')) out.add(raw.slice(7));
  else if (/^[0-9a-f]{32,}$/i.test(raw)) out.add('sha256:' + raw);
  return Array.from(out).filter(Boolean);
}
function getCreatureHash(env) {
  if (!env) return null;
  return env.content_hash || env.content_addr || (env.payload && env.payload.creature_hash) || null;
}
function getAttestations(env) {
  const a = Array.isArray(env && env.attestations) ? env.attestations : [];
  const b = Array.isArray(env && env.payload && env.payload.attestations) ? env.payload.attestations : [];
  const seen = new Set(), out = [];
  for (const x of [...a, ...b]) {
    if (!x) continue;
    const key = x.event_id || `${x.pubkey}:${x.ts}`;
    if (seen.has(key)) continue;
    seen.add(key); out.push(x);
  }
  return out;
}

function ensureSlots(env) {
  if (!env || typeFamily(env.type) !== 'creature') return env;
  env.payload = env.payload || {};
  const slots = env.payload.slots && typeof env.payload.slots === 'object' ? env.payload.slots : { total: 3, consumed: [] };
  slots.total = Number.isFinite(Number(slots.total)) ? Number(slots.total) : 3;
  const consumed = Array.isArray(slots.consumed) ? slots.consumed : [];
  slots.consumed = consumed.map(x => typeof x === 'string' ? { id:x, type:'unknown', ts:null } : x).filter(Boolean).slice(0, slots.total);
  env.payload.slots = slots;
  return env;
}
function slotsRemaining(env) {
  ensureSlots(env);
  const slots = env && env.payload && env.payload.slots;
  return slots ? Math.max(0, Number(slots.total||0) - (slots.consumed||[]).length) : 0;
}
function slotSpent(env) { return slotsRemaining(env) <= 0; }
function consumeSlot(env, ref) {
  ensureSlots(env);
  const slots = env.payload.slots;
  if (slotSpent(env)) return {ok:false, error:'creature spent'};
  const id = String(ref && (ref.id || ref.battle_id || ref.imprint_id) || ref || '').trim();
  if (!id) return {ok:false, error:'slot consumption id required'};
  if (!slots.consumed.some(x => (x.id || x.battle_id || x.imprint_id) === id)) {
    const ts = finiteNumber(ref && ref.ts);
    if (ts == null) return {ok:false, error:'slot_ts_required'};
    slots.consumed.push({id, type:(ref&&ref.type)||'unknown', ts});
  }
  return {ok:true, remaining: slotsRemaining(env)};
}
function creatureSlotReport(env) {
  ensureSlots(env);
  const slots = env.payload.slots;
  return {ok:true, total:slots.total, remaining:slotsRemaining(env), consumed_for:(slots.consumed||[]).map(x => ({battle_id:x.battle_id || (x.type==='battle'?x.id:null), imprint_id:x.imprint_id || (x.type==='imprint'?x.id:null), id:x.id, type:x.type||'unknown', ts:x.ts||null}))};
}
function normalizeHashRefMaybe(x){ return x ? normalizeHashRef(x) : null; }
function stubMatchesRef(stub, ref) {
  if (!stub || typeFamily(stub.type) !== 'creature-stub') return false;
  const candidates = new Set(refCandidates(ref));
  const vals = [stub.id, stub.birthHash, stub.content_hash, stub.content_addr, getCreatureHash(stub), stub.payload && stub.payload.creature_hash];
  for (const v of vals) for (const c of refCandidates(v)) if (candidates.has(c)) return true;
  return false;
}
function findStubByRef(ref) {
  for (const env of cache.values()) if (stubMatchesRef(env, ref)) return env;
  return null;
}
function findVibeByCreatureHash(hash) {
  if (!hash) return null;

function stopAttestationRelaySubscription() {
  attRelay.active = false;
  for (const timer of attRelay.timers.values()) clearTimeout(timer);
  attRelay.timers.clear();
  for (const ws of attRelay.sockets.values()) { try { ws.close(); } catch (_) {} }
  attRelay.sockets.clear();
}
function startAttestationRelaySubscription() {
  stopAttestationRelaySubscription();
  if (typeof WebSocket === 'undefined') { log('nostr attestation subscribe skipped: websocket unavailable', 'warn'); return; }
  const relays = loadNostrRelays();
  if (!relays.length) { log('nostr attestation subscribe skipped: no relays', 'warn'); return; }
  const realm = currentRealmId || null;
  attRelay.active = true;
  attRelay.realm = realm;
  attRelay.subId = `nx-attest-${Math.random().toString(36).slice(2, 10)}`; // METADATA: display only, not content-addressed
  const since = Math.floor(Date.now() / 1000) - 60 * 60 * 24 * 30; // METADATA: display only, not content-addressed
  const kinds = [ATTESTATION_KIND, BREED_OFFER_KIND, BREED_COMMIT_KIND, BREED_REVEAL_KIND, BREED_RECEIPT_KIND, BATTLE_INTENT_KIND, BATTLE_COMMIT_KIND, BATTLE_REVEAL_KIND, BATTLE_RESULT_KIND, WITNESS_AD_KIND];
  const me = ownNostrPubkey();
  const offerFilter = me ? { kinds:[BREED_OFFER_KIND, BATTLE_INTENT_KIND], '#partner':[me], since, limit:200 } : null;
  const filter = realm ? { kinds, '#realm':[realm], since, limit:200 } : { kinds, since, limit:200 };
  const connect = (url) => {
    if (!attRelay.active) return;
    let ws;
    try { ws = new WebSocket(url); } catch (e) { scheduleReconnect(url); return; }
    attRelay.sockets.set(url, ws);
    ws.onopen = () => { try { ws.send(JSON.stringify(offerFilter ? ['REQ', attRelay.subId, filter, offerFilter] : ['REQ', attRelay.subId, filter])); } catch (_) {} };
    ws.onmessage = (e) => {
      try {
        const msg = JSON.parse(e.data);
        if (Array.isArray(msg) && msg[0] === 'EVENT' && msg[2]) {
          const ev = msg[2];
          if (ev.kind === ATTESTATION_KIND) handleNostrAttestationEvent(ev, url);
          else if (ev.kind === BREED_OFFER_KIND) handleNostrBreedOfferEvent(ev, url);
          else if (ev.kind === BREED_COMMIT_KIND || ev.kind === BREED_REVEAL_KIND) handleNostrBreedProtocolEvent(ev, url);
          else if (ev.kind === BREED_RECEIPT_KIND) handleNostrBreedReceiptEvent(ev, url);
          else if (ev.kind === BATTLE_INTENT_KIND) handleNostrBattleIntentEvent(ev, url);
          else if (ev.kind === BATTLE_COMMIT_KIND || ev.kind === BATTLE_REVEAL_KIND) handleNostrBattleProtocolEvent(ev, url);
          else if (ev.kind === BATTLE_RESULT_KIND) handleNostrBattleResultEvent(ev, url);
          else if (ev.kind === WITNESS_AD_KIND) handleNostrWitnessAdEvent(ev, url);
        }
      } catch (_) {}
    };
    ws.onerror = () => { try { ws.close(); } catch (_) {} };
    ws.onclose = () => { attRelay.sockets.delete(url); if (attRelay.active) scheduleReconnect(url); };
  };
  const scheduleReconnect = (url) => {
    const n = (attRelay.reconnects.get(url) || 0) + 1;
    attRelay.reconnects.set(url, n);
    const delay = Math.min(10000, 1000 + n * 1000);
    clearTimeout(attRelay.timers.get(url));
    attRelay.timers.set(url, setTimeout(() => connect(url), delay));
  };
  for (const url of relays) connect(url);

}

window.addEventListener('beforeunload', stopAttestationRelaySubscription);

// ── IndexedDB ──────────────────────────────────────────────────────
function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onupgradeneeded = (e) => {
      const inst = e.target.result;
      for (const t of TYPE_FAMILIES) {
        if (!inst.objectStoreNames.contains(`vibes_${t}`)) {
          const store = inst.createObjectStore(`vibes_${t}`, { keyPath: 'id' });
          store.createIndex('createdAt', 'createdAt', { unique: false });
          store.createIndex('name', 'name', { unique: false });
        }
      }
      if (!inst.objectStoreNames.contains('vibes_lineage')) {
        const ls = inst.createObjectStore('vibes_lineage', { keyPath: 'edgeId' });
        ls.createIndex('child', 'childId', { unique: false });
        ls.createIndex('parent', 'parentId', { unique: false });
      }
      if (!inst.objectStoreNames.contains('vibes_meta')) {
        inst.createObjectStore('vibes_meta', { keyPath: 'key' });
      }
    };
    req.onsuccess = (e) => { db = e.target.result; resolve(db); };
    req.onerror = (e) => reject(e.target.error);
  });
}
function txStore(type, mode='readonly') {
  const family = typeFamily(type);
  return db.transaction(`vibes_${family}`, mode).objectStore(`vibes_${family}`);
}
function metaStore(mode='readonly') {
  return db.transaction('vibes_meta', mode).objectStore('vibes_meta');
}
function getMeta(key) {
  return new Promise((res, rej) => {
    const r = metaStore().get(key);
    r.onsuccess = () => res(r.result ? r.result.value : undefined);
    r.onerror = (e) => rej(e.target.error);
  });
}
function setMeta(key, value) {
  return new Promise((res, rej) => {
    const r = metaStore('readwrite').put({key, value});
    r.onsuccess = () => res(value);
    r.onerror = (e) => rej(e.target.error);
  });
}
async function loadAllToCache() {
  cache.clear();
  for (const t of TYPE_FAMILIES) {
    await new Promise((res, rej) => {
      const r = txStore(t).getAll();
      r.onsuccess = () => { for (const env of r.result || []) cache.set(env.id, env); res(); };
      r.onerror = (e) => rej(e.target.error);
    });
  }
  log(`cache loaded: ${cache.size} vibes`);
}
function putVibe(env) {
  return new Promise((res, rej) => {
    const r = txStore(env.type, 'readwrite').put(env);
    r.onsuccess = () => res();
    r.onerror = (e) => rej(e.target.error);
  });
}
function deleteVibe(env) {
  return new Promise((res, rej) => {
    const r = txStore(env.type, 'readwrite').delete(env.id);
    r.onsuccess = () => res();
    r.onerror = (e) => rej(e.target.error);
  });
}
async function writeLineageEdges(env) {
  if (!Array.isArray(env.parents) || !env.parents.length) return;
  let edgeTs = msFromCreatedAt(env.createdAt);
  if (edgeTs == null) edgeTs = stampFromHexRef(env.content_hash || env.content_addr || env.birthHash);
  if (edgeTs == null) throw new Error('lineage_ts_required');
  const tx = db.transaction('vibes_lineage', 'readwrite');
  const store = tx.objectStore('vibes_lineage');
  for (const parentId of env.parents) {
    const edgeId = `${parentId}>${env.id}`;
    store.put({ edgeId, parentId, childId: env.id, ts: edgeTs });
  }
}


async function migrateGenesisRealmCharter() {
  const existing = findCharterByRealmId('realm_genesis_0');
  if (!existing || !existing.payload) return false;
  const want = JSON.parse(JSON.stringify(BUILTIN_REALM_GENESIS_0));
  const oldVersion = existing.payload.ruleset && String(existing.payload.ruleset.version || '');
  const needs = oldVersion !== String(want.payload.ruleset.version) || !existing.payload.engine_hash || existing.payload.engine_hash !== want.payload.engine_hash;
  if (!needs) return false;
  const migrated = Object.assign({}, want, { id: existing.id, createdAt: existing.createdAt || want.createdAt, source: existing.source || 'builtin-migrated' });
  migrated.payload = Object.assign({}, want.payload);
  cache.set(migrated.id, migrated);
  await putVibe(migrated);
  log(`migrated realm_genesis_0 charter ${oldVersion || 'unknown'} → ${want.payload.ruleset.version}`);
  return true;
}

// ── FS sync via kernel syscalls ────────────────────────────────────
function fsCall(channel, payload) {
  if (!nx) return Promise.reject(new Error('not connected to Nexus'));
  return nx.request(channel, payload || {}, { timeout: 8000 });
}
const fsPending = new Map(); // retained for legacy diagnostics; NexusBlockClient owns live FS requests.

// Re-query fs.status from the kernel and update local state. Idempotent and safe to
// call any time. Returns true iff a folder is currently mounted at the kernel level.
// Use this on every user-initiated mount/rescan action — never trust cached state.
async function refreshFsState() {
  if (!mounted) return false;
  try {
    const st = await fsCall('fs.status', {});
    if (st && st.ok && st.mounted) {
      fsAvailable = true;
      folderName  = st.folderName || null;
      return true;
    }
    fsAvailable = false; folderName = null;
    return false;
  } catch (err) {
    log(`fs.status check failed: ${err.message}`, 'warn');
    return false;
  }
}

async function importFromFolder() {
  // Always re-query the kernel — never trust cached fsAvailable. The kernel is
  // the source of truth for mount state; cached state can drift if the user
  // mounted *after* this block booted and the broadcast was missed.
  const live = await refreshFsState();
  if (!live) {
    showToast('No folder mounted yet — click 📁 in the Nexus taskbar.');
    render();
    return { added: 0, skipped: 0, scanned: 0 };
  }
  let added = 0, skipped = 0, scanned = 0;
  async function walk(path) {
    let res;
    try { res = await fsCall('fs.list', path ? {path} : {}); }
    catch (e) { log(`fs.list failed: ${e.message}`, 'err'); return; }
    if (!res.ok) { log(`fs.list error: ${res.error}`, 'err'); return; }
    for (const entry of res.entries || []) {
      const childPath = path ? `${path}/${entry.name}` : entry.name;
      if (entry.kind === 'directory') {
        // Only descend one level by default to avoid runaway scans
        if (!path) await walk(childPath);
        continue;
      }
      scanned++;
      const lname = entry.name.toLowerCase();
      const looksLike = lname.endsWith('.vibe.json')   ? 'vibe'
                      : lname.endsWith('.environment.json') ? 'env'
                      : lname.endsWith('.kin.json')    ? 'kin'
                      : lname.endsWith('.creature.json') ? 'creature'
                      : lname.endsWith('.attack.json') ? 'attack'
                      : lname.endsWith('.battle.json') ? 'battle'
                      : lname.endsWith('.json')        ? 'json'
                      : (lname.endsWith('.html') && lname.includes('battle')) ? 'battle-html'
                      : null;
      if (!looksLike) continue;
      try {
        const r = await fsCall('fs.read', { path: childPath });
        if (!r.ok) { skipped++; continue; }
        const env = await ingestText(r.content, entry.name, looksLike);
        if (env) { added++; } else { skipped++; }
      } catch (e) { skipped++; log(`ingest failed: ${entry.name} — ${e.message}`, 'warn'); }
    }
  }
  await walk('');
  await loadAllToCache();
  render();
  return { added, skipped, scanned };
}

async function saveImportedEnvelope(env, { attest = true } = {}) {
  const promoted = env._promoteStub ? cache.get(env._promoteStub) : null;
  delete env._promoteStub;
  if (promoted && promoted.type !== env.type) await deleteVibe(promoted).catch(e => log(`stub promotion cleanup failed: ${e.message}`, 'warn'));
  cache.set(env.id, env);
  await putVibe(env);
  await writeLineageEdges(env);
  await forwardResolveExternalRefs(env);
  if (attest && typeFamily(env.type) === 'creature') await attestVibe(env).catch(e => log(`attestation deferred: ${e.message}`, 'warn'));
  return env;
}

async function ingestText(text, fname, hint) {
  let parsed = null, type = null, payload = null, name = null, subFormat = null;
  const lname = String(fname || '').toLowerCase();

  if (lname.endsWith('.html')) {
    const creature = parseEidolonHtml(text, fname);
    if (creature) {
      const env = await prepareImportedCreatureEnvelope(creature, fname, 'eidolon-creature/1');
      if (cache.has(env.id) && typeFamily(cache.get(env.id).type) !== 'creature-stub') return cache.get(env.id);
      return saveImportedEnvelope(env);
    }
  }

  if (hint === 'battle-html') {
    // Pull #creature-dna out of an exported battle HTML
    try {
      const m = text.match(/<script[^>]+id=["']creature-dna["'][^>]*>([\s\S]*?)<\/script>/i);
      if (!m) return null;
      const dna = JSON.parse(m[1]);
      type = 'creature/eidolon-1';
      payload = dna;
      name = dna.name || fname.replace(/\.html$/i, '');
      subFormat = 'eidolon-creature/1';
    } catch (_) { return null; }
  } else {
    try { parsed = JSON.parse(text); } catch (_) { return null; }
    if (!parsed || typeof parsed !== 'object') return null;

    // Already a Vibe envelope? Store it, with realm/default/import handling.
    if (parsed.format && parsed.format.startsWith('vibe/')) {
      if (!parsed.id || !parsed.payload || !parsed.type) return null;
      let env = parsed;
      if (typeFamily(env.type) === 'creature') {
        env = await prepareImportedCreatureEnvelope(env, fname, env.subFormat || 'eidolon-creature/1');
      } else {
        const norm = await normalizeRealmForSave(env);
        if (!norm.ok) throw new Error(norm.error);
      }
      return saveImportedEnvelope(env, { attest: typeFamily(env.type) === 'creature' });
    }

    // Otherwise: detect by content shape
    const fmt = parsed.format || '';
    if (fmt.includes('environment') || (Array.isArray(parsed.axes) && parsed.axes.some(a => a.id && a.id.startsWith('sky_')))) {
      type = 'environment'; subFormat = 'eidolon-environment/1';
    } else if (fmt.includes('kin')) {
      type = 'kin'; subFormat = 'eidolon-kin/1';
    } else if (Array.isArray(parsed.dna) && parsed.dna.length === 16) {
      const env = await prepareImportedCreatureEnvelope(parsed, fname, 'eidolon-creature/1');
      if (cache.has(env.id) && typeFamily(cache.get(env.id).type) !== 'creature-stub') return cache.get(env.id);
      return saveImportedEnvelope(env);
    } else if (fmt.includes('attack')) {
      type = 'attack'; subFormat = 'eidolon-attack/1';
    } else if (fmt.includes('battle') || parsed.participants) {
      type = 'battle'; subFormat = 'eidolon-battle/1';
    } else {
      return null;
    }
    payload = parsed;
    name = parsed.name || fname.replace(/\.[^.]+$/, '').slice(0, 64);
  }

  // Build envelope
  const payloadStr = canonical(payload);
  const birthHash = 'sha256:' + await sha256Hex(payloadStr);
  const idStem = birthHash.slice(7, 23);
  const id = `v_${typeFamily(type)}_${idStem}`;
  if (cache.has(id)) return cache.get(id); // dedupe

  const env = {
    format: 'vibe/1', id, type, subFormat,
    name: String(name).slice(0, 96),
    tags: Array.isArray(payload.tags) ? payload.tags.slice(0, 32).map(String) : [],
    parents: resolveParentRefs(Array.isArray(payload.parents) ? payload.parents.slice(0, 16) : []),
    birthHash,
    createdAt: payload.createdAt || new Date().toISOString(), // METADATA: display only, not content-addressed
    source: 'import',
    payload
  };
  const norm = await normalizeRealmForSave(env);
  if (!norm.ok) throw new Error(norm.error);
  if (typeFamily(env.type) === 'creature') {
    env.content_hash = birthHash;
    env.content_addr = birthHash;
    return saveImportedEnvelope(env);
  }
  cache.set(id, env);
  await putVibe(env);
  await writeLineageEdges(env);
  return env;
}

async function exportToFolder(ids) {
  const live = await refreshFsState();
  if (!live) { showToast('No folder mounted yet — click 📁 in the Nexus taskbar.'); return { written: 0 }; }
  const targets = ids && ids.length ? ids.map(id => cache.get(id)).filter(Boolean) : Array.from(cache.values());
  let written = 0;
  for (const env of targets) {
    const safe = (env.name || env.id).toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'') || 'untitled';
    const path = `vibes/${env.type}/${safe}.${env.id.slice(2,15)}.vibe.json`;
    try {
      await fsCall('fs.write', { path, content: JSON.stringify(env, null, 2) });
      written++;
    } catch (e) { log(`export failed: ${env.id} — ${e.message}`, 'warn'); }
  }
  showToast(`Exported ${written} vibe${written===1?'':'s'} to /vibes/`);
  return { written };
}

// ── Vibe operation handlers (the protocol surface) ─────────────────
async function handleSave(req, srcId) {
  const env = req.envelope;
  if (!env || !env.id || !env.type || !env.payload) return { ok:false, error:'invalid envelope' };
  if (Array.isArray(env.parents)) env.parents = resolveParentRefs(env.parents);
  ensureSlots(env);
  if ((typeFamily(env.type) === 'creature' || typeFamily(env.type) === 'creature-stub') && !env.content_hash) env.content_hash = env.content_addr || await contentAddressForEnvelopeBody(env).catch(() => null);
  const norm = await normalizeRealmForSave(env);
  if (!norm.ok) return { ok:false, error:norm.error };
  cache.set(env.id, env);
  try { await putVibe(env); await writeLineageEdges(env); await forwardResolveExternalRefs(env); }
  catch (e) { return { ok:false, error:e.message }; }
  notify('save', env);
  if (fsAvailable) {
    // Best-effort FS mirror — don't block the reply on it
    const safe = (env.name || env.id).toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'') || 'untitled';
    const path = `vibes/${env.type}/${safe}.${env.id.slice(2,15)}.vibe.json`;
    fsCall('fs.write', { path, content: JSON.stringify(env, null, 2) }).catch(()=>{});
  }
  render();
  return {ok:true, envelope: env};
}

function handleLoad(req, srcId) {
  const env = cache.get(req.id);
  if (!env) return { ok:false, error:'not found' };
  return { ok:true, envelope: env };

function handleList(req, srcId) {
  let arr = Array.from(cache.values());
  if (req.type) arr = arr.filter(e => matchesType(e, req.type));
  if (req.realm) arr = arr.filter(e => e.realm === req.realm);
  if (req.tags && req.tags.length) arr = arr.filter(e => req.tags.every(t => (e.tags||[]).includes(t)));
  // Return summaries (no payload) to keep messages small
  const data = arr.map(envSummary);
  data.sort(sortFn(req.sort || 'recent'));
  return { ok:true, data };
}

function handleSearch(req, srcId) {
  const q = String(req.q || '').toLowerCase().trim();
  let arr = Array.from(cache.values());
  if (req.type) arr = arr.filter(e => matchesType(e, req.type));
  if (req.realm) arr = arr.filter(e => e.realm === req.realm);
  if (q) arr = arr.filter(e =>
    (e.name||'').toLowerCase().includes(q) ||
    (e.tags||[]).some(t => t.toLowerCase().includes(q)) ||
    e.type.includes(q) ||
    String(e.realm || '').toLowerCase().includes(q)
  );
  return { ok:true, data: arr.map(envSummary) };
}

async function handleDelete(req, srcId) {
  const env = cache.get(req.id);
  if (!env) return { ok:false, error:'not found' };
  cache.delete(req.id);
  try { await deleteVibe(env); }
  catch (e) { return { ok:false, error:e.message }; }
  notify('delete', env);
  render();
  return { ok:true };
}

async function handleTag(req, srcId) {
  const env = cache.get(req.id);
  if (!env) return { ok:false, error:'not found' };
  const tags = new Set(env.tags || []);
  if (Array.isArray(req.add)) for (const t of req.add) tags.add(String(t).slice(0,32));
  if (Array.isArray(req.remove)) for (const t of req.remove) tags.delete(String(t));
  env.tags = Array.from(tags).slice(0, 32);
  cache.set(env.id, env);
  try { await putVibe(env); }
  catch (e) { return { ok:false, error:e.message }; }
  notify('tag', env);
  if (selectedId === env.id) renderDetail();
  render();
  return { ok:true, envelope: env };
}

async function handleLineage(req, srcId) {
  const seedId = req.id;
  if (!cache.has(seedId)) return { ok:false, error:'not found' };
  const depth = Math.min(8, Math.max(1, req.depth || 3));
  const ancestors = new Set(), descendants = new Set();
  // Walk parents
  function walkUp(id, d) {
    if (d <= 0) return;
    const env = cache.get(id);
    if (!env) return;
    for (const p of env.parents || []) {
      if (ancestors.has(p)) continue;
      ancestors.add(p); walkUp(p, d-1);
    }
  }
  // Walk children — scan cache for who has this as a parent
  function walkDown(id, d) {
    if (d <= 0) return;
    for (const e of cache.values()) {
      if ((e.parents||[]).includes(id) && !descendants.has(e.id)) {
        descendants.add(e.id); walkDown(e.id, d-1);
      }
    }
  }
  walkUp(seedId, depth); walkDown(seedId, depth);
  return { ok:true, data: {
    seed: envSummary(cache.get(seedId)),
    ancestors: Array.from(ancestors).map(id => envSummary(cache.get(id))).filter(Boolean),
    descendants: Array.from(descendants).map(id => envSummary(cache.get(id))).filter(Boolean)
  }};
}

function handleSubscribe(req, srcId) {
  subs.push({ blockId: srcId, filter: { type: req.type, tag: req.tag, realm: req.realm } });
  return { ok:true };
}

async function handleImportFolder(req, srcId) {
  try {
    const r = await importFromFolder();
    showToast(`Imported ${r.added} · skipped ${r.skipped}`);
    return { ok:true, data: r };
  } catch (e) { return { ok:false, error:e.message }; }
}
async function handleExportFolder(req, srcId) {
  try {
    const r = await exportToFolder(req.ids || null);
    return { ok:true, data: r };
  } catch (e) { return { ok:false, error:e.message }; }
}
function handleRealmCurrent(req, srcId) {
  return { ok:true, realm_id: currentRealmId, charter_summary: currentCharterSummary() };
}
function handleRealmList(req, srcId) {
  return { ok:true, data: realmCharters().map(envSummary).sort(sortFn('name')) };
}
async function handleRealmSet(req, srcId) {
  return setCurrentRealm(req.realm_id);
}
async function handleAttest(req, srcId) {
  const env = cache.get(req.id);
  if (!env) return { ok:false, error:'not found' };
  if (typeFamily(env.type) !== 'creature') return { ok:false, error:'not a creature' };
  try {
    const r = await attestVibe(env);
    return { ok:true, data: { id: env.id, attestation: env.attestation, event_id: env.attestation_event_id || null, published: r.published || 0 } };
  } catch (e) {
    env.attestation = 'deferred';
    await putVibe(env).catch(()=>{});
    return { ok:false, error:e.message };
  }
}

function envSummary(env) {
  if (!env) return null;
  return {
    id: env.id, type: env.type, name: env.name, tags: env.tags || [],
    parents: env.parents || [], createdAt: env.createdAt, source: env.source,
    birthHash: env.birthHash, subFormat: env.subFormat, realm: env.realm || null,
    content_addr: env.content_addr || null, content_hash: env.content_hash || null, attestation: env.attestation || null,
    attestations: getAttestations(env).length, generation: env.payload && Number.isFinite(Number(env.payload.generation)) ? Number(env.payload.generation) : null,
    foreign_stub: typeFamily(env.type) === 'creature-stub', full_artifact: !(env.payload && env.payload.full_artifact === false),
    slots: typeFamily(env.type)==='creature' ? {total:(ensureSlots(env).payload.slots.total), remaining:slotsRemaining(env)} : null
  };
}
function sortFn(key) {
  if (key === 'name') return (a,b) => (a.name||'').localeCompare(b.name||'');
  if (key === 'type') return (a,b) => typeFamily(a.type).localeCompare(typeFamily(b.type)) || a.type.localeCompare(b.type) || (a.name||'').localeCompare(b.name||'');
  if (key === 'parents') {
    const childCount = new Map();
    for (const e of cache.values()) for (const p of e.parents||[]) childCount.set(p, (childCount.get(p)||0)+1);
    return (a,b) => (childCount.get(b.id)||0) - (childCount.get(a.id)||0);
  }
  return (a,b) => (b.createdAt||'').localeCompare(a.createdAt||''); // recent
}

// ── Kernel I/O ─────────────────────────────────────────────────────
function kernelEmit(channel, payload) {
  if (nx) nx.emit(channel, payload);
}
function notify(op, env) {
  kernelEmit('vibe.notify', { op, envelope: envSummary(env) });
}

    'vibe.import-folder', 'vibe.export-folder',

window.addEventListener('message', e => { if (e.data && e.data.type === 'BOOT') port = {}; });

nx = window.NexusBlockClient?.bootBlock({

if (nx) {

/* ════════════════════════════════════════════════════════════════════
   UI
   ════════════════════════════════════════════════════════════════════ */
function $(id) { return document.getElementById(id); }
function escHtml(s) { return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

let toastTm = 0;
function showToast(msg) {
  const t = $('toast'); t.textContent = msg; t.classList.add('show');
  clearTimeout(toastTm); toastTm = setTimeout(() => t.classList.remove('show'), 2400); // METADATA: display only, not content-addressed
}

function render() {
  // Sidebar
  const counts = { all: cache.size };
  for (const t of TYPES) counts[t] = 0;
  const tagCounts = new Map();
  for (const e of cache.values()) {
    counts[typeFamily(e.type)] = (counts[typeFamily(e.type)] || 0) + 1;
    for (const tag of e.tags || []) tagCounts.set(tag, (tagCounts.get(tag)||0)+1);
  }
  const side = $('side');
  let html = '<h4>TYPES</h4>';
  html += `<div class="side-row ${filterType===null?'active':''}" data-type="">
    <div class="side-dot"></div><div>All</div><div class="side-count">${counts.all}</div></div>`;
  for (const t of TYPES) {
    html += `<div class="side-row ${filterType===t?'active':''}" data-type="${t}">
      <div class="side-dot t-${t}"></div><div>${TYPE_LABELS[t]}</div>
      <div class="side-count">${counts[t]}</div></div>`;
  }
  if (tagCounts.size) {
    html += '<h4>TAGS</h4>';
    const sorted = Array.from(tagCounts.entries()).sort((a,b) => b[1]-a[1]).slice(0,40);
    html += `<div class="side-row ${filterTag===null?'active':''}" data-tag="">
      <div class="side-dot"></div><div>(any)</div></div>`;
    for (const [tag, n] of sorted) {
      html += `<div class="side-row ${filterTag===tag?'active':''}" data-tag="${escHtml(tag)}">
        <div class="side-dot"></div><div>${escHtml(tag)}</div>
        <div class="side-count">${n}</div></div>`;
    }
  }
  if (fsAvailable) html += `<h4>FOLDER</h4><div class="side-row" style="cursor:default"><div>📁 ${escHtml(folderName||'mounted')}</div></div>`;
  side.innerHTML = html;
  side.querySelectorAll('.side-row[data-type]').forEach(el => {
    el.onclick = () => { filterType = el.dataset.type || null; render(); };
  });
  side.querySelectorAll('.side-row[data-tag]').forEach(el => {
    el.onclick = () => { filterTag = el.dataset.tag || null; render(); };
  });

  // Grid
  let arr = Array.from(cache.values()).map(envSummary);
  if (filterType) arr = arr.filter(e => matchesType(e, filterType));
  if (filterTag) arr = arr.filter(e => (e.tags||[]).includes(filterTag));
  if (searchQ) {
    const q = searchQ.toLowerCase();
    arr = arr.filter(e => (e.name||'').toLowerCase().includes(q) ||
                          (e.tags||[]).some(t => t.toLowerCase().includes(q)) ||
                          e.type.includes(q));
  }
  arr.sort(sortFn(sortBy));

  $('count').textContent = `${arr.length} of ${cache.size} vibe${cache.size===1?'':'s'}${currentRealmId ? ` · realm ${currentRealmId}` : ''}${fsAvailable && folderName ? ` · 📁 ${folderName}` : ''}`;

  // Mount-state-aware UI: button label and empty-state instructions
  const syncBtn = $('btn-rescan');
  if (syncBtn) syncBtn.textContent = fsAvailable ? '↻ Rescan Folder' : '↻ Sync Folder';

  const instr = $('empty-instructions');
  if (instr) {
    if (fsAvailable) {
      instr.innerHTML = `Folder <strong>${escHtml(folderName||'(mounted)')}</strong> is mounted but the shelf is empty. Walk Atlas, sync exported creatures, or open a forge to wake the first specimen.`;
    } else {
      instr.innerHTML = `No folder mounted. Click 📁 in the Nexus taskbar, then come back and hit <strong>Sync Folder</strong>. You can also walk Atlas to find creatures before importing files.`;
    }
  }

  const grid = $('grid'); const empty = $('empty');
  if (cache.size === 0) {
    grid.innerHTML = '';
    empty.classList.remove('hidden');
    return;
  }
  empty.classList.add('hidden');

  grid.innerHTML = arr.map(e => `
    <div class="card ${selectedId===e.id?'selected':''}" data-id="${e.id}">
      <div class="card-head">
        <span class="type-chip t-${typeFamily(e.type)}">${e.type}</span>
      </div>
      <div class="card-name">${escHtml(e.name)}</div>
      <div class="card-meta">${(e.tags||[]).slice(0,4).map(t=>`<span class="tag">${escHtml(t)}</span>`).join('')}</div>
      <div class="card-foot">
        <span>${e.realm ? escHtml(e.realm) : (e.parents && e.parents.length ? `${e.parents.length} parent${e.parents.length>1?'s':''}` : 'origin')}</span>
        <span>${e.id.slice(2,12)}</span>
      </div>
    </div>`).join('');
  grid.querySelectorAll('.card').forEach(c => {
    c.onclick = () => { selectedId = c.dataset.id; renderDetail(); render(); };
  });
}

function renderDetail() {
  const env = cache.get(selectedId);
  const panel = $('detail');
  if (!env) { panel.classList.remove('open'); return; }
  panel.classList.add('open');
  $('detail-name').textContent = env.name;
  $('detail-meta').innerHTML = `${env.type.toUpperCase()} · gen <span style="color:var(--ink-2)">${(env.parents||[]).length === 0 ? '01' : '0' + ((env.parents||[]).length+1)}</span>`;

  const kv = $('detail-kv');
  kv.innerHTML = `
    <div class="k">id</div><div class="v"><code>${escHtml(env.id)}</code></div>
    <div class="k">type</div><div class="v">${env.type}</div>
    <div class="k">format</div><div class="v">${escHtml(env.subFormat||'')}</div>
    <div class="k">hash</div><div class="v"><code style="font-size:9px">${escHtml(env.birthHash||'').slice(0,30)}…</code></div>
    <div class="k">created</div><div class="v">${escHtml((env.createdAt||'').slice(0,19).replace('T',' '))}</div>
    <div class="k">source</div><div class="v">${escHtml(env.source||'—')}</div>
    <div class="k">realm</div><div class="v">${escHtml(env.realm||'—')}</div>
    <div class="k">attest</div><div class="v">${escHtml(env.attestation||'—')}</div>`;

  const tagsEl = $('detail-tags');
  tagsEl.innerHTML = (env.tags||[]).map(t =>
    `<span class="tag" data-tag="${escHtml(t)}" style="cursor:pointer" title="click to remove">${escHtml(t)} ×</span>`
  ).join('') || '<span style="color:var(--ink-3);font-size:10px">no tags</span>';
  tagsEl.querySelectorAll('[data-tag]').forEach(el => {
    el.onclick = async () => {
      handleTag({ id: env.id, remove: [el.dataset.tag] }, '_local');
    };
  });

  $('search').addEventListener('keydown', (e) => { if (e.key === 'Delete' || e.key === 'Backspace') e.stopPropagation(); });
$('tag-input').onkeydown = (e) => {
    if (e.key === 'Enter') {
      const v = e.target.value.trim();
      if (!v) return;
      handleTag({ id: env.id, add: [v] }, '_local');
      e.target.value = '';
    }
  };

  // Lineage
  const lin = $('detail-lineage');
  const parents = (env.parents||[]).map(id => cache.get(id)).filter(Boolean);
  const children = Array.from(cache.values()).filter(e => (e.parents||[]).includes(env.id));
  let lhtml = '';
  if (parents.length) lhtml += '<div style="font-size:9px;color:var(--ink-3);margin-bottom:4px">PARENTS</div>';
  for (const p of parents) lhtml += `<div class="lineage-row" data-id="${p.id}">↑ ${escHtml(p.name)} <span style="color:var(--ink-3)">${p.type}</span></div>`;
  if (children.length) lhtml += '<div style="font-size:9px;color:var(--ink-3);margin:8px 0 4px">DESCENDANTS (' + children.length + ')</div>';
  for (const c of children.slice(0, 10)) lhtml += `<div class="lineage-row" data-id="${c.id}">↓ ${escHtml(c.name)} <span style="color:var(--ink-3)">${c.type}</span></div>`;
  if (!parents.length && !children.length) lhtml = '<div style="color:var(--ink-3);font-size:10px">origin · no descendants yet</div>';
  lin.innerHTML = lhtml;
  lin.querySelectorAll('[data-id]').forEach(el => {
    el.onclick = () => { selectedId = el.dataset.id; renderDetail(); render(); };
  });
}

// ── Top bar wiring ─────────────────────────────────────────────────
// Both "Mount Folder" buttons and the Rescan button do the same smart thing:
// re-query the kernel for current mount state, then either scan or instruct.
// This is robust against missed fs.mounted broadcasts and stale cached state.
async function syncFolder() {
  if (!mounted) { showToast('Library not connected to kernel yet'); return; }
  const live = await refreshFsState();
  if (!live) {
    showToast('No folder mounted — click 📁 in the Nexus taskbar.');
    render();
    return;
  }
  showToast(`Scanning ${folderName || 'folder'}…`);
  const r = await importFromFolder();
  if (r.scanned === 0) {
    showToast(`Folder is empty (${folderName || ''})`);
  } else {
    showToast(`Found ${r.added} new vibe${r.added===1?'':'s'} · ${r.skipped} skipped of ${r.scanned}`);
  }
}
$('btn-mount').onclick = $('empty-mount').onclick = $('btn-rescan').onclick = syncFolder;
$('search').oninput = (e) => { searchQ = e.target.value; render(); };
$('sort').onchange = (e) => { sortBy = e.target.value; render(); };
$('detail-close').onclick = () => { selectedId = null; renderDetail(); render(); };
$('d-copy-id').onclick = () => {
  if (!selectedId) return;
  navigator.clipboard.writeText(selectedId).then(() => showToast('Copied ID'));
};
$('d-export').onclick = async () => {
  if (!selectedId) return;
  const env = cache.get(selectedId);
  const json = JSON.stringify(env, null, 2);
  const safe = (env.name||'untitled').toLowerCase().replace(/[^a-z0-9]+/g,'-');
  const blob = new Blob([json], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href = url; a.download = `${safe}.vibe.json`;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  setTimeout(()=>URL.revokeObjectURL(url), 1200);
};
$('d-delete').onclick = () => {
  if (!selectedId) return;
  if (!confirm('Delete this vibe? Lineage references from descendants will become broken.')) return;
  handleDelete({ id: selectedId, _reqId: '_local' }, '_local');
  selectedId = null;
  renderDetail();
};

// ── Drop import ────────────────────────────────────────────────────
let dragDepth = 0;
window.addEventListener('dragenter', e => { e.preventDefault(); dragDepth++; $('drop-overlay').classList.add('show'); });
window.addEventListener('dragover', e => e.preventDefault());
window.addEventListener('dragleave', e => { dragDepth = Math.max(0, dragDepth-1); if (!dragDepth) $('drop-overlay').classList.remove('show'); });
window.addEventListener('drop', async e => {
  e.preventDefault(); dragDepth = 0; $('drop-overlay').classList.remove('show');
  const files = Array.from(e.dataTransfer.files || []);
  let added = 0, skipped = 0;
  for (const f of files) {
    try {
      const text = await f.text();
      const lname = f.name.toLowerCase();
      const hint = lname.endsWith('.html') ? 'battle-html' : 'json';
      const env = await ingestText(text, f.name, hint);
      if (env) added++; else skipped++;
    } catch (_) { skipped++; }
  }
  showToast(`Imported ${added}${skipped?` · skipped ${skipped}`:''}`);
  render();
});

// Standalone fallback if not running inside Nexus
setTimeout(async () => {
  if (!mounted && !port) {
    log('standalone mode — no kernel BOOT received');
    try { await openDB(); await loadAllToCache(); render(); }
    catch (e) { log(`standalone init failed: ${e.message}`, 'err'); }
  }
}, 1000);

// Initial render in case data is already loaded
render();
